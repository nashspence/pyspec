[pytest]
addopts = -ra
filterwarnings =
    ignore:'maxsplit' is passed as positional argument:DeprecationWarning:gherkin.gherkin_line
markers =
    contract: generated contract scenario
    spec: generated spec harness scenario
    prod: generated prod harness scenario
    project_board_empty: generated scenario tag
    project_board_ready: generated scenario tag
    project_create_api_success: generated scenario tag
    project_approve_success: generated scenario tag
    project_approval_notice_workflow: generated scenario tag
    project_workspace_composed: generated scenario tag
