    resource: Project
    context:
      project_id: ID
    data: []
    events:
    - project.selection_changed
    - selection.cleared
    - data.ready
    - data.error
    initial: none
    states:
      none:
        pattern: none
        copy_slots:
        - heading
        - body
      loading:
        pattern: loading
        copy_slots:
        - message
      ready:
        pattern: detail
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
        actions:
        - project.approve
        - project.archive
        asset_slots:
        - priority_badge
      error:
        pattern: error
        copy_slots:
        - heading
        - body
    transitions:
    - from: none
      to: loading
      event: project.selection_changed
    - from: loading
      to: ready
      event: data.ready
    - from: loading
      to: error
      event: data.error
    - from: ready
      to: none
      event: selection.cleared
  basis:
    kind: explicit
    confidence: high
    text: The detail panel is independent from the list and reacts to selected project
      context.
- op: add
  target: panel
  id: panel.project.activity
  spec:
    kind: fsm
    resource: Project
    context:
      project_id: ID
    data: []
    events:
    - project.selection_changed
    - selection.cleared
    - data.ready
    initial: empty
    states:
      empty:
        pattern: empty
        copy_slots:
        - heading
        - body
      ready:
        pattern: feed
        copy_slots:
        - heading
        field_slots:
        - updated_at
        - status
        - assignee
    transitions:
    - from: empty
      to: ready
      event: project.selection_changed
    - from: ready
      to: empty
      event: selection.cleared
  basis:
    kind: explicit
    confidence: high
    text: The activity panel summarizes latest status around the selected project.
- op: add
  target: view
  id: project.board
  spec:
    archetype: dashboard
    resource: Project
    context:
      workspace_id: ID
      selected_project_id: ID
    data:
    - project.list
    states:
      ready:
        pattern: detail
    layout:
      kind: slots
      root:
        element: section
        role: region
        classes:
        - dispatch-board
      slots:
        nav:
          required: true
          element: nav
          role: navigation
          order: 1
          classes:
          - dispatch-board-nav
        main:
          required: true
          element: main
          role: main
          order: 2
          classes:
          - dispatch-board-main
        aside:
          required: true
          element: aside
          role: complementary
          order: 3
          classes:
          - dispatch-board-aside
      css:
        tokens:
          gap: 1rem
          nav_width: 20rem
          aside_width: 16rem
        rules:
        - selector: root
          declarations:
            display: grid
            gap: token.gap
            grid-template-columns: token.nav_width 1fr token.aside_width
        - selector: slot.nav
          declarations:
            min-width: token.nav_width
        - selector: slot.main
          declarations:
            min-width: '0'
        - selector: slot.aside
          declarations:
            min-width: token.aside_width
      textual:
        screen_class: ProjectBoardScreen
        containers:
        - id: nav
          kind: Container
          slot: nav
        - id: main
          kind: Container
          slot: main
        - id: aside
          kind: Container
          slot: aside
        tcss:
          rules:
          - selector: screen
            declarations:
              layout: horizontal
          - selector: slot.nav
            declarations:
              width: '32'
          - selector: slot.aside
            declarations:
              width: '28'
    includes:
    - id: list
      panel: panel.project.list
      slot: nav
      initial: loading
      context:
        workspace_id: $view.workspace_id
        selected_project_id: $view.selected_project_id
    - id: detail
      panel: panel.project.detail
      slot: main
      initial: none
      selected:
        when:
          context_present: selected_project_id
        state: loading
      context:
        project_id: $view.selected_project_id
    - id: activity
      panel: panel.project.activity
      slot: aside
      initial: empty
      selected:
        when:
          context_present: selected_project_id
        state: ready
      context:
        project_id: $view.selected_project_id
    sync:
    - id: select_project_updates_panels
      when:
        panel: list
        emits: project.selected
      do:
      - set:
          context: selected_project_id
          from: $event.project_id
      - send:
          panel: detail
          event: project.selection_changed
      - send:
          panel: activity
          event: project.selection_changed
  basis:
    kind: explicit
    confidence: high
    text: The dispatch board composes list, detail, and activity FSM panels through
      shared selected-project context.
