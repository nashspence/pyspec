- op: add
  target: panel
  id: panel.project.list
  spec:
    kind: fsm
    resource: Project
    context:
      workspace_id: ID
      selected_project_id: ID
    data:
    - project.list
    events:
    - data.empty
    - data.ready
    - data.error
    - project.select
    - project.selected
    initial: loading
    states:
      loading:
        pattern: loading
        copy_slots:
        - message
      empty:
        pattern: empty
        copy_slots:
        - heading
        - body
        asset_slots:
        - illustration
        actions:
        - project.create
      ready:
        pattern: table
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
        actions:
        - project.create
        - project.submit
      error:
        pattern: error
        copy_slots:
        - heading
        - body
    transitions:
    - from: loading
      to: empty
      event: data.empty
    - from: loading
      to: ready
      event: data.ready
    - from: loading
      to: error
      event: data.error
    - from: empty
      to: ready
      event: data.ready
    - from: ready
      to: ready
      event: project.select
      effects:
      - emit: project.selected
  basis:
    kind: explicit
    confidence: high
    text: The list panel owns collection loading, empty, ready, error, and selection
      behavior.
- op: add
  target: panel
  id: panel.project.detail
  spec:
