      workspace_id: ID
      title: Text
      customer: Text
      status: ProjectStatus
      priority: Text
      assignee: Text
      summary: Text
      created_at: Timestamp
      updated_at: Timestamp
    persistence:
      dialect: sqlite
      table: projects
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - from: draft
