          resource: Project
          where:
            workspace_id: $fixture.workspace.id
    when:
      open_entry:
        ref: web.project.board
        params:
          workspace_id: $fixture.workspace.id
    then:
      view:
        ref: project.board
        state: ready
        panels:
          list:
            state: empty
          detail:
            state: none
          activity:
            state: empty
        sync:
          observed:
          - select_project_updates_panels
      enables:
      - project.create
      forbids:
      - project.approve
