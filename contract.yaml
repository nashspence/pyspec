  copy.project.activity.empty.heading:
    max_chars: 80
    placeholder: No project selected
    tone: neutral
    basis: Empty activity heading.
  copy.project.activity.empty.body:
    max_chars: 120
    placeholder: Activity appears after a project is selected.
    tone: instructional
    basis: Empty activity body.
  copy.project.activity.ready.heading:
    max_chars: 80
    placeholder: Latest activity
    tone: neutral
    basis: Ready activity heading.
assets:
  asset.project.list.empty.illustration:
    alt_copy: copy.project.list.empty.heading
    kind: illustration
    placeholder:
      aspect_ratio: '4:3'
      label: Empty dispatch queue illustration
      shape: square
    basis: Generic placeholder illustration used by the empty queue panel.
  asset.project.detail.ready.priority_badge:
    args:
      priority: Text
    kind: icon
    placeholder:
      aspect_ratio: '1:1'
      label: Project priority badge
      shape: square
    resolver: asset.project.detail.ready.priority_badge
    basis: Selected project detail shows a dynamic priority badge resolved from project fixture data.
content_cases:
  content.project.detail.heading.high_priority:
    args:
      customer: Atlas Foods
      title: Replace rooftop condenser fan
    ref: copy.project.detail.ready.heading
    basis: Exercise final detail heading copy with representative fixture-backed content.
  content.project.detail.priority_badge.high_priority:
    args:
      priority: High
    ref: asset.project.detail.ready.priority_badge
    basis: Exercise final dynamic priority badge asset.
audit_profiles:
  default:
    html:
      breakpoints:
        compact:
          height: 820
          width: 420
        wide:
          height: 820
          width: 1280
    textual:
      breakpoints:
        compact:
          columns: 80
          rows: 26
        wide:
          columns: 120
          rows: 36
    basis: Two viewport breakpoints are enough to demonstrate visual audit coverage in the canonical example.
render_cases:
  project.board.empty.audit:
    fixtures:
    - fixture.workspace.member
    panels:
      activity:
        state: empty
      detail:
        state: none
      list:
        state: empty
    profile: default
    state: ready
    surfaces:
    - html
    - textual
    view: project.board
    basis: Audit render for empty board state vector.
  project.board.ready_selected.audit:
    context:
      selected_project_id: project_alpha
    fixtures:
    - fixture.workspace.member
    - fixture.projects.audit_records
    panels:
      activity:
        state: ready
      detail:
        state: ready
      list:
        state: ready
    profile: default
    state: ready
    surfaces:
    - html
    - textual
    view: project.board
    basis: Audit render for selected-project board state vector using dynamic fixture records.
