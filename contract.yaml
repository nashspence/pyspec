project: project_dispatch_board
fixtures:
  fixture.workspace.member:
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
    basis: Workspace member fixture for web/API/TUI scenarios.
  fixture.workspace.reviewer:
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
    basis: Reviewer fixture for approval scenarios.
  fixture.projects.audit_records:
    values:
      projects:
      - assignee: Maya Chen
        created_at: '2026-05-10T09:00:00Z'
        customer: Atlas Foods
        id: project_alpha
        priority: High
        resource: Project
        status: submitted
        summary: Technician needs approval before ordering the replacement fan motor.
        title: Replace rooftop condenser fan
        updated_at: '2026-05-11T08:45:00Z'
        workspace_id: workspace_1
      - assignee: Unassigned
        created_at: '2026-05-10T11:30:00Z'
        customer: Harbor Logistics
        id: project_beta
        priority: Normal
        resource: Project
        status: draft
        summary: Customer reports intermittent alerts from dock door 3.
        title: Inspect loading dock sensor
        updated_at: '2026-05-11T07:15:00Z'
        workspace_id: workspace_1
    basis: Render fixtures provide dynamic records for visual audit of ready and detail states.
resources:
  Project:
    fields:
      assignee: Text
      created_at: Timestamp
      customer: Text
      id: ID
      priority: Text
      status: ProjectStatus
      summary: Text
      title: Text
      updated_at: Timestamp
      workspace_id: ID
    kind: aggregate
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - by: project.submit
        from: draft
        to: submitted
      - by: project.approve
        from: submitted
        to: approved
      - by: project.archive
        from: approved
        to: archived
    basis: A dispatch project is the durable work item displayed and acted on by the board.
capabilities:
  project.create:
    archetype: create
    emits:
    - project.created
    input:
      customer: Text
      priority: Text
      title: Text
      workspace_id: ID
    output: Project
    resource: Project
    basis: Members can create a new dispatch project.
  project.list:
    archetype: list
    input:
      workspace_id: ID
    output: list[Project]
    resource: Project
    basis: The board requires a project list query scoped by workspace.
  project.submit:
    archetype: transition
    emits:
    - project.submitted
    input:
      project_id: ID
    output: Project
    resource: Project
    basis: Draft dispatch projects can be submitted for review.
  project.approve:
    archetype: transition
    emits:
    - project.approved
    input:
      project_id: ID
    output: Project
    resource: Project
    basis: Reviewers can approve submitted dispatch projects.
  project.archive:
    archetype: transition
    emits:
    - project.archived
    input:
      project_id: ID
    output: Project
    resource: Project
    basis: Approved dispatch projects can be archived.
  project.send_approval_notice:
    archetype: command
    input:
      approved_by: ID
      project_id: ID
    output: NoticeResult
    resource: Project
    basis: Approval triggers a notification command for downstream coordination.
panels:
  panel.project.list:
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - project.list
    events:
    - data.empty
    - data.ready
    - data.error
    - project.select
    - project.selected
    initial: loading
    resource: Project
    states:
      empty:
        actions:
        - project.create
        asset_slots:
        - illustration
        copy_slots:
        - heading
        - body
        pattern: empty
      error:
        copy_slots:
        - heading
        - body
        pattern: error
      loading:
        copy_slots:
        - message
        pattern: loading
      ready:
        actions:
        - project.create
        - project.submit
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
        pattern: table
    transitions:
    - event: data.empty
      from: loading
      to: empty
    - event: data.ready
      from: loading
      to: ready
    - event: data.error
      from: loading
      to: error
    - event: data.ready
      from: empty
      to: ready
    - effects:
      - emit: project.selected
      event: project.select
      from: ready
      to: ready
    basis: The list panel owns collection loading, empty, ready, error, and selection behavior.
  panel.project.detail:
    context:
      project_id: ID
    data: []
    events:
    - project.selection_changed
    - selection.cleared
    - data.ready
    - data.error
    initial: none
    resource: Project
    states:
      error:
        copy_slots:
        - heading
        - body
        pattern: error
      loading:
        copy_slots:
        - message
        pattern: loading
      none:
        copy_slots:
        - heading
        - body
        pattern: none
      ready:
        actions:
        - project.approve
        - project.archive
        asset_slots:
        - priority_badge
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
        pattern: detail
    transitions:
    - event: project.selection_changed
      from: none
      to: loading
    - event: data.ready
      from: loading
      to: ready
    - event: data.error
      from: loading
      to: error
    - event: selection.cleared
      from: ready
      to: none
    basis: The detail panel is independent from the list and reacts to selected project context.
  panel.project.activity:
    context:
      project_id: ID
    data: []
    events:
    - project.selection_changed
    - selection.cleared
    initial: empty
    resource: Project
    states:
      empty:
        copy_slots:
        - heading
        - body
        pattern: empty
      ready:
        copy_slots:
        - heading
        field_slots:
        - updated_at
        - status
        - assignee
        pattern: feed
    transitions:
    - event: project.selection_changed
      from: empty
      to: ready
    - event: selection.cleared
      from: ready
      to: empty
    basis: The activity panel summarizes latest status around the selected project.
views:
  project.board:
    archetype: dashboard
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - project.list
    includes:
    - context:
        selected_project_id: $view.selected_project_id
        workspace_id: $view.workspace_id
      id: list
      initial: loading
      panel: panel.project.list
      slot: nav
    - context:
        project_id: $view.selected_project_id
      id: detail
      initial: none
      panel: panel.project.detail
      selected:
        state: loading
        when:
          context_present: selected_project_id
      slot: main
    - context:
        project_id: $view.selected_project_id
      id: activity
      initial: empty
      panel: panel.project.activity
      selected:
        state: ready
        when:
          context_present: selected_project_id
      slot: aside
    layout:
      css:
        rules:
        - declarations:
            display: grid
            gap: token.gap
            grid-template-columns: token.nav_width 1fr token.aside_width
          selector: root
        - declarations:
            min-width: token.nav_width
          selector: slot.nav
        - declarations:
            min-width: '0'
          selector: slot.main
        - declarations:
            min-width: token.aside_width
          selector: slot.aside
        tokens:
          aside_width: 16rem
          gap: 1rem
          nav_width: 20rem
      kind: slots
      root:
        classes:
        - dispatch-board
        element: section
        role: region
      slots:
        aside:
          classes:
          - dispatch-board-aside
          element: aside
          order: 3
          required: true
          role: complementary
        main:
          classes:
          - dispatch-board-main
          element: main
          order: 2
          required: true
          role: main
        nav:
          classes:
          - dispatch-board-nav
          element: nav
          order: 1
          required: true
          role: navigation
      textual:
        containers:
        - id: nav
          kind: Container
          slot: nav
        - id: main
          kind: Container
          slot: main
        - id: aside
          kind: Container
          slot: aside
        screen_class: ProjectBoardScreen
        tcss:
          rules:
          - declarations:
              layout: horizontal
            selector: screen
          - declarations:
              width: '32'
            selector: slot.nav
          - declarations:
              width: '28'
            selector: slot.aside
    resource: Project
    states:
      ready:
        pattern: detail
    sync:
    - do:
      - set:
          context: selected_project_id
          from: $event.project_id
      - send:
          event: project.selection_changed
          panel: detail
      - send:
          event: project.selection_changed
          panel: activity
      id: select_project_updates_panels
      when:
        emits: project.selected
        panel: list
    basis: The dispatch board composes list, detail, and activity panels through shared selected-project context.
entries:
  web.project.board:
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/dispatch
    surface: web
    target:
      view: project.board
    basis: Web entry for the dispatch board.
  textual.project.board:
    command: project board
    surface: textual
    target:
      view: project.board
    basis: Textual entry for the dispatch board.
  api.project.create:
    method: POST
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/projects
    surface: api
    target:
      capability: project.create
    basis: HTTP endpoint for creating a dispatch project.
  api.project.list:
    method: GET
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/projects
    surface: api
    target:
      capability: project.list
    basis: HTTP endpoint for listing dispatch projects.
  cli.project.approve:
    args:
      project_id: ID
    command: project approve
    surface: cli
    target:
      capability: project.approve
    basis: CLI entry for approval automation.
  worker.project.approval_notice:
    surface: worker
    target:
      workflow: project.approval_notice
    basis: Worker entry exposing the approval notice workflow.
workflows:
  project.approval_notice:
    steps:
    - capability: project.send_approval_notice
      id: send_notice
    trigger:
      event: project.approved
    basis: Approval event sends a downstream notice.
scenarios:
  project.board.empty:
    archetype: composed_view
    feature: project.board
    given:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      enables:
      - project.create
      forbids:
      - project.approve
      view:
        panels:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: empty
        ref: project.board
        state: ready
        sync:
          observed:
          - select_project_updates_panels
    title: Empty dispatch board
    when:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
    basis: An empty workspace shows empty list, no detail, and no activity.
  project.board.ready:
    archetype: composed_view
    feature: project.board
    given:
      facts:
      - present:
          resource: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      enables:
      - project.create
      - project.submit
      view:
        panels:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: ready
        ref: project.board
        state: ready
        sync:
          observed:
          - select_project_updates_panels
    title: Ready dispatch board
    when:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
    basis: A populated workspace shows the ready list while detail awaits explicit selection.
  project.create.api.success:
    archetype: api_entry_success
    feature: project.create
    given:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      events:
        emitted:
        - project.created
      invoked:
      - project.create
      resource:
        exists:
          resource: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      response:
        status: 200
    title: Create dispatch project through API
    when:
      call_entry:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: api.project.create
    basis: The API create endpoint delegates to the create capability and emits project.created.
  project.approve.success:
    archetype: capability_success
    feature: project.approve
    given:
      facts:
      - present:
          resource: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - project.approved
      invoked:
      - project.approve
      resource:
        exists:
          resource: Project
          where:
            id: project_submitted_1
            status: approved
    title: Approve submitted dispatch project
    when:
      invoke_capability:
        input:
          project_id: project_submitted_1
        ref: project.approve
    basis: Approval transitions a submitted project to approved and emits the event.
  project.approval_notice.workflow:
    archetype: workflow_event_success
    feature: project.approval_notice
    given:
      facts: []
      fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - project.approved
      invoked:
      - project.send_approval_notice
      workflow:
        ran: true
        ref: project.approval_notice
    title: Approval event sends notice
    when:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: project.approved
    basis: Approval event dispatches the notification workflow.
copies:
