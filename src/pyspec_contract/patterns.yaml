authoring_layers:
  rule: Layers constrain authored spec vocabulary only. They are never written into spec/generated/compiled/spec.yaml and never imply absent adapters are planned.
  layers:
    core:
      targets: [fixture, model, operation, test_case]
      projections: [spec/generated/agent_prompts, spec/generated/behavior/fixtures.yaml, spec/generated/behavior/test_cases.yaml, spec/generated/test_adapters/pytest_bdd_features, spec/generated/test_adapters/python_refs.py]
    http:
      opens: [entry_point.adapter.http]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/http.openapi.yaml, spec/generated/audit_evidence/entrypoints]
    events:
      opens: [entry_point.adapter.webhook]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/events.asyncapi.yaml, spec/generated/audit_evidence/entrypoints]
    workflow:
      opens: [workflow, entry_point.adapter.cli, entry_point.adapter.worker, entry_point.adapter.scheduled]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/workflow.cwl.yaml, spec/generated/product_interfaces/events.asyncapi.yaml, spec/generated/audit_evidence/workflows, spec/generated/audit_evidence/entrypoints]
    ui:
      opens: [state_machine, text_resource, asset, content_case, render_profile, audit_case]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/web.state_machines.json, spec/generated/audit_evidence]
    textual:
      opens: [renderers.textual, render_profile.terminal_viewports]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/textual.projection.py, spec/generated/audit_evidence/**/renders/*.svg]
    web:
      opens: [entry_point.adapter.ui, renderers.web, render_profile.html_viewports]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/web.routes.json, spec/generated/audit_evidence/**/renders/*.png]
  common_sets:
    api_only: core,http
    evented_api: core,events
    ci_client: core,workflow
    textual_app: core,ui,textual
    web_app: core,ui,web
    full: full

purity_rules:
  test_cases: Do not include harness, test, dev, or environment routing. The same generated feature corpus is consumed by both spec and prod harnesses.
  models: Do not include persistence dialects, SQL tables, ORM details, datastore engines, indexes, or migrations. Models are product/design data contracts only.
  generated: Do not edit generated projections or audit renders by hand.
  agent_prompts: Use spec/generated/agent_prompts/{pm_design,test,dev,review}.md as role-specific standalone prompts; each contains a {{USER_PROMPT}} substitution point.

test_case_archetypes:
  empty_collection_state_machine:
    when: open_entry
    then: [state_machine.view_state.empty, enables, forbids]
  ready_collection_state_machine:
    when: open_entry
    then: [state_machine.view_state.ready, enables]
  state_machine_composition:
    when: open_entry
    then: [state_machine.instances, enables, forbids]
  state_machine_composition_sync:
    when: open_entry
    then: [state_machine.instances, state_machine.context, state_machine.message_sync_rules.observed]
  operation_outcome:
    when: invoke_operation
    then: [outcome, model.exists, events.emitted, invoked]
  entry_response:
    when: call_entry
    then: [outcome, response.status, model.exists, events.emitted, invoked]
  workflow_event_success:
    when: emit_event
    then: [workflow.ran, workflow.outcome, invoked]
  forbidden_action:
    when: open_entry
    then: [forbids]

entry_point_adapters:
  http:
    target: operation
    requires: [method, path]
    layer: http
  cli:
    target: [operation, state_machine, workflow]
    requires: [cli_command]
    layer: workflow
  worker:
    target: workflow
    requires: []
    layer: workflow
  scheduled:
    target: workflow
    requires: [schedule_expression]
    layer: workflow
  webhook:
    target: workflow
    requires: [path]
    layer: events
  ui:
    target: state_machine
    requires: [path]
    layer: web

entry_target_contracts:
  boundary: 'Entry points declare adapter-specific input and responses. trigger.*.with maps adapter input onto the target operation or state-machine context.'
  state_machine: 'State-machine entry triggers use trigger.state_machine.ref plus trigger.state_machine.render to distinguish invocation from html/textual rendering.'
  workflow: 'Workflow entry triggers use trigger.workflow.ref plus trigger.workflow.when so the entry point declares the trigger data it consumes. Workers declare message dispositions; workflows declare terminal outcomes and route each step outcome explicitly.'

renderer_contracts:
  web_layout:
    layer: web
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.web.layout'
    purpose: Web renderer root container and composition regions.
  web_presentation:
    layer: web
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.web.presentation'
    purpose: Web renderer slots/components and slot bindings.
  web_style:
    layer: web
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.web.style'
    purpose: Web renderer style tokens and selector-scoped declarations.
    selectors_allowed: [root, slot.<declared_slot>, action.<declared_action>, region.<declared_region>, mount.<declared_mount>]
  textual_layout:
    layer: textual
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.textual.layout'
    purpose: Textual renderer screen class and composition containers.
  textual_presentation:
    layer: textual
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.textual.presentation'
    purpose: Textual widgets and slot bindings.
  textual_style:
    layer: textual
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.textual.style'
    purpose: Textual renderer style tokens and selector-scoped declarations.
    selectors_allowed: [screen, slot.<declared_slot>, action.<declared_action>, region.<declared_region>, mount.<declared_mount>]

gherkin_policy:
  source_of_truth: spec/generated/behavior/test_cases.yaml
  generated_features: pytest-bdd adapter only
  corpus: spec/generated/test_adapters/pytest_bdd_features/*.feature
  rule: PM agents never author raw .feature files; spec and prod pytest-bdd harnesses consume the same generated corpus.

composition_contracts:
  state_machine: 'target: state_machine defines context, initial view state, view states, state-local data dependencies, transitions, emitted messages, and optional state-local composition.'
  test_case: 'target: test_case asserts a state-machine view state or composed state-machine instance vector.'

audit_contracts:
  text_resource: 'target: text_resource declares placeholder text for every rendered text ref.'
  asset: 'target: asset declares media kind, asset role, placeholder visual intent, and optional source_ref; the compiler emits generic SVG placeholder assets.'
  render_profile: 'target: render_profile declares fixed HTML and/or terminal viewport profiles.'
  audit_case: 'state-local audit cases bind a state-machine view state or composed state-machine instance vector to fixtures and contexts; render surfaces and artifacts are derived from the referenced view states.'
  content_case: 'target: content_case exercises every source_ref-backed text resource or asset with deterministic args.'
  final_content: 'target: text_resource or asset may declare args and source_ref; generated content stubs constrain spec/spec.py.'
  formats:
    entrypoint: svg
    state_machine: svg
    composition: svg
    workflow: svg
    terminal: svg
    html: png
  forbidden: [spec/generated/audit_evidence/review.html, spec/generated/audit_evidence/change_report.md, spec/generated/audit_evidence/manifest.json]
