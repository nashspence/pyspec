authoring_layers:
  rule: Layers constrain authored spec vocabulary only. They are never written into spec/generated/compiled/spec.yaml and never imply absent adapters are planned.
  layers:
    core:
      targets: [fixture, model, operation, scenario]
      projections: [spec/generated/agent_prompts, spec/generated/behavior/fixtures.yaml, spec/generated/behavior/scenarios.yaml, spec/generated/test_adapters/pytest_bdd_features, spec/generated/test_adapters/python_refs.py]
    http:
      opens: [entry_point.adapter.http]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/http.openapi.yaml, spec/generated/audit_evidence/entrypoints]
    events:
      opens: [entry_point.adapter.webhook]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/events.asyncapi.yaml, spec/generated/audit_evidence/entrypoints]
    workflow:
      opens: [workflow, entry_point.adapter.cli, entry_point.adapter.worker, entry_point.adapter.scheduled]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/workflow.cwl.yaml, spec/generated/product_interfaces/events.asyncapi.yaml, spec/generated/audit_evidence/workflows, spec/generated/audit_evidence/entrypoints]
    ui:
      opens: [fsm, copy, asset, content_case, audit_profile, audit_case]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/web.fsms.json, spec/generated/audit_evidence]
    textual:
      opens: [presentation.textual, audit_case.render.textual, audit_profile.textual]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/textual.projection.py, spec/generated/audit_evidence/**/renders/*.svg]
    web:
      opens: [entry_point.adapter.ui, presentation.html, presentation.css, audit_case.render.html, audit_profile.html]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/web.routes.json, spec/generated/audit_evidence/**/renders/*.png]
  common_sets:
    api_only: core,http
    evented_api: core,events
    ci_client: core,workflow
    textual_app: core,ui,textual
    web_app: core,ui,web
    full: full

purity_rules:
  scenarios: Do not include harness, test, dev, or environment routing. The same generated feature corpus is consumed by both spec and prod harnesses.
  models: Do not include persistence dialects, SQL tables, ORM details, datastore engines, indexes, or migrations. Models are product/design data contracts only.
  generated: Do not edit generated projections or audit renders by hand.
  agent_prompts: Use spec/generated/agent_prompts/{pm_design,test,dev,review}.md as role-specific standalone prompts; each contains a {{USER_PROMPT}} substitution point.

scenario_archetypes:
  empty_collection_fsm:
    when: open_entry
    then: [fsm.state.empty, enables, forbids]
  ready_collection_fsm:
    when: open_entry
    then: [fsm.state.ready, enables]
  fsm_composition:
    when: open_entry
    then: [fsm.instances, enables, forbids]
  fsm_composition_sync:
    when: open_entry
    then: [fsm.instances, fsm.context, fsm.sync.observed]
  operation_outcome:
    when: invoke_operation
    then: [outcome, model.exists, events.emitted, invoked]
  entry_response:
    when: call_entry
    then: [outcome, response.status, model.exists, events.emitted, invoked]
  workflow_event_success:
    when: emit_event
    then: [workflow.ran, workflow.outcome, invoked]
  forbidden_action:
    when: open_entry
    then: [forbids]

entry_point_adapters:
  http:
    target: operation
    requires: [method, path]
    layer: http
  cli:
    target: [operation, fsm, workflow]
    requires: [cli_command]
    layer: workflow
  worker:
    target: workflow
    requires: []
    layer: workflow
  scheduled:
    target: workflow
    requires: [schedule_expression]
    layer: workflow
  webhook:
    target: workflow
    requires: [path]
    layer: events
  ui:
    target: fsm
    requires: [path]
    layer: web

entry_target_contracts:
  boundary: 'Entry points declare adapter-specific input and responses. trigger.*.with maps adapter input onto the target operation or state-machine context.'
  fsm: 'State-machine entry triggers use trigger.state_machine.ref plus trigger.state_machine.render to distinguish invocation from html/textual rendering.'
  workflow: 'Workflow entry triggers use trigger.workflow.ref plus trigger.workflow.when so the entry point declares the trigger data it consumes. Workers declare message dispositions; workflows declare terminal outcomes and route each step outcome explicitly.'

presentation_contracts:
  html:
    layer: web
    location: 'target: fsm -> spec.states.<state>.presentation.html or spec.states.<state>.layout.html'
    purpose: Exact root element, ARIA role, classes, and semantic slots.
    selectors_allowed: [copy_slots, asset_slots, field_slots, actions]
  css:
    layer: web
    location: 'target: fsm -> spec.states.<state>.presentation.css or spec.states.<state>.layout.css'
    purpose: Exact CSS tokens and selector-scoped declarations.
    selectors_allowed: [root, slot.<declared_slot>, action.<declared_action>, mount.<declared_mount>]
  textual:
    layer: textual
    location: 'target: fsm -> spec.states.<state>.presentation.textual or spec.states.<state>.layout.textual'
    purpose: Exact Textual screen class, widgets, bindings, and TCSS-like rules.
    selectors_allowed: [screen, slot.<declared_slot>, action.<declared_action>, mount.<declared_mount>]

gherkin_policy:
  source_of_truth: spec/generated/behavior/scenarios.yaml
  generated_features: pytest-bdd adapter only
  corpus: spec/generated/test_adapters/pytest_bdd_features/*.feature
  rule: PM agents never author raw .feature files; spec and prod pytest-bdd harnesses consume the same generated corpus.

composition_contracts:
  fsm: 'target: fsm defines context, initial state, states, state-local data, transitions, emitted events, and optional state-local composition.'
  scenario: 'target: scenario asserts an FSM state or composed FSM instance vector.'

audit_contracts:
  copy: 'target: copy declares placeholder text for every rendered copy ref.'
  asset: 'target: asset declares placeholder visual intent; the compiler emits generic SVG placeholder assets.'
  audit_profile: 'target: audit_profile declares fixed HTML and/or Textual breakpoints.'
  audit_case: 'state-local audit cases bind an FSM state or composed FSM instance vector to fixtures, render surfaces, and an audit profile.'
  content_case: 'target: content_case exercises every resolver-backed copy/asset with deterministic args.'
  final_content: 'target: copy or asset may declare args and resolver; generated content stubs constrain spec/spec.py.'
  formats:
    entrypoint: svg
    fsm: svg
    composition: svg
    workflow: svg
    textual: svg
    html: png
  forbidden: [spec/generated/audit_evidence/review.html, spec/generated/audit_evidence/change_report.md, spec/generated/audit_evidence/manifest.json]
