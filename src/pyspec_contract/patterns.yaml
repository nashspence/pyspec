authoring_layers:
  rule: Layers constrain authored spec vocabulary only. They are never written into spec/generated/compiled/spec.yaml and never imply absent adapters are planned.
  layers:
    core:
      targets: [fixture, precondition, assertion, entity_type, schema, operation, behavior_scenario]
      projections: [spec/generated/agent_prompts, spec/generated/behavior/fixtures.yaml, spec/generated/behavior/behavior_scenarios.yaml, spec/generated/test_adapters/pytest_bdd_features, spec/generated/test_adapters/python_refs.py]
    http:
      opens: [entry_point.adapter.http_api]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/http.openapi.yaml, spec/generated/audit_evidence/entrypoints]
    domain_events:
      opens: [entry_point.adapter.webhook]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/integration_messages.asyncapi.yaml, spec/generated/audit_evidence/entrypoints]
    workflow:
      opens: [workflow, entry_point.adapter.cli, entry_point.adapter.worker, entry_point.adapter.scheduled]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/workflow.cwl.yaml, spec/generated/product_interfaces/integration_messages.asyncapi.yaml, spec/generated/audit_evidence/workflows, spec/generated/audit_evidence/entrypoints]
    ui:
      opens: [state_machine, text_resource, asset, content_case, render_profile, render_audit_case]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/html.state_machines.json, spec/generated/audit_evidence]
    textual:
      opens: [renderers.textual, render_profile.textual_viewports]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/textual.projection.py, spec/generated/audit_evidence/**/renders/*.svg]
    html:
      opens: [entry_point.adapter.html_route, renderers.html, render_profile.html_viewports]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/html.routes.json, spec/generated/audit_evidence/**/renders/*.png]
  common_sets:
    api_only: core,http
    evented_api: core,domain_events
    ci_client: core,workflow
    textual_app: core,ui,textual
    html_app: core,ui,html
    full: full

purity_rules:
  behavior_scenarios: Do not include harness, test, dev, or environment dispatch. The same generated feature corpus is consumed by both spec and prod harnesses.
  entity_types: Do not include persistence dialects, SQL tables, ORM details, datastore engines, indexes, or migrations. Entity types are product/design data contracts only.
  generated: Do not edit generated projections or audit renders by hand.
  agent_prompts: Use spec/generated/agent_prompts/{pm_design,test,dev,review}.md as role-specific standalone prompts; each contains a {{USER_PROMPT}} substitution point.

behavior_scenario_archetypes:
  empty_collection_state_machine:
    when: open_entry_point
    then: [state_machine.view_state.empty, enables, authorization.denied]
  ready_collection_state_machine:
    when: open_entry_point
    then: [state_machine.view_state.ready, enables]
  state_machine_composition:
    when: open_entry_point
    then: [state_machine.instances, enables, authorization.denied]
  state_machine_composition_sync:
    when: open_entry_point
    then: [state_machine.instances, state_machine.context, state_machine.signal_sync_rules.observed_rules]
  action_outcome:
    when: invoke_application_action
    then: [outcome, entity.exists, domain_events.emitted, invoked]
  entry_point_response:
    when: call_entry_point
    then: [outcome, response.status, entity.exists, domain_events.emitted, invoked]
  workflow_trigger_success:
    when: emit_domain_event
    then: [workflow.executed, workflow.outcome, invoked]
  authorization_denial:
    when: open_entry_point
    then: [authorization.denied]

entry_point_adapters:
  http_api:
    target: operation
    requires: [method, path]
    layer: http
  cli:
    target: [operation, state_machine, workflow]
    requires: [cli_command]
    layer: workflow
  worker:
    target: workflow
    requires: []
    layer: workflow
  scheduled:
    target: workflow
    requires: [schedule_expression]
    layer: workflow
  webhook:
    target: workflow
    requires: [path]
    layer: domain_events
  html_route:
    target: state_machine
    requires: [path]
    layer: html

entry_target_contracts:
  boundary: 'Entry points declare adapter-specific input plus either target outcome responses or async ingress responses. target.*.input_bindings maps adapter input onto the target operation or state-machine context.'
  state_machine: 'State-machine entry targets use target.state_machine.ref plus target.state_machine.renderer to distinguish invocation from html/textual rendering.'
  workflow: 'Workflow entry targets use target.workflow.ref plus target.workflow.trigger_bindings so the entry point binds input into the workflow trigger payload. Workers declare ingress dispositions; workflows declare named execution outcomes and transition each step outcome explicitly.'

renderer_contracts:
  html_layout:
    layer: html
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.html.layout'
    purpose: HTML renderer root container and composition regions.
  html_presentation:
    layer: html
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.html.presentation'
    purpose: HTML renderer slots/components and slot bindings.
  html_style:
    layer: html
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.html.style'
    purpose: HTML renderer style tokens and selector-scoped declarations.
    selectors_allowed: [root, slot.<declared_slot>, action_binding.<declared_action_binding>, region.<declared_region>, child_state_machine.<declared_child_state_machine>]
  textual_layout:
    layer: textual
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.textual.layout'
    purpose: Textual renderer screen class and composition containers.
  textual_presentation:
    layer: textual
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.textual.presentation'
    purpose: Textual widgets and slot bindings.
  textual_style:
    layer: textual
    location: 'target: state_machine -> spec.view_states.<view_state>.renderers.textual.style'
    purpose: Textual renderer style tokens and selector-scoped declarations.
    selectors_allowed: [screen, slot.<declared_slot>, action_binding.<declared_action_binding>, container.<declared_container>, child_state_machine.<declared_child_state_machine>]

gherkin_corpus:
  source_of_truth: spec/generated/behavior/behavior_scenarios.yaml
  generated_features: pytest-bdd adapter only
  corpus: spec/generated/test_adapters/pytest_bdd_features/*.feature
  rule: PM agents never author raw .feature files; spec and prod pytest-bdd harnesses consume the same generated corpus.

composition_contracts:
  state_machine: 'target: state_machine defines context, initial view state, view states, state-local query dependencies, transitions, emitted signals, and state-local composition when present.'
  behavior_scenario: 'target: behavior_scenario asserts a state-machine view state or composed state-machine instance vector.'

audit_contracts:
  text_resource: 'target: text_resource declares placeholder text for every rendered text ref.'
  asset: 'target: asset declares media kind, asset role, placeholder visual intent, and source_ref when source-backed; the compiler emits generic SVG placeholder assets.'
  render_profile: 'target: render_profile declares fixed HTML and/or Textual viewport profiles.'
  render_audit_case: 'state-local render audit cases bind a state-machine view state or composed state-machine instance vector to fixtures and contexts; render surfaces and artifacts are derived from the referenced view states.'
  content_case: 'target: content_case exercises every source_ref-backed text resource or asset with deterministic args.'
  final_content: 'target: text_resource or asset may declare args and source_ref; generated content stubs constrain spec/spec.py.'
  formats:
    entrypoint: svg
    state_machine: svg
    composition: svg
    workflow: svg
    textual: svg
    html: png
  forbidden: [spec/generated/audit_evidence/review.html, spec/generated/audit_evidence/change_report.md, spec/generated/audit_evidence/manifest.json]
