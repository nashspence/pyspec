authoring_layers:
  rule: Layers constrain authored spec vocabulary only. They are never written into spec/generated/compiled/spec.yaml and never imply absent adapters are planned.
  layers:
    core:
      invocations: [fixture, precondition, assertion, entity_type, schema, command, query, behavior_scenario]
      projections: [spec/generated/agent_prompts, spec/generated/behavior/fixtures.yaml, spec/generated/behavior/behavior_scenarios.yaml, spec/generated/test_adapters/pytest_bdd_features, spec/generated/test_adapters/python_refs.py]
    http:
      opens: [external_interface.adapter.http_api]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/http.openapi.yaml, spec/generated/audit_evidence/external_interfaces]
    domain_events:
      opens: [external_interface.adapter.webhook]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/integration_messages.asyncapi.yaml, spec/generated/audit_evidence/external_interfaces]
    workflow:
      opens: [workflow, external_interface.adapter.cli, external_interface.adapter.worker, external_interface.adapter.scheduled]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/workflow.cwl.yaml, spec/generated/product_interfaces/integration_messages.asyncapi.yaml, spec/generated/audit_evidence/workflows, spec/generated/audit_evidence/external_interfaces]
    ui:
      opens: [state_machine, text_resource, asset, content_example, viewport_profile, render_example]
      requires: [core]
      projections_when_declared: [spec/generated/product_interfaces/html.state_machines.json, spec/generated/audit_evidence]
    textual:
      opens: [renderers.textual, viewport_profile.textual_viewports]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/textual.projection.py, spec/generated/audit_evidence/**/renders/*.svg]
    html:
      opens: [external_interface.adapter.html_route, renderers.html, viewport_profile.html_viewports]
      requires: [core, ui]
      projections_when_declared: [spec/generated/product_interfaces/html.routes.json, spec/generated/audit_evidence/**/renders/*.png]
  common_sets:
    api_only: core,http
    evented_api: core,domain_events
    ci_client: core,workflow
    textual_app: core,ui,textual
    html_app: core,ui,html
    full: full

purity_rules:
  behavior_scenarios: Do not include harness, test, dev, or environment dispatch. The same generated feature corpus is consumed by both spec and prod harnesses.
  entity_types: Do not include persistence dialects, SQL tables, ORM details, datastore engines, indexes, or migrations. Entity types are product/design data contracts only.
  generated: Do not edit generated projections or audit renders by hand.
  agent_prompts: Use spec/generated/agent_prompts/{pm_design,test,dev,review}.md as role-specific standalone prompts; each contains a {{USER_PROMPT}} substitution point.

behavior_scenario_archetypes:
  empty_collection_state_machine:
    when: open_external_interface
    then: [state_machine.state.empty, enables, authorization.denied]
  ready_collection_state_machine:
    when: open_external_interface
    then: [state_machine.state.ready, enables]
  state_machine_composition:
    when: open_external_interface
    then: [state_machine.instances, enables, authorization.denied]
  state_machine_composition_sync:
    when: open_external_interface
    then: [state_machine.instances, state_machine.context, state_machine.signal_sync_rules.observed_rules]
  command_outcome:
    when: invoke_command
    then: [outcome, entity.exists, domain_events.emitted, invoked]
  external_interface_response:
    when: call_external_interface
    then: [outcome, response.status, entity.exists, domain_events.emitted, invoked]
  workflow_execution_success:
    when: emit_domain_event
    then: [workflow.executed, workflow.outcome, invoked]
  authorization_denial:
    when: open_external_interface
    then: [authorization.denied]

external_interface_adapters:
  http_api:
    invokes: [command, query]
    requires: [method, path]
    layer: http
  cli:
    invokes: [command, query, state_machine, workflow]
    requires: [cli_command]
    layer: workflow
  worker:
    invokes: workflow
    requires: []
    layer: workflow
  scheduled:
    invokes: workflow
    requires: [schedule_expression]
    layer: workflow
  webhook:
    invokes: workflow
    requires: [path]
    layer: domain_events
  html_route:
    invokes: state_machine
    requires: [path]
    layer: html

external_interface_invocation_contracts:
  boundary: 'External interfaces declare adapter-specific input plus either invoked outcome responses or async ingress responses. input_mapping maps adapter input onto the invoked command, query, state-machine context, workflow input, or delegated external-interface input.'
  state_machine: 'State-machine external interface invocations use invokes.state_machine.ref plus invokes.state_machine.renderer to distinguish invocation from html/textual rendering.'
  workflow: 'Workflow external-interface invocations use invokes.workflow.ref plus input_mapping.bindings so adapter input binds into workflow input fields. Workers declare ingress dispositions; workflows declare named execution outcomes and transition each step outcome explicitly.'

renderer_contracts:
  html_layout:
    layer: html
    location: 'invokes: state_machine -> spec.state_machines.<state_machine>.states.<state>.renderers.html.layout'
    purpose: HTML renderer root container and composition regions.
  html_presentation:
    layer: html
    location: 'invokes: state_machine -> spec.state_machines.<state_machine>.states.<state>.renderers.html.presentation'
    purpose: HTML renderer slots/components and slot bindings.
  html_style:
    layer: html
    location: 'invokes: state_machine -> spec.state_machines.<state_machine>.states.<state>.renderers.html.style'
    purpose: HTML renderer style tokens and selector-scoped declarations.
    selectors_allowed: [root, slot.<declared_slot>, command_binding.<declared_command_binding>, region.<declared_region>, child_state_machine.<declared_child_state_machine>]
  textual_layout:
    layer: textual
    location: 'invokes: state_machine -> spec.state_machines.<state_machine>.states.<state>.renderers.textual.layout'
    purpose: Textual renderer screen class and composition containers.
  textual_presentation:
    layer: textual
    location: 'invokes: state_machine -> spec.state_machines.<state_machine>.states.<state>.renderers.textual.presentation'
    purpose: Textual widgets and slot bindings.
  textual_style:
    layer: textual
    location: 'invokes: state_machine -> spec.state_machines.<state_machine>.states.<state>.renderers.textual.style'
    purpose: Textual renderer style tokens and selector-scoped declarations.
    selectors_allowed: [screen, slot.<declared_slot>, command_binding.<declared_command_binding>, container.<declared_container>, child_state_machine.<declared_child_state_machine>]

gherkin_corpus:
  source_of_truth: spec/generated/behavior/behavior_scenarios.yaml
  generated_features: pytest-bdd adapter only
  corpus: spec/generated/test_adapters/pytest_bdd_features/*.feature
  rule: PM agents never author raw .feature files; spec and prod pytest-bdd harnesses consume the same generated corpus.

composition_contracts:
  state_machine: 'state_machine defines context_schema, initial state, states, state-local query dependencies, transitions, emitted signals, and state-local composition when present.'
  behavior_scenario: 'behavior_scenario asserts a state-machine state or composed state-machine instance vector.'

audit_contracts:
  text_resource: 'text_resource declares placeholder text for every rendered text ref.'
  asset: 'media_asset declares media kind, asset role, placeholder visual intent, and source_ref when source-backed; the compiler emits generic SVG placeholder assets.'
  viewport_profile: 'viewport_profile declares fixed HTML and/or Textual viewport profiles.'
  render_example: 'state-local render examples bind a state-machine state or composed state-machine instance vector to fixtures and contexts; render surfaces and artifacts are derived from the referenced states.'
  content_example: 'content_example exercises every source_ref-backed text resource or asset with deterministic args.'
  final_content: 'text_resource or media_asset may declare args and source_ref; generated content stubs constrain spec/spec.py.'
  formats:
    external_interface: svg
    state_machine: svg
    composition: svg
    workflow: svg
    textual: svg
    html: png
  forbidden: [spec/generated/audit_evidence/review.html, spec/generated/audit_evidence/change_report.md, spec/generated/audit_evidence/manifest.json]
