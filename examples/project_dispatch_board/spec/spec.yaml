project: project_dispatch_board
fixtures:
  fixture.workspace.member:
    basis: Workspace member fixture for web/API/TUI scenarios.
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    basis: Reviewer fixture for approval scenarios.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
facts:
  fact.project.submitted:
    basis: Submitted dispatch project shared by approval, ready-board, and visual audit scenarios.
    present:
      resource: Project
      values:
        assignee: Maya Chen
        created_at: '2026-05-10T09:00:00Z'
        customer: Atlas Foods
        id: project_submitted_1
        priority: High
        status: submitted
        summary: Technician needs approval before ordering the replacement fan motor.
        title: Replace rooftop condenser fan
        updated_at: '2026-05-11T08:45:00Z'
        workspace_id: $fixture.workspace.id
  fact.project.draft:
    basis: Draft dispatch project used as a secondary row in ready-board audit renders.
    present:
      resource: Project
      values:
        assignee: Unassigned
        created_at: '2026-05-10T11:30:00Z'
        customer: Harbor Logistics
        id: project_beta
        priority: Normal
        status: draft
        summary: Customer reports intermittent alerts from dock door 3.
        title: Inspect loading dock sensor
        updated_at: '2026-05-11T07:15:00Z'
        workspace_id: $fixture.workspace.id
resources:
  Project:
    basis: A dispatch project is the durable work item displayed and acted on by the board.
    fields:
      assignee: Text
      created_at: Timestamp
      customer: Text
      id: ID
      priority: Text
      status: ProjectStatus
      summary: Text
      title: Text
      updated_at: Timestamp
      workspace_id: ID
    kind: aggregate
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - by: project.submit
        from: draft
        to: submitted
      - by: project.approve
        from: submitted
        to: approved
      - by: project.archive
        from: approved
        to: archived
capabilities:
  project.approve:
    archetype: transition
    basis: Reviewers can approve submitted dispatch projects.
    emits:
    - project.approved
    input:
      project_id: ID
    output: Project
    resource: Project
  project.archive:
    archetype: transition
    basis: Approved dispatch projects can be archived.
    emits:
    - project.archived
    input:
      project_id: ID
    output: Project
    resource: Project
  project.create:
    archetype: create
    basis: Members can create a new dispatch project.
    emits:
    - project.created
    input:
      customer: Text
      priority: Text
      title: Text
      workspace_id: ID
    output: Project
    resource: Project
  project.list:
    archetype: list
    basis: The board requires a project list query scoped by workspace.
    input:
      workspace_id: ID
    output: list[Project]
    resource: Project
  project.read:
    archetype: read
    basis: The detail panel loads the selected project by id.
    input:
      project_id: ID
    output: Project
    resource: Project
  project.send_approval_notice:
    archetype: command
    basis: Approval triggers a notification command for downstream coordination.
    input:
      approved_by: ID
      project_id: ID
    output: NoticeResult
    resource: Project
  project.submit:
    archetype: transition
    basis: Draft dispatch projects can be submitted for review.
    emits:
    - project.submitted
    input:
      project_id: ID
    output: Project
    resource: Project
panels:
  panel.project.activity:
    basis: The activity panel summarizes latest status around the selected project.
    context:
      project_id: ID
    data: []
    events:
      project.selection_changed:
        payload:
          project_id: ID
      selection.cleared:
        payload: {}
    initial: empty
    resource: Project
    states:
      empty:
        copy_slots:
        - heading
        - body
      ready:
        copy_slots:
        - heading
        data:
        - project.read
        field_slots:
        - updated_at
        - status
        - assignee
    transitions:
    - event: project.selection_changed
      from: empty
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      event: selection.cleared
      from: ready
      to: empty
  panel.project.detail:
    basis: The detail panel is independent from the list and reacts to selected project context.
    context:
      project_id: ID
    data: []
    events:
      data.error:
        payload: {}
      data.ready:
        payload: {}
      project.selection_changed:
        payload:
          project_id: ID
      selection.cleared:
        payload: {}
    initial: none
    resource: Project
    states:
      error:
        copy_slots:
        - heading
        - body
      loading:
        copy_slots:
        - message
        data:
        - project.read
      none:
        copy_slots:
        - heading
        - body
      ready:
        actions:
        - project.approve
        - project.archive
        asset_slots:
        - priority_badge
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
    transitions:
    - event: project.selection_changed
      from: none
      to: loading
    - event: data.ready
      from: loading
      to: ready
    - event: data.error
      from: loading
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      event: selection.cleared
      from: ready
      to: none
  panel.project.list:
    basis: The list panel owns collection loading, empty, ready, error, and selection behavior.
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - project.list
    events:
      data.empty:
        payload: {}
      data.error:
        payload: {}
      data.ready:
        payload: {}
      project.select:
        payload:
          project_id: ID
      project.selected:
        payload:
          project_id: ID
    initial: loading
    resource: Project
    states:
      empty:
        actions:
        - project.create
        asset_slots:
        - illustration
        copy_slots:
        - heading
        - body
      error:
        copy_slots:
        - heading
        - body
      loading:
        copy_slots:
        - message
      ready:
        actions:
        - project.create
        - project.submit
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
    transitions:
    - event: data.empty
      from: loading
      to: empty
    - event: data.ready
      from: loading
      to: ready
    - event: data.error
      from: loading
      to: error
    - event: data.ready
      from: empty
      to: ready
    - effects:
      - emit:
          data:
            project_id: $event.project_id
          event: project.selected
      event: project.select
      from: ready
      to: ready
views:
  project.board:
    archetype: dashboard
    basis: The dispatch board composes list, detail, and activity panels through shared selected-project context.
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - project.list
    includes:
    - context:
        selected_project_id: $view.selected_project_id
        workspace_id: $view.workspace_id
      id: list
      initial: loading
      panel: panel.project.list
      region: nav
    - context:
        project_id: $view.selected_project_id
      id: detail
      initial: none
      panel: panel.project.detail
      region: main
      selected:
        state: loading
        when:
          context_present: selected_project_id
    - context:
        project_id: $view.selected_project_id
      id: activity
      initial: empty
      panel: panel.project.activity
      region: aside
      selected:
        state: ready
        when:
          context_present: selected_project_id
    layout:
      html:
        css:
          rules:
          - declarations:
              display: grid
              gap: token.gap
              grid-template-columns: token.nav_width 1fr token.aside_width
            selector: root
          - declarations:
              min-width: token.nav_width
            selector: region.nav
          - declarations:
              min-width: '0'
            selector: region.main
          - declarations:
              min-width: token.aside_width
            selector: region.aside
          tokens:
            aside_width: 16rem
            gap: 1rem
            nav_width: 20rem
        regions:
          aside:
            classes:
            - dispatch-board-aside
            element: aside
            order: 3
            required: true
            role: complementary
          main:
            classes:
            - dispatch-board-main
            element: main
            order: 2
            required: true
            role: main
          nav:
            classes:
            - dispatch-board-nav
            element: nav
            order: 1
            required: true
            role: navigation
        root:
          classes:
          - dispatch-board
          element: section
          role: region
      textual:
        containers:
          aside:
            id: aside
            kind: Container
            order: 3
            required: true
          main:
            id: main
            kind: Container
            order: 2
            required: true
          nav:
            id: nav
            kind: Container
            order: 1
            required: true
        screen_class: ProjectBoardScreen
        tcss:
          rules:
          - declarations:
              layout: horizontal
            selector: screen
          - declarations:
              width: '32'
            selector: region.nav
          - declarations:
              width: '28'
            selector: region.aside
    resource: Project
    states:
      ready: {}
    sync:
    - do:
      - set:
          context: selected_project_id
          from: $event.project_id
      - send:
          data:
            project_id: $event.project_id
          event: project.selection_changed
          panel: detail
      - send:
          data:
            project_id: $event.project_id
          event: project.selection_changed
          panel: activity
      id: select_project_updates_panels
      when:
        emits: project.selected
        panel: list
entries:
  api.project.create:
    basis: HTTP endpoint for creating a dispatch project.
    method: POST
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/projects
    surface: api
    target:
      capability: project.create
  api.project.list:
    basis: HTTP endpoint for listing dispatch projects.
    method: GET
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/projects
    surface: api
    target:
      capability: project.list
  cli.project.approve:
    args:
      project_id: ID
    basis: CLI entry for approval automation.
    command: project approve
    surface: cli
    target:
      capability: project.approve
  textual.project.board:
    basis: Textual entry for the dispatch board.
    command: project board
    surface: textual
    target:
      view: project.board
  web.project.board:
    basis: Web entry for the dispatch board.
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/dispatch
    surface: web
    target:
      view: project.board
  worker.project.approval_notice:
    basis: Worker entry exposing the approval notice workflow.
    surface: worker
    target:
      workflow: project.approval_notice
workflows:
  project.approval_notice:
    basis: Approval event sends a downstream notice.
    steps:
    - capability: project.send_approval_notice
      id: send_notice
    trigger:
      event: project.approved
scenarios:
  project.approval_notice.workflow:
    archetype: workflow_event_success
    basis: Approval event dispatches the notification workflow.
    feature: project.approval_notice
    given:
      facts: []
      fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - project.approved
      invoked:
      - project.send_approval_notice
      workflow:
        ran: true
        ref: project.approval_notice
    title: Approval event sends notice
    when:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: project.approved
  project.approve.success:
    archetype: capability_success
    basis: Approval transitions a submitted project to approved and emits the event.
    feature: project.approve
    given:
      facts:
      - use: fact.project.submitted
      fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - project.approved
      invoked:
      - project.approve
      resource:
        exists:
          resource: Project
          where:
            id: project_submitted_1
            status: approved
    title: Approve submitted dispatch project
    when:
      invoke_capability:
        input:
          project_id: project_submitted_1
        ref: project.approve
  project.board.empty:
    archetype: composed_view
    basis: An empty workspace shows empty list, no detail, and no activity.
    feature: project.board
    given:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      enables:
      - project.create
      forbids:
      - project.approve
      view:
        panels:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: empty
        ref: project.board
        state: ready
        sync:
          observed:
          - select_project_updates_panels
    title: Empty dispatch board
    when:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
  project.board.ready:
    archetype: composed_view
    basis: A populated workspace shows the ready list while detail awaits explicit selection.
    feature: project.board
    given:
      facts:
      - use: fact.project.submitted
      fixtures:
      - fixture.workspace.member
    then:
      enables:
      - project.create
      - project.submit
      view:
        panels:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: ready
        ref: project.board
        state: ready
        sync:
          observed:
          - select_project_updates_panels
    title: Ready dispatch board
    when:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
  project.create.api.success:
    archetype: api_entry_success
    basis: The API create endpoint delegates to the create capability and emits project.created.
    feature: project.create
    given:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      events:
        emitted:
        - project.created
      invoked:
      - project.create
      resource:
        exists:
          resource: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      response:
        status: 200
    title: Create dispatch project through API
    when:
      call_entry:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: api.project.create
