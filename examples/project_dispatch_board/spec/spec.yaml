project: project_dispatch_board
fixtures:
  fixture.workspace.member:
    rationale: Workspace member fixture for HTML/API/Textual behavior scenarios.
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    rationale: Reviewer fixture for approval behavior scenarios.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
preconditions:
  precondition.project.draft:
    rationale: Draft dispatch project used as a secondary row in ready-board audit renders.
    present:
      entity_type: entity_type.project
      values:
        assignee:
          value: Unassigned
        created_at:
          value: '2026-05-10T11:30:00Z'
        customer:
          value: Harbor Logistics
        id:
          value: project_beta
        priority:
          value: Normal
        status:
          value: draft
        summary:
          value: Customer reports intermittent alerts from dock door 3.
        title:
          value: Inspect loading dock sensor
        updated_at:
          value: '2026-05-11T07:15:00Z'
        workspace_id:
          from: $fixture.workspace.id
  precondition.project.submitted:
    rationale: Submitted dispatch project shared by approval, ready-board, and visual audit behavior scenarios.
    present:
      entity_type: entity_type.project
      values:
        assignee:
          value: Maya Chen
        created_at:
          value: '2026-05-10T09:00:00Z'
        customer:
          value: Atlas Foods
        id:
          value: project_submitted_1
        priority:
          value: High
        status:
          value: submitted
        summary:
          value: Technician needs approval before ordering the replacement fan motor.
        title:
          value: Replace rooftop condenser fan
        updated_at:
          value: '2026-05-11T08:45:00Z'
        workspace_id:
          from: $fixture.workspace.id
schemas:
  schema.project.approved:
    rationale: Approval domain events carry only the integration payload required by downstream workflows.
    schema:
      type: object
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      additionalProperties: false
  schema.project.notice_result:
    rationale: Approval notice commands return a transient delivery receipt rather than a durable product entity_type.
    schema:
      type: object
      properties:
        notice_id:
          type: string
        queued_at:
          type: string
          format: date-time
      required:
      - notice_id
      - queued_at
      additionalProperties: false
entity_types:
  entity_type.problem:
    name: Problem
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    schema:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      additionalProperties: false
  entity_type.project:
    name: Project
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
    entity_lifecycle:
      field: status
      initial_state: draft
      lifecycle_states:
      - draft
      - submitted
      - approved
      - archived
      lifecycle_transitions:
      - from: draft
        to: submitted
        triggered_by: command.project.submit
      - from: submitted
        to: approved
        triggered_by: command.project.approve
      - from: approved
        to: archived
        triggered_by: command.project.archive
    schema:
      type: object
      properties:
        assignee:
          type: string
        created_at:
          type: string
          format: date-time
        customer:
          type: string
        id:
          type: string
        priority:
          type: string
        status:
          type: string
          enum:
          - draft
          - submitted
          - approved
          - archived
        summary:
          type: string
        title:
          type: string
        updated_at:
          type: string
          format: date-time
        workspace_id:
          type: string
      required:
      - assignee
      - created_at
      - customer
      - id
      - priority
      - status
      - summary
      - title
      - updated_at
      - workspace_id
      additionalProperties: false
access_policies:
  access_policy.project.member:
    rationale: Workspace members may create, read, list, and submit dispatch projects.
    subject:
    - kind: actor
    resource:
    - entity_type: entity_type.project
    action:
    - command.project.create
    - query.project.list
    - query.project.read
    - command.project.submit
    environment: []
    rules:
    - condition:
        subject_has_role: member
      effect: permit
    combining_algorithm: all_permit_rules_must_match
  access_policy.project.reviewer:
    rationale: Reviewers may approve, archive, and send approval notices for dispatch projects.
    subject:
    - kind: actor
    resource:
    - entity_type: entity_type.project
    action:
    - command.project.approve
    - command.project.archive
    - command.project.send_approval_notice
    environment: []
    rules:
    - condition:
        subject_has_role: reviewer
      effect: permit
    combining_algorithm: all_permit_rules_must_match
commands:
  command.project.approve:
    rationale: Reviewers can approve submitted dispatch projects.
    input_schema:
      type: object
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      additionalProperties: false
    entity_changes: {}
    outcomes:
      approved:
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      lifecycle_transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    emits_domain_events:
    - domain_event: domain_event.project.approved
      payload_bindings:
        approved_by:
          from: $command_input.approved_by
        project_id:
          from: $command_input.project_id
      outcome: approved
    authorization:
      policy: access_policy.project.reviewer
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    idempotent: true
    retryable: true
  command.project.archive:
    rationale: Approved dispatch projects can be archived.
    input_schema:
      type: object
      properties:
        project_id:
          type: string
      required:
      - project_id
      additionalProperties: false
    entity_changes: {}
    outcomes:
      archived:
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      lifecycle_transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    emits_domain_events:
    - domain_event: domain_event.project.archived
      payload_source: $command_outcome.result
      outcome: archived
    authorization:
      policy: access_policy.project.reviewer
      authentication_required_as: authentication_required
      access_denied_as: access_denied
  command.project.create:
    rationale: Members can create a new dispatch project.
    input_schema:
      type: object
      properties:
        customer:
          type: string
        priority:
          type: string
        title:
          type: string
        workspace_id:
          type: string
      required:
      - customer
      - priority
      - title
      - workspace_id
      additionalProperties: false
    entity_changes:
      creates:
      - entity_type.project
    outcomes:
      created:
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      validation_failed:
        kind: failure
        result:
          $ref: entity_type.problem
    emits_domain_events:
    - domain_event: domain_event.project.created
      payload_source: $command_outcome.result
      outcome: created
    authorization:
      policy: access_policy.project.member
      authentication_required_as: authentication_required
      access_denied_as: access_denied
  command.project.send_approval_notice:
    rationale: Approval triggers a notification command for downstream coordination.
    input_schema:
      type: object
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      additionalProperties: false
    entity_changes: {}
    outcomes:
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      sent:
        kind: success
        result:
          $ref: schema.project.notice_result
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    emits_domain_events: []
    authorization:
      policy: access_policy.project.reviewer
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    idempotent: true
    retryable: true
  command.project.submit:
    rationale: Draft dispatch projects can be submitted for review.
    input_schema:
      type: object
      properties:
        project_id:
          type: string
      required:
      - project_id
      additionalProperties: false
    entity_changes: {}
    outcomes:
      lifecycle_transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      submitted:
        kind: success
        result:
          $ref: entity_type.project
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    emits_domain_events:
    - domain_event: domain_event.project.submitted
      payload_source: $command_outcome.result
      outcome: submitted
    authorization:
      policy: access_policy.project.member
      authentication_required_as: authentication_required
      access_denied_as: access_denied
queries:
  query.project.list:
    rationale: The board requires a project list query scoped by workspace.
    input_schema:
      type: object
      properties:
        workspace_id:
          type: string
      required:
      - workspace_id
      additionalProperties: false
    result_schema:
      type: array
      items:
        $ref: entity_type.project
    outcomes:
      listed:
        kind: success
        result:
          type: array
          items:
            $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        kind: failure
        result:
          $ref: entity_type.problem
  query.project.read:
    rationale: The detail state machine loads the selected project by id.
    input_schema:
      type: object
      properties:
        project_id:
          type: string
      required:
      - project_id
      additionalProperties: false
    result_schema:
      $ref: entity_type.project
    outcomes:
      found:
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
domain_events:
  domain_event.project.approved:
    rationale: Approval domain events carry the reviewer and project identity needed by notification workflows.
    payload_schema:
      $ref: schema.project.approved
state_machines:
  state_machine.project.activity:
    rationale: The activity state machine summarizes latest status around the selected project.
    entity_type: entity_type.project
    transitions:
    - from: empty
      to: ready
      trigger:
        local_signal: selection_changed
    - local_effects:
      - set:
          context: project_id
          value: null
      from: ready
      to: empty
      trigger:
        local_signal: selection_cleared
    context_schema:
      type: object
      properties:
        project_id:
          type:
          - 'null'
          - string
      required: []
      additionalProperties: false
    local_signals:
      accepts:
        local_signals:
          selection_changed:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
          selection_cleared: {}
    initial_state: empty
    states:
      empty:
        text_slots:
        - heading
        - body
      ready:
        text_slots:
        - heading
        field_slots:
        - updated_at
        - status
        - assignee
        query_bindings:
          read_activity:
            load:
              on_enter: true
            query: query.project.read
            input_mapping:
              project_id:
                from: $state_context.project_id
            local_effects:
              found:
                result_binding:
                  data_key: activity
                  from:
                    from: $query_outcome.result
                no_local_effect:
                  reason: result_bound_without_signal
              access_denied:
                no_local_effect:
                  reason: intentionally_unobservable
                  rationale: The activity panel remains in its current state when authorization blocks the refresh.
              not_found:
                no_local_effect:
                  reason: intentionally_unobservable
                  rationale: The parent detail panel owns not-found display for the selected project.
              authentication_required:
                no_local_effect:
                  reason: intentionally_unobservable
                  rationale: The entry response mapping owns authentication_required display.
  state_machine.project.board:
    archetype: dashboard
    rationale: The dispatch board composes list, detail, and activity state machines through shared selected-project context_resource.
    entity_type: entity_type.project
    context_schema:
      type: object
      properties:
        selected_project_id:
          type:
          - 'null'
          - string
        workspace_id:
          type: string
      required:
      - workspace_id
      additionalProperties: false
    query_bindings:
      list_board:
        result_scope: shared
        rationale: Board-level project list is shared shell data for composed child state machines; the child list machine
          owns visible loading and empty/non-empty transitions.
        load:
          on_start: true
        query: query.project.list
        input_mapping:
          workspace_id:
            from: $state_context.workspace_id
        local_effects:
          listed:
            result_binding:
              data_key: projects
              from:
                from: $query_outcome.result
            no_local_effect:
              reason: result_bound_without_signal
          access_denied:
            no_local_effect:
              reason: handled_by_response_surface
              rationale: The board shell leaves child surfaces unchanged when list access is access_denied.
          authentication_required:
            no_local_effect:
              reason: handled_by_response_surface
              rationale: The entry response mapping owns authentication_required display.
          unavailable:
            no_local_effect:
              reason: handled_by_response_surface
              rationale: The board shell leaves child surfaces unchanged while the list service is unavailable.
    initial_state: ready
    states:
      ready:
        render_examples:
          empty:
            rationale: Audit render for empty board state vector.
            seed_fixtures:
            - fixture.workspace.member
            instances:
              activity:
                state: empty
              detail:
                state: none
              list:
                state: empty
          ready_selected:
            rationale: Audit render for selected-project board state vector using named project preconditions.
            context:
              selected_project_id:
                value: project_submitted_1
            precondition_refs:
            - ref: precondition.project.submitted
            - ref: precondition.project.draft
            seed_fixtures:
            - fixture.workspace.member
            instances:
              activity:
                state: ready
              detail:
                state: ready
              list:
                state: ready
        child_state_machines:
        - context_bindings:
            selected_project_id:
              from: $state_machine.selected_project_id
            workspace_id:
              from: $state_machine.workspace_id
          id: list
          state_machine: state_machine.project.list
          html_region: nav
          textual_container: nav
          initial_state: loading
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          id: detail
          selected:
            condition:
              context_non_null: selected_project_id
            state: loading
          state_machine: state_machine.project.detail
          html_region: main
          textual_container: main
          initial_state: none
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          id: activity
          selected:
            condition:
              context_non_null: selected_project_id
            state: ready
          state_machine: state_machine.project.activity
          html_region: aside
          textual_container: aside
          initial_state: empty
        signal_sync_rules:
        - local_effects:
          - set:
              context: selected_project_id
              from: $trigger.payload.project_id
          - send:
              instance: detail
              local_signal: selection_changed
              payload_bindings:
                project_id:
                  from: $trigger.payload.project_id
          - send:
              instance: activity
              local_signal: selection_changed
              payload_bindings:
                project_id:
                  from: $trigger.payload.project_id
          id: select_project_updates_state_machines
          trigger:
            instance: list
            local_signal: project_selected
        renderers:
          textual:
            layout:
              containers:
                aside:
                  id: aside
                  container_class: Container
                  order: 3
                  must_render: true
                main:
                  id: main
                  container_class: Container
                  order: 2
                  must_render: true
                nav:
                  id: nav
                  container_class: Container
                  order: 1
                  must_render: true
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: container.nav
              - declarations:
                  width: '28'
                selector: container.aside
          html:
            layout:
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  order: 3
                  must_render: true
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  order: 2
                  must_render: true
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  order: 1
                  must_render: true
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            style:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
  state_machine.project.detail:
    rationale: The detail state machine is independent from the list and reacts to selected project context_resource.
    entity_type: entity_type.project
    transitions:
    - from: none
      to: loading
      trigger:
        local_signal: selection_changed
    - from: loading
      to: ready
      trigger:
        data_refresh_signal: project_loaded
    - from: loading
      to: error
      trigger:
        data_refresh_signal: project_load_failed
    - local_effects:
      - set:
          context: project_id
          value: null
      from: ready
      to: none
      trigger:
        local_signal: selection_cleared
    - from: ready
      rationale: Detail mutations mark ready-state project data stale and trigger query refresh.
      to: ready
      trigger:
        data_refresh_signal: project_changed
    - from: ready
      rationale: Invalid detail commands move the detail panel into its displayable error state.
      to: error
      trigger:
        local_signal: show_lifecycle_transition_not_allowed
    context_schema:
      type: object
      properties:
        project_id:
          type:
          - 'null'
          - string
      required: []
      additionalProperties: false
    local_signals:
      accepts:
        local_signals:
          selection_changed:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
          selection_cleared: {}
          show_lifecycle_transition_not_allowed:
            payload_schema:
              type: object
              properties:
                message:
                  type: string
              required:
              - message
              additionalProperties: false
        data_refresh_signals:
          project_changed: {}
          project_load_failed: {}
          project_loaded: {}
    initial_state: none
    states:
      error:
        text_slots:
        - heading
        - body
      loading:
        text_slots:
        - message
        query_bindings:
          read_project:
            load:
              on_enter: true
            query: query.project.read
            input_mapping:
              project_id:
                from: $state_context.project_id
            local_effects:
              found:
                result_binding:
                  data_key: project
                  from:
                    from: $query_outcome.result
                raise:
                  data_refresh_signal: project_loaded
              access_denied:
                raise:
                  data_refresh_signal: project_load_failed
              not_found:
                raise:
                  data_refresh_signal: project_load_failed
              authentication_required:
                raise:
                  data_refresh_signal: project_load_failed
      none:
        text_slots:
        - heading
        - body
      ready:
        asset_slots:
        - priority_badge
        text_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
        query_bindings:
          read_project:
            load:
              on_enter: true
              refresh_on:
              - data_refresh_signal: project_changed
            query: query.project.read
            input_mapping:
              project_id:
                from: $state_context.project_id
            local_effects:
              found:
                result_binding:
                  data_key: project
                  from:
                    from: $query_outcome.result
                no_local_effect:
                  reason: result_bound_without_signal
              access_denied:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $query_outcome.result.message
              not_found:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $query_outcome.result.message
              authentication_required:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $query_outcome.result.message
        command_bindings:
          approve:
            command: command.project.approve
            input_mapping:
              approved_by:
                from: $principal.id
              project_id:
                from: $state_context.project_id
            local_effects:
              approved:
                raise:
                  data_refresh_signal: project_changed
              access_denied:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping keeps the detail panel unchanged for access_denied approval.
              lifecycle_transition_not_allowed:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              not_found:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping reports a missing project without a local transition.
              unavailable:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping reports temporary unavailability without a local transition.
              authentication_required:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping reports authentication failure without a local transition.
          archive:
            command: command.project.archive
            input_mapping:
              project_id:
                from: $state_context.project_id
            local_effects:
              archived:
                raise:
                  data_refresh_signal: project_changed
              access_denied:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              lifecycle_transition_not_allowed:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              not_found:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              authentication_required:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
  state_machine.project.list:
    rationale: The list state machine owns collection loading, empty, ready, error, and selection behavior.
    entity_type: entity_type.project
    transitions:
    - from: loading
      to: empty
      trigger:
        data_refresh_signal: project_collection_empty
    - from: loading
      to: ready
      trigger:
        data_refresh_signal: projects_loaded
    - from: loading
      to: error
      trigger:
        data_refresh_signal: project_list_failed
    - from: empty
      to: ready
      trigger:
        data_refresh_signal: projects_loaded
    - from: empty
      rationale: List mutations invalidate the empty collection and let the list query refresh it.
      to: empty
      trigger:
        data_refresh_signal: projects_changed
    - from: empty
      rationale: Invalid create attempts move the list into its displayable error state.
      to: error
      trigger:
        local_signal: show_lifecycle_transition_not_allowed
    - local_effects:
      - emit:
          local_signal: project_selected
          payload_bindings:
            project_id:
              from: $trigger.payload.project_id
      from: ready
      to: ready
      trigger:
        local_signal: project_select
    - from: ready
      rationale: List mutations mark ready-state collection data stale and trigger query refresh.
      to: ready
      trigger:
        data_refresh_signal: projects_changed
    - from: ready
      rationale: Successful list queries refresh ready-state collection data.
      to: ready
      trigger:
        data_refresh_signal: projects_loaded
    - from: ready
      rationale: Invalid list queries move the list into its displayable error state.
      to: error
      trigger:
        local_signal: show_lifecycle_transition_not_allowed
    context_schema:
      type: object
      properties:
        selected_project_id:
          type:
          - 'null'
          - string
        workspace_id:
          type: string
      required:
      - workspace_id
      additionalProperties: false
    query_bindings:
      list_projects:
        result_scope: local
        load:
          on_start: true
          refresh_on:
          - data_refresh_signal: projects_changed
        query: query.project.list
        input_mapping:
          workspace_id:
            from: $state_context.workspace_id
        local_effects:
          listed:
            conditional_local_effects:
            - result_condition: empty
              result_binding:
                data_key: projects
                from:
                  from: $query_outcome.result
              context_updates:
                workspace_id:
                  from: $query_binding.input.workspace_id
              raise:
                data_refresh_signal: project_collection_empty
            - result_condition: non_empty
              result_binding:
                data_key: projects
                from:
                  from: $query_outcome.result
              context_updates:
                workspace_id:
                  from: $query_binding.input.workspace_id
              raise:
                data_refresh_signal: projects_loaded
          access_denied:
            raise:
              data_refresh_signal: project_list_failed
          authentication_required:
            raise:
              data_refresh_signal: project_list_failed
          unavailable:
            raise:
              data_refresh_signal: project_list_failed
    local_signals:
      accepts:
        local_signals:
          project_select:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
          show_lifecycle_transition_not_allowed:
            payload_schema:
              type: object
              properties:
                message:
                  type: string
              required:
              - message
              additionalProperties: false
        data_refresh_signals:
          project_collection_empty: {}
          project_list_failed: {}
          projects_changed: {}
          projects_loaded: {}
      emits:
        local_signals:
          project_selected:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
    initial_state: loading
    states:
      empty:
        asset_slots:
        - illustration
        text_slots:
        - heading
        - body
        command_bindings:
          create:
            command: command.project.create
            input_mapping:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $state_context.workspace_id
            local_effects:
              created:
                raise:
                  data_refresh_signal: projects_changed
              access_denied:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping keeps the empty list visible for access_denied create.
              authentication_required:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping reports authentication failure without a local transition.
              validation_failed:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
      error:
        text_slots:
        - heading
        - body
      loading:
        text_slots:
        - message
      ready:
        text_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
        command_bindings:
          create:
            command: command.project.create
            input_mapping:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $state_context.workspace_id
            local_effects:
              created:
                raise:
                  data_refresh_signal: projects_changed
              access_denied:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping keeps the ready list visible for access_denied create.
              authentication_required:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response mapping reports authentication failure without a local transition.
              validation_failed:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The ready list keeps focus while the response mapping shows validation errors.
          submit:
            command: command.project.submit
            input_mapping:
              project_id:
                from: $state_context.selected_project_id
            local_effects:
              access_denied:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              lifecycle_transition_not_allowed:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              not_found:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              submitted:
                raise:
                  data_refresh_signal: projects_changed
              authentication_required:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
external_interfaces:
  external_interface.api.project.create:
    adapter:
      http_api:
        method: POST
        path: /workspaces/{workspace_id}/projects
    rationale: HTTP endpoint for creating a dispatch project.
    invokes:
      command:
        ref: command.project.create
    input_mapping:
      body:
        customer:
          type: string
        priority:
          type: string
        title:
          type: string
      path_params:
        workspace_id:
          type: string
      bindings:
        customer:
          from: $adapter_input.body.customer
        priority:
          from: $adapter_input.body.priority
        title:
          from: $adapter_input.body.title
        workspace_id:
          from: $adapter_input.path_params.workspace_id
    output_mapping:
      responses:
        created:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.project
          status: 201
        access_denied:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 403
        authentication_required:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 401
        validation_failed:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 422
  external_interface.api.project.list:
    adapter:
      http_api:
        method: GET
        path: /workspaces/{workspace_id}/projects
    rationale: HTTP endpoint for listing dispatch projects.
    invokes:
      query:
        ref: query.project.list
    input_mapping:
      path_params:
        workspace_id:
          type: string
      bindings:
        workspace_id:
          from: $adapter_input.path_params.workspace_id
    output_mapping:
      responses:
        listed:
          body:
            from: $invocation_outcome.result
            type:
              type: array
              items:
                $ref: entity_type.project
          status: 200
        access_denied:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 403
        authentication_required:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 401
        unavailable:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 503
  external_interface.api.project.approve:
    idempotent: true
    retryable: true
    adapter:
      http_api:
        method: POST
        path: /projects/{project_id}/approve
    rationale: HTTP endpoint for approving submitted dispatch projects.
    invokes:
      command:
        ref: command.project.approve
    input_mapping:
      body:
        approved_by:
          type: string
      path_params:
        project_id:
          type: string
      bindings:
        approved_by:
          from: $adapter_input.body.approved_by
        project_id:
          from: $adapter_input.path_params.project_id
    output_mapping:
      responses:
        approved:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.project
          status: 200
        access_denied:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 403
        lifecycle_transition_not_allowed:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 409
        not_found:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 404
        unavailable:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 503
        authentication_required:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 401
  external_interface.cli.project.approve:
    adapter:
      cli:
        cli_command: project approve
    rationale: CLI entry for approval automation.
    invokes:
      external_interface:
        ref: external_interface.api.project.approve
    input_mapping:
      args:
        approved_by:
          type: string
        project_id:
          type: string
      delegated_input:
        body:
          approved_by:
            from: $adapter_input.args.approved_by
        path_params:
          project_id:
            from: $adapter_input.args.project_id
    output_mapping:
      response_handlers:
        approved:
          exit_code: 0
          stdout:
            text: text_resource.project.approve.success
            bindings:
              project_id:
                from: $adapter_response.body.id
        access_denied:
          exit_code: 5
          stderr:
            text: text_resource.project.approve.access_denied
            bindings:
              message:
                from: $adapter_response.body.message
        lifecycle_transition_not_allowed:
          exit_code: 2
          stderr:
            text: text_resource.project.approve.lifecycle_transition_not_allowed
            bindings:
              message:
                from: $adapter_response.body.message
        not_found:
          exit_code: 3
          stderr:
            text: text_resource.project.approve.not_found
            bindings:
              message:
                from: $adapter_response.body.message
        unavailable:
          exit_code: 75
          retry_policy:
            attempts: 3
            backoff: exponential
          stderr:
            text: text_resource.project.approve.unavailable
        authentication_required:
          exit_code: 4
          stderr:
            text: text_resource.project.approve.authentication_required
            bindings:
              message:
                from: $adapter_response.body.message
  external_interface.cli.project.board:
    adapter:
      cli:
        cli_command: project board
    rationale: CLI launcher for the Textual dispatch board.
    invokes:
      state_machine:
        ref: state_machine.project.board
        renderer: textual
    input_mapping:
      args:
        workspace_id:
          type: string
      bindings:
        workspace_id:
          from: $adapter_input.args.workspace_id
    output_mapping: {}
  external_interface.html.project.board:
    adapter:
      html_route:
        path: /workspaces/{workspace_id}/dispatch
    rationale: HTML entry for the dispatch board.
    invokes:
      state_machine:
        ref: state_machine.project.board
        renderer: html
    input_mapping:
      path_params:
        workspace_id:
          type: string
      bindings:
        workspace_id:
          from: $adapter_input.path_params.workspace_id
    output_mapping: {}
  external_interface.worker.project.approval_notice:
    adapter:
      worker: {}
    rationale: Worker entry exposing the approval notice workflow.
    invokes:
      workflow:
        ref: workflow.project.approval_notice
    input_mapping:
      payload:
        $ref: schema.project.approved
      bindings:
        approved_by:
          from: $adapter_input.payload.approved_by
        project_id:
          from: $adapter_input.payload.project_id
    output_mapping:
      ingress_responses:
        accepted:
          disposition: acknowledge
        malformed:
          disposition: dead_letter
          problem:
            $ref: entity_type.problem
workflows:
  workflow.project.approval_notice:
    rationale: Approval domain event sends a downstream notice.
    activities:
    - id: send_notice
      command: command.project.send_approval_notice
      input_mapping:
        approved_by:
          from: $workflow_input.payload.approved_by
        project_id:
          from: $workflow_input.payload.project_id
    gateways:
      notice_success:
        gateway_type: exclusive
        rationale: Successful notice delivery enters the terminal success branch.
    sequence_flows:
      send_notice_delivery_failed:
        source_ref:
          activity: send_notice
        source_result: delivery_failed
        target_ref:
          terminal: delivery_failed
        retry_policy:
          attempts: 3
          backoff: exponential
      send_notice_access_denied:
        source_ref:
          activity: send_notice
        source_result: access_denied
        target_ref:
          terminal: notice_access_denied
      send_notice_sent:
        source_ref:
          activity: send_notice
        source_result: sent
        target_ref:
          gateway: notice_success
      notice_success_completed:
        source_ref:
          gateway: notice_success
        target_ref:
          terminal: completed
      send_notice_authentication_required:
        source_ref:
          activity: send_notice
        source_result: authentication_required
        target_ref:
          terminal: notice_authentication_required
    inputs:
      domain_event: domain_event.project.approved
    outputs:
      completed:
        kind: success
        result:
          $ref: schema.project.notice_result
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    retry_policies: {}
    failure_handlers: {}
behavior_scenarios:
  behavior_scenario.project.approval_notice.workflow:
    archetype: workflow_execution_success
    rationale: Approval domain event dispatches the notification workflow.
    feature_tag: project.approval_notice
    system_under_test_ref:
      workflow: workflow.project.approval_notice
    given:
      preconditions: []
      seed_fixtures:
      - fixture.workspace.reviewer
    then:
      domain_events:
        emitted:
        - domain_event.project.approved
      invoked:
      - command.project.send_approval_notice
      workflow:
        outcome: completed
        executed: true
        ref: workflow.project.approval_notice
    title: Approval domain event sends notice
    when:
      emit_domain_event:
        payload:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: domain_event.project.approved
  behavior_scenario.project.approve.success:
    archetype: command_outcome
    rationale: Approval transitions a submitted project to approved and emits the domain event.
    feature_tag: project.approve
    system_under_test_ref:
      command: command.project.approve
    given:
      preconditions:
      - ref: precondition.project.submitted
      seed_fixtures:
      - fixture.workspace.reviewer
    then:
      domain_events:
        emitted:
        - domain_event.project.approved
      invoked:
      - command.project.approve
      entity:
        exists:
          entity_type: entity_type.project
          where:
            id:
              value: project_submitted_1
            status:
              value: approved
      outcome: approved
    title: Approve submitted dispatch project
    when:
      invoke_command:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: command.project.approve
  behavior_scenario.project.approve.access_denied:
    archetype: authorization_denial
    rationale: A workspace member who is not a reviewer receives the mapped access_denied outcome before approval executes.
    feature_tag: project.approve
    system_under_test_ref:
      command: command.project.approve
    given:
      preconditions:
      - ref: precondition.project.submitted
      seed_fixtures:
      - fixture.workspace.member
    then:
      authorization:
        denied:
        - command: command.project.approve
      domain_events:
        not_emitted:
        - domain_event.project.approved
      outcome: access_denied
    title: Approval authorization maps access_denied outcome
    when:
      invoke_command:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: command.project.approve
  behavior_scenario.project.board.empty:
    archetype: state_machine_composition
    rationale: An empty workspace shows empty list, no detail, and no activity.
    feature_tag: project.board
    system_under_test_ref:
      state_machine: state_machine.project.board
    given:
      preconditions:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    then:
      enables:
      - command.project.create
      authorization:
        denied:
        - command: command.project.approve
      state_machine:
        instances:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: empty
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        state: ready
    title: Empty dispatch board
    when:
      open_external_interface:
        input:
          workspace_id:
            from: $fixture.workspace.id
        ref: external_interface.html.project.board
  behavior_scenario.project.board.ready:
    archetype: state_machine_composition
    rationale: A populated workspace shows the ready list while detail awaits explicit selection.
    feature_tag: project.board
    system_under_test_ref:
      state_machine: state_machine.project.board
    given:
      preconditions:
      - ref: precondition.project.submitted
      seed_fixtures:
      - fixture.workspace.member
    then:
      enables:
      - command.project.create
      - command.project.submit
      state_machine:
        instances:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: ready
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        state: ready
    title: Ready dispatch board
    when:
      open_external_interface:
        input:
          workspace_id:
            from: $fixture.workspace.id
        ref: external_interface.html.project.board
  behavior_scenario.project.create.api.success:
    archetype: external_interface_response
    rationale: The API create endpoint delegates to the create command and emits project.created.
    feature_tag: project.create
    system_under_test_ref:
      external_interface: external_interface.api.project.create
    given:
      preconditions:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    then:
      domain_events:
        emitted:
        - domain_event.project.created
      invoked:
      - command.project.create
      entity:
        exists:
          entity_type: entity_type.project
          where:
            title:
              value: Replace rooftop condenser fan
            workspace_id:
              from: $fixture.workspace.id
      outcome: created
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_external_interface:
        input:
          customer:
            value: Atlas Foods
          priority:
            value: High
          title:
            value: Replace rooftop condenser fan
          workspace_id:
            from: $fixture.workspace.id
        ref: external_interface.api.project.create
