project: project_dispatch_board
fixtures:
  fixture.workspace.member:
    rationale: Workspace member fixture for HTML/API/Textual test cases.
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    rationale: Reviewer fixture for approval test cases.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
facts:
  fact.project.draft:
    rationale: Draft dispatch project used as a secondary row in ready-board audit renders.
    present:
      model: Project
      values:
        assignee: Unassigned
        created_at: '2026-05-10T11:30:00Z'
        customer: Harbor Logistics
        id: project_beta
        priority: Normal
        status: draft
        summary: Customer reports intermittent alerts from dock door 3.
        title: Inspect loading dock sensor
        updated_at: '2026-05-11T07:15:00Z'
        workspace_id: $fixture.workspace.id
  fact.project.submitted:
    rationale: Submitted dispatch project shared by approval, ready-board, and visual audit test cases.
    present:
      model: Project
      values:
        assignee: Maya Chen
        created_at: '2026-05-10T09:00:00Z'
        customer: Atlas Foods
        id: project_submitted_1
        priority: High
        status: submitted
        summary: Technician needs approval before ordering the replacement fan motor.
        title: Replace rooftop condenser fan
        updated_at: '2026-05-11T08:45:00Z'
        workspace_id: $fixture.workspace.id
data_contracts:
  data_contract.project.approved:
    rationale: Approval events carry only the integration payload required by downstream workflows.
    fields:
      approved_by:
        nullable: false
        required: true
        type:
          primitive: ID
      project_id:
        nullable: false
        required: true
        type:
          primitive: ID
  data_contract.project.notice_result:
    rationale: Approval notice commands return a transient delivery receipt rather than a durable product model.
    fields:
      notice_id:
        nullable: false
        required: true
        type:
          primitive: ID
      queued_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
models:
  Problem:
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    fields:
      code:
        nullable: false
        required: true
        type:
          primitive: Text
      message:
        nullable: false
        required: true
        type:
          primitive: Text
  Project:
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
    fields:
      assignee:
        nullable: false
        required: true
        type:
          primitive: Text
      created_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      customer:
        nullable: false
        required: true
        type:
          primitive: Text
      id:
        nullable: false
        required: true
        type:
          primitive: ID
      priority:
        nullable: false
        required: true
        type:
          primitive: Text
      status:
        nullable: false
        required: true
        type:
          enum:
          - draft
          - submitted
          - approved
          - archived
      summary:
        nullable: false
        required: true
        type:
          primitive: Text
      title:
        nullable: false
        required: true
        type:
          primitive: Text
      updated_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      workspace_id:
        nullable: false
        required: true
        type:
          primitive: ID
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - from: draft
        to: submitted
        triggered_by: operation.project.submit
      - from: submitted
        to: approved
        triggered_by: operation.project.approve
      - from: approved
        to: archived
        triggered_by: operation.project.archive
operations:
  operation.project.approve:
    rationale: Reviewers can approve submitted dispatch projects.
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      approved:
        emits:
        - event: event.project.approved
          payload_bindings:
            approved_by: $input.approved_by
            project_id: $input.project_id
        kind: success
        result:
          model: Project
      invalid_state:
        kind: failure
        result:
          model: Problem
      not_found:
        kind: failure
        result:
          model: Problem
  operation.project.archive:
    rationale: Approved dispatch projects can be archived.
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      archived:
        emits:
        - event: event.project.archived
          payload_source: $outcome.result
        kind: success
        result:
          model: Project
      invalid_state:
        kind: failure
        result:
          model: Problem
      not_found:
        kind: failure
        result:
          model: Problem
  operation.project.create:
    rationale: Members can create a new dispatch project.
    creates:
    - Project
    input:
      customer:
        primitive: Text
      priority:
        primitive: Text
      title:
        primitive: Text
      workspace_id:
        primitive: ID
    operation_kind: command
    outcomes:
      created:
        emits:
        - event: event.project.created
          payload_source: $outcome.result
        kind: success
        result:
          model: Project
      validation_failed:
        kind: failure
        result:
          model: Problem
  operation.project.list:
    rationale: The board requires a project list query scoped by workspace.
    input:
      workspace_id:
        primitive: ID
    operation_kind: query
    outcomes:
      listed:
        kind: success
        result:
          array:
            model: Project
      unavailable:
        kind: failure
        result:
          model: Problem
    reads:
    - Project
  operation.project.read:
    rationale: The detail state machine loads the selected project by id.
    input:
      project_id:
        primitive: ID
    operation_kind: query
    outcomes:
      found:
        kind: success
        result:
          model: Project
      not_found:
        kind: failure
        result:
          model: Problem
    reads:
    - Project
  operation.project.send_approval_notice:
    rationale: Approval triggers a notification command for downstream coordination.
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: command
    outcomes:
      delivery_failed:
        kind: failure
        result:
          model: Problem
      sent:
        kind: success
        result:
          data_contract: data_contract.project.notice_result
  operation.project.submit:
    rationale: Draft dispatch projects can be submitted for review.
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      invalid_state:
        kind: failure
        result:
          model: Problem
      not_found:
        kind: failure
        result:
          model: Problem
      submitted:
        emits:
        - event: event.project.submitted
          payload_source: $outcome.result
        kind: success
        result:
          model: Project
events:
  event.project.approved:
    rationale: Approval events carry the reviewer and project identity needed by notification workflows.
    payload_schema:
      data_contract: data_contract.project.approved
state_machines:
  state_machine.project.activity:
    rationale: The activity state machine summarizes latest status around the selected project.
    context:
      project_id:
        primitive: ID
    query_dependencies: []
    initial_view_state: empty
    model: Project
    signals:
      accepts:
        message.project.selection_changed:
          payload_schema:
            project_id:
              primitive: ID
        message.selection.cleared: {}
    transitions:
    - from: empty
      on: message.project.selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: message.selection.cleared
      to: empty
    view_states:
      empty:
        text_slots:
        - heading
        - body
      ready:
        text_slots:
        - heading
        query_dependencies:
        - operation.project.read
        field_slots:
        - updated_at
        - status
        - assignee
  state_machine.project.board:
    archetype: dashboard
    rationale: The dispatch board composes list, detail, and activity state machines through shared selected-project context.
    context:
      selected_project_id:
        primitive: ID
      workspace_id:
        primitive: ID
    query_dependencies:
    - operation.project.list
    initial_view_state: ready
    model: Project
    view_states:
      ready:
        render_audit_cases:
          empty:
            rationale: Audit render for empty board state vector.
            seed_fixtures:
            - fixture.workspace.member
            instances:
              activity:
                view_state: empty
              detail:
                view_state: none
              list:
                view_state: empty
          ready_selected:
            rationale: Audit render for selected-project board state vector using named project facts.
            context:
              selected_project_id: project_submitted_1
            facts:
            - ref: fact.project.submitted
            - ref: fact.project.draft
            seed_fixtures:
            - fixture.workspace.member
            instances:
              activity:
                view_state: ready
              detail:
                view_state: ready
              list:
                view_state: ready
        child_state_machines:
        - context_bindings:
            selected_project_id: $state_machine.selected_project_id
            workspace_id: $state_machine.workspace_id
          id: list
          initial_view_state: loading
          region: nav
          state_machine: state_machine.project.list
        - context_bindings:
            project_id: $state_machine.selected_project_id
          id: detail
          initial_view_state: none
          region: main
          selected:
            view_state: loading
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.detail
        - context_bindings:
            project_id: $state_machine.selected_project_id
          id: activity
          initial_view_state: empty
          region: aside
          selected:
            view_state: ready
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.activity
        signal_sync_rules:
        - effects:
          - set:
              context: selected_project_id
              from: $message.project_id
          - send:
              instance: detail
              message: message.project.selection_changed
              payload_bindings:
                project_id: $message.project_id
          - send:
              instance: activity
              message: message.project.selection_changed
              payload_bindings:
                project_id: $message.project_id
          id: select_project_updates_state_machines
          when:
            instance: list
            message: message.project.selected
        renderers:
          textual:
            layout:
              containers:
                aside:
                  id: aside
                  container_class: Container
                  order: 3
                  must_render: true
                main:
                  id: main
                  container_class: Container
                  order: 2
                  must_render: true
                nav:
                  id: nav
                  container_class: Container
                  order: 1
                  must_render: true
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: region.nav
              - declarations:
                  width: '28'
                selector: region.aside
          html:
            layout:
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  order: 3
                  must_render: true
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  order: 2
                  must_render: true
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  order: 1
                  must_render: true
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            style:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
  state_machine.project.detail:
    rationale: The detail state machine is independent from the list and reacts to selected project context.
    context:
      project_id:
        primitive: ID
    query_dependencies: []
    initial_view_state: none
    model: Project
    signals:
      accepts:
        data_signal.error: {}
        data_signal.ready: {}
        message.project.selection_changed:
          payload_schema:
            project_id:
              primitive: ID
        message.selection.cleared: {}
    transitions:
    - from: none
      on: message.project.selection_changed
      to: loading
    - from: loading
      on: data_signal.ready
      to: ready
    - from: loading
      on: data_signal.error
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: message.selection.cleared
      to: none
    view_states:
      error:
        text_slots:
        - heading
        - body
      loading:
        text_slots:
        - message
        query_dependencies:
        - operation.project.read
      none:
        text_slots:
        - heading
        - body
      ready:
        asset_slots:
        - priority_badge
        text_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
        available_operations:
        - operation.project.approve
        - operation.project.archive
  state_machine.project.list:
    rationale: The list state machine owns collection loading, empty, ready, error, and selection behavior.
    context:
      selected_project_id:
        primitive: ID
      workspace_id:
        primitive: ID
    query_dependencies:
    - operation.project.list
    initial_view_state: loading
    model: Project
    signals:
      accepts:
        data_signal.empty: {}
        data_signal.error: {}
        data_signal.ready: {}
        message.project.select:
          payload_schema:
            project_id:
              primitive: ID
      emits:
        message.project.selected:
          payload_schema:
            project_id:
              primitive: ID
    transitions:
    - from: loading
      on: data_signal.empty
      to: empty
    - from: loading
      on: data_signal.ready
      to: ready
    - from: loading
      on: data_signal.error
      to: error
    - from: empty
      on: data_signal.ready
      to: ready
    - effects:
      - emit:
          message: message.project.selected
          payload_bindings:
            project_id: $message.project_id
      from: ready
      on: message.project.select
      to: ready
    view_states:
      empty:
        asset_slots:
        - illustration
        text_slots:
        - heading
        - body
        available_operations:
        - operation.project.create
      error:
        text_slots:
        - heading
        - body
      loading:
        text_slots:
        - message
      ready:
        text_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
        available_operations:
        - operation.project.create
        - operation.project.submit
entry_points:
  entry_point.api.project.create:
    adapter:
      http_api:
        input:
          body:
            customer:
              primitive: Text
            priority:
              primitive: Text
            title:
              primitive: Text
          params:
            workspace_id:
              primitive: ID
        method: POST
        path: /workspaces/{workspace_id}/projects
        responses:
          created:
            body:
              from: $outcome.result
              type:
                model: Project
            status: 201
          validation_failed:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 422
    rationale: HTTP endpoint for creating a dispatch project.
    target:
      operation:
        ref: operation.project.create
        input_bindings:
          customer: $input.body.customer
          priority: $input.body.priority
          title: $input.body.title
          workspace_id: $input.params.workspace_id
  entry_point.api.project.list:
    adapter:
      http_api:
        input:
          params:
            workspace_id:
              primitive: ID
        method: GET
        path: /workspaces/{workspace_id}/projects
        responses:
          listed:
            body:
              from: $outcome.result
              type:
                array:
                  model: Project
            status: 200
          unavailable:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 503
    rationale: HTTP endpoint for listing dispatch projects.
    target:
      operation:
        ref: operation.project.list
        input_bindings:
          workspace_id: $input.params.workspace_id
  entry_point.cli.project.approve:
    adapter:
      cli:
        cli_command: project approve
        input:
          args:
            approved_by:
              primitive: ID
            project_id:
              primitive: ID
        responses:
          approved:
            exit_code: 0
            stdout:
              from: $outcome.result
              type:
                model: Project
          invalid_state:
            exit_code: 2
            stderr:
              from: $outcome.result
              type:
                model: Problem
          not_found:
            exit_code: 3
            stderr:
              from: $outcome.result
              type:
                model: Problem
    rationale: CLI entry for approval automation.
    target:
      operation:
        ref: operation.project.approve
        input_bindings:
          approved_by: $input.args.approved_by
          project_id: $input.args.project_id
  entry_point.cli.project.board:
    adapter:
      cli:
        cli_command: project board
        input:
          args:
            workspace_id:
              primitive: ID
    rationale: CLI launcher for the Textual dispatch board.
    target:
      state_machine:
        ref: state_machine.project.board
        renderer: textual
        input_bindings:
          workspace_id: $input.args.workspace_id
  entry_point.html.project.board:
    adapter:
      html_route:
        input:
          params:
            workspace_id:
              primitive: ID
        path: /workspaces/{workspace_id}/dispatch
    rationale: HTML entry for the dispatch board.
    target:
      state_machine:
        ref: state_machine.project.board
        renderer: html
        input_bindings:
          workspace_id: $input.params.workspace_id
  entry_point.worker.project.approval_notice:
    adapter:
      worker:
        input:
          payload:
            data_contract: data_contract.project.approved
        responses:
          accepted:
            disposition: acknowledge
          malformed:
            disposition: dead_letter
            problem:
              model: Problem
    rationale: Worker entry exposing the approval notice workflow.
    target:
      workflow:
        ref: workflow.project.approval_notice
        trigger_source:
          event: event.project.approved
workflows:
  workflow.project.approval_notice:
    rationale: Approval event sends a downstream notice.
    outcomes:
      completed:
        kind: success
        result:
          data_contract: data_contract.project.notice_result
      delivery_failed:
        kind: failure
        result:
          model: Problem
    steps:
    - id: send_notice
      input_bindings:
        approved_by: $trigger.payload.approved_by
        project_id: $trigger.payload.project_id
      operation: operation.project.send_approval_notice
      outcome_routes:
        delivery_failed:
          retry_policy:
            attempts: 3
            backoff: exponential
            fail_as: delivery_failed
        sent:
          complete_as: completed
    trigger:
      event: event.project.approved
test_cases:
  test_case.project.approval_notice.workflow:
    archetype: workflow_trigger_success
    rationale: Approval event dispatches the notification workflow.
    feature_tag: project.approval_notice
    subject_ref:
      workflow: workflow.project.approval_notice
    given:
      domain_facts: []
      seed_fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.send_approval_notice
      workflow:
        outcome: completed
        executed: true
        ref: workflow.project.approval_notice
    title: Approval event sends notice
    when:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: event.project.approved
  test_case.project.approve.success:
    archetype: operation_outcome
    rationale: Approval transitions a submitted project to approved and emits the event.
    feature_tag: project.approve
    subject_ref:
      operation: operation.project.approve
    given:
      domain_facts:
      - ref: fact.project.submitted
      seed_fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.approve
      model:
        exists:
          model: Project
          where:
            id: project_submitted_1
            status: approved
      outcome: approved
    title: Approve submitted dispatch project
    when:
      invoke_operation:
        input:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: operation.project.approve
  test_case.project.board.empty:
    archetype: state_machine_composition
    rationale: An empty workspace shows empty list, no detail, and no activity.
    feature_tag: project.board
    subject_ref:
      state_machine: state_machine.project.board
    given:
      domain_facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    then:
      enables:
      - operation.project.create
      authorization:
        denied:
        - operation: operation.project.approve
      state_machine:
        instances:
          activity:
            view_state: empty
          detail:
            view_state: none
          list:
            view_state: empty
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        view_state: ready
    title: Empty dispatch board
    when:
      open_entry_point:
        input:
          workspace_id: $fixture.workspace.id
        ref: entry_point.html.project.board
  test_case.project.board.ready:
    archetype: state_machine_composition
    rationale: A populated workspace shows the ready list while detail awaits explicit selection.
    feature_tag: project.board
    subject_ref:
      state_machine: state_machine.project.board
    given:
      domain_facts:
      - ref: fact.project.submitted
      seed_fixtures:
      - fixture.workspace.member
    then:
      enables:
      - operation.project.create
      - operation.project.submit
      state_machine:
        instances:
          activity:
            view_state: empty
          detail:
            view_state: none
          list:
            view_state: ready
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        view_state: ready
    title: Ready dispatch board
    when:
      open_entry_point:
        input:
          workspace_id: $fixture.workspace.id
        ref: entry_point.html.project.board
  test_case.project.create.api.success:
    archetype: entry_point_response
    rationale: The API create endpoint delegates to the create operation and emits project.created.
    feature_tag: project.create
    subject_ref:
      entry_point: entry_point.api.project.create
    given:
      domain_facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    then:
      events:
        emitted:
        - event.project.created
      invoked:
      - operation.project.create
      model:
        exists:
          model: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      outcome: created
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_entry_point:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: entry_point.api.project.create
text_resources:
  text.project.activity.empty.body:
    rationale: Empty activity body.
    max_chars: 120
    placeholder: Activity appears after a project is selected.
    intent: instructional
  text.project.activity.empty.heading:
    rationale: Empty activity heading.
    max_chars: 80
    placeholder: No project selected
    intent: neutral
  text.project.activity.ready.heading:
    rationale: Ready activity heading.
    max_chars: 80
