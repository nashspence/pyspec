project: project_dispatch_board
fixtures:
  fixture.workspace.member:
    basis: Workspace member fixture for web/API/TUI scenarios.
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    basis: Reviewer fixture for approval scenarios.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
facts:
  fact.project.submitted:
    basis: Submitted dispatch project shared by approval, ready-board, and visual audit scenarios.
    present:
      model: Project
      values:
        assignee: Maya Chen
        created_at: '2026-05-10T09:00:00Z'
        customer: Atlas Foods
        id: project_submitted_1
        priority: High
        status: submitted
        summary: Technician needs approval before ordering the replacement fan motor.
        title: Replace rooftop condenser fan
        updated_at: '2026-05-11T08:45:00Z'
        workspace_id: $fixture.workspace.id
  fact.project.draft:
    basis: Draft dispatch project used as a secondary row in ready-board audit renders.
    present:
      model: Project
      values:
        assignee: Unassigned
        created_at: '2026-05-10T11:30:00Z'
        customer: Harbor Logistics
        id: project_beta
        priority: Normal
        status: draft
        summary: Customer reports intermittent alerts from dock door 3.
        title: Inspect loading dock sensor
        updated_at: '2026-05-11T07:15:00Z'
        workspace_id: $fixture.workspace.id
models:
  Project:
    basis: A dispatch project is the durable work item displayed and acted on by the board.
    fields:
      assignee: Text
      created_at: Timestamp
      customer: Text
      id: ID
      priority: Text
      status: ProjectStatus
      summary: Text
      title: Text
      updated_at: Timestamp
      workspace_id: ID
    kind: aggregate
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - by: operation.project.submit
        from: draft
        to: submitted
      - by: operation.project.approve
        from: submitted
        to: approved
      - by: operation.project.archive
        from: approved
        to: archived
  Problem:
    basis: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    fields:
      code: Text
      message: Text
    kind: value_object
  ProjectApproved:
    basis: Approval events carry only the integration payload required by downstream workflows.
    fields:
      approved_by: ID
      project_id: ID
    kind: value_object
capabilities:
  operation.project.approve:
    archetype: transition
    basis: Reviewers can approve submitted dispatch projects.
    input:
      approved_by: ID
      project_id: ID
    outcomes:
      approved:
        emits:
        - event: event.project.approved
          with:
            approved_by: $input.approved_by
            project_id: $input.project_id
        kind: success
        result: Project
      invalid_state:
        kind: failure
        result: Problem
      not_found:
        kind: failure
        result: Problem
  operation.project.archive:
    archetype: transition
    basis: Approved dispatch projects can be archived.
    input:
      project_id: ID
    outcomes:
      archived:
        emits:
        - event: event.project.archived
          payload: $outcome.result
        kind: success
        result: Project
      invalid_state:
        kind: failure
        result: Problem
      not_found:
        kind: failure
        result: Problem
  operation.project.create:
    archetype: create
    basis: Members can create a new dispatch project.
    creates:
    - Project
    input:
      customer: Text
      priority: Text
      title: Text
      workspace_id: ID
    outcomes:
      created:
        emits:
        - event: event.project.created
          payload: $outcome.result
        kind: success
        result: Project
      validation_failed:
        kind: failure
        result: Problem
  operation.project.list:
    archetype: list
    basis: The board requires a project list query scoped by workspace.
    input:
      workspace_id: ID
    outcomes:
      listed:
        kind: success
        result: list[Project]
      unavailable:
        kind: failure
        result: Problem
    reads:
    - Project
  operation.project.read:
    archetype: read
    basis: The detail FSM loads the selected project by id.
    input:
      project_id: ID
    outcomes:
      found:
        kind: success
        result: Project
      not_found:
        kind: failure
        result: Problem
    reads:
    - Project
  operation.project.send_approval_notice:
    archetype: command
    basis: Approval triggers a notification command for downstream coordination.
    input:
      approved_by: ID
      project_id: ID
    outcomes:
      delivery_failed:
        kind: failure
        result: Problem
      sent:
        kind: success
        result: NoticeResult
  operation.project.submit:
    archetype: transition
    basis: Draft dispatch projects can be submitted for review.
    input:
      project_id: ID
    outcomes:
      invalid_state:
        kind: failure
        result: Problem
      not_found:
        kind: failure
        result: Problem
      submitted:
        emits:
        - event: event.project.submitted
          payload: $outcome.result
        kind: success
        result: Project
events:
  event.project.approved:
    basis: Approval events carry the reviewer and project identity needed by notification workflows.
    payload: ProjectApproved
fsms:
  state_machine.project.activity:
    basis: The activity FSM summarizes latest status around the selected project.
    context:
      project_id: ID
    data: []
    messages:
      accepts:
        message.project.selection_changed:
          payload:
            project_id: ID
        message.selection.cleared: {}
    initial: empty
    model: Project
    states:
      empty:
        copy_slots:
        - heading
        - body
      ready:
        copy_slots:
        - heading
        data:
        - operation.project.read
        field_slots:
        - updated_at
        - status
        - assignee
    transitions:
    - on: message.project.selection_changed
      from: empty
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      on: message.selection.cleared
      from: ready
      to: empty
  state_machine.project.detail:
    basis: The detail FSM is independent from the list and reacts to selected project context.
    context:
      project_id: ID
    data: []
    messages:
      accepts:
        data.error: {}
        data.ready: {}
        message.project.selection_changed:
          payload:
            project_id: ID
        message.selection.cleared: {}
    initial: none
    model: Project
    states:
      error:
        copy_slots:
        - heading
        - body
      loading:
        copy_slots:
        - message
        data:
        - operation.project.read
      none:
        copy_slots:
        - heading
        - body
      ready:
        actions:
        - operation.project.approve
        - operation.project.archive
        asset_slots:
        - priority_badge
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
    transitions:
    - on: message.project.selection_changed
      from: none
      to: loading
    - on: data.ready
      from: loading
      to: ready
    - on: data.error
      from: loading
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      on: message.selection.cleared
      from: ready
      to: none
  state_machine.project.list:
    basis: The list FSM owns collection loading, empty, ready, error, and selection behavior.
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - operation.project.list
    messages:
      accepts:
        data.empty: {}
        data.error: {}
        data.ready: {}
        message.project.select:
          payload:
            project_id: ID
      emits:
        message.project.selected:
          payload:
            project_id: ID
    initial: loading
    model: Project
    states:
      empty:
        actions:
        - operation.project.create
        asset_slots:
        - illustration
        copy_slots:
        - heading
        - body
      error:
        copy_slots:
        - heading
        - body
      loading:
        copy_slots:
        - message
      ready:
        actions:
        - operation.project.create
        - operation.project.submit
        copy_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
    transitions:
    - on: data.empty
      from: loading
      to: empty
    - on: data.ready
      from: loading
      to: ready
    - on: data.error
      from: loading
      to: error
    - on: data.ready
      from: empty
      to: ready
    - effects:
      - emit:
          data:
            project_id: $message.project_id
          message: message.project.selected
      on: message.project.select
      from: ready
      to: ready
  state_machine.project.board:
    archetype: dashboard
    basis: The dispatch board composes list, detail, and activity FSMs through shared selected-project context.
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - operation.project.list
    model: Project
    states:
      ready:
        layout:
          html:
            css:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
            regions:
              aside:
                classes:
                - dispatch-board-aside
                element: aside
                order: 3
                required: true
                role: complementary
              main:
                classes:
                - dispatch-board-main
                element: main
                order: 2
                required: true
                role: main
              nav:
                classes:
                - dispatch-board-nav
                element: nav
                order: 1
                required: true
                role: navigation
            root:
              classes:
              - dispatch-board
              element: section
              role: region
          textual:
            containers:
              aside:
                id: aside
                kind: Container
                order: 3
                required: true
              main:
                id: main
                kind: Container
                order: 2
                required: true
              nav:
                id: nav
                kind: Container
                order: 1
                required: true
            screen_class: ProjectBoardScreen
            tcss:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: region.nav
              - declarations:
                  width: '28'
                selector: region.aside
        mounts:
        - context:
            selected_project_id: $state_machine.selected_project_id
            workspace_id: $state_machine.workspace_id
          id: list
          initial: loading
          region: nav
          fsm: state_machine.project.list
        - context:
            project_id: $state_machine.selected_project_id
          id: detail
          initial: none
          region: main
          selected:
            state: loading
            when:
              context_present: selected_project_id
          fsm: state_machine.project.detail
        - context:
            project_id: $state_machine.selected_project_id
          id: activity
          initial: empty
          region: aside
          selected:
            state: ready
            when:
              context_present: selected_project_id
          fsm: state_machine.project.activity
        sync:
        - do:
          - set:
              context: selected_project_id
              from: $message.project_id
          - send:
              data:
                project_id: $message.project_id
              message: message.project.selection_changed
              instance: detail
          - send:
              data:
                project_id: $message.project_id
              message: message.project.selection_changed
              instance: activity
          id: select_project_updates_fsms
          when:
            instance: list
            message: message.project.selected
        audit:
          empty:
            basis: Audit render for empty board state vector.
            fixtures:
            - fixture.workspace.member
            profile: default
            surfaces:
            - html
            - textual
            instances:
              activity:
                state: empty
              detail:
                state: none
              list:
                state: empty
          ready_selected:
            basis: Audit render for selected-project board state vector using named project facts.
            context:
              selected_project_id: project_submitted_1
            facts:
            - use: fact.project.submitted
            - use: fact.project.draft
            fixtures:
            - fixture.workspace.member
            profile: default
            surfaces:
            - html
            - textual
            instances:
              activity:
                state: ready
              detail:
                state: ready
              list:
                state: ready
    initial: ready
entries:
  entry_point.api.project.create:
    basis: HTTP endpoint for creating a dispatch project.
    input:
      body:
        customer: Text
        priority: Text
        title: Text
      params:
        workspace_id: ID
    method: POST
    path: /workspaces/{workspace_id}/projects
    responses:
      created:
        body:
          from: $outcome.result
          type: Project
        status: 201
      validation_failed:
        body:
          from: $outcome.result
          type: Problem
        status: 422
    surface: api
    target:
      capability: operation.project.create
      with:
        customer: $input.body.customer
        priority: $input.body.priority
        title: $input.body.title
        workspace_id: $input.params.workspace_id
  entry_point.api.project.list:
    basis: HTTP endpoint for listing dispatch projects.
    input:
      params:
        workspace_id: ID
    method: GET
    path: /workspaces/{workspace_id}/projects
    responses:
      listed:
        body:
          from: $outcome.result
          type: list[Project]
        status: 200
      unavailable:
        body:
          from: $outcome.result
          type: Problem
        status: 503
    surface: api
    target:
      capability: operation.project.list
      with:
        workspace_id: $input.params.workspace_id
  entry_point.cli.project.approve:
    basis: CLI entry for approval automation.
    command: project approve
    input:
      args:
        approved_by: ID
        project_id: ID
    responses:
      approved:
        exit_code: 0
        stdout:
          from: $outcome.result
          type: Project
      invalid_state:
        exit_code: 2
        stderr:
          from: $outcome.result
          type: Problem
      not_found:
        exit_code: 3
        stderr:
          from: $outcome.result
          type: Problem
    surface: cli
    target:
      capability: operation.project.approve
      with:
        approved_by: $input.args.approved_by
        project_id: $input.args.project_id
  entry_point.cli.project.board:
    basis: CLI launcher for the Textual dispatch board.
    command: project board
    input:
      args:
        workspace_id: ID
    surface: cli
    target:
      fsm:
        name: state_machine.project.board
        surface: textual
      with:
        workspace_id: $input.args.workspace_id
  entry_point.web.project.board:
    basis: Web entry for the dispatch board.
    input:
      params:
        workspace_id: ID
    path: /workspaces/{workspace_id}/dispatch
    surface: web
    target:
      fsm:
        name: state_machine.project.board
        surface: html
      with:
        workspace_id: $input.params.workspace_id
  entry_point.worker.project.approval_notice:
    basis: Worker entry exposing the approval notice workflow.
    input:
      payload: ProjectApproved
    responses:
      accepted:
        disposition: ack
      malformed:
        disposition: dead_letter
        problem: Problem
    surface: worker
    target:
      workflow:
        name: workflow.project.approval_notice
        trigger:
          event: event.project.approved
workflows:
  workflow.project.approval_notice:
    basis: Approval event sends a downstream notice.
    outcomes:
      completed:
        kind: success
        result: NoticeResult
      delivery_failed:
        kind: failure
        result: Problem
    steps:
    - capability: operation.project.send_approval_notice
      id: send_notice
      on:
        delivery_failed:
          fail: delivery_failed
          retry:
            attempts: 3
            backoff: exponential
        sent:
          complete: completed
      with:
        approved_by: $trigger.payload.approved_by
        project_id: $trigger.payload.project_id
    trigger:
      event: event.project.approved
scenarios:
  scenario.project.approval_notice.workflow:
    archetype: workflow_event_success
    basis: Approval event dispatches the notification workflow.
    feature: feature.project.approval_notice
    given:
      facts: []
      fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.send_approval_notice
      workflow:
        outcome: completed
        ran: true
        ref: workflow.project.approval_notice
    title: Approval event sends notice
    when:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: event.project.approved
  scenario.project.approve.success:
    archetype: capability_outcome
    basis: Approval transitions a submitted project to approved and emits the event.
    feature: feature.project.approve
    given:
      facts:
      - use: fact.project.submitted
      fixtures:
      - fixture.workspace.reviewer
    then:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.approve
      model:
        exists:
          model: Project
          where:
            id: project_submitted_1
            status: approved
      outcome: approved
    title: Approve submitted dispatch project
    when:
      invoke_capability:
        input:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: operation.project.approve
  scenario.project.board.empty:
    archetype: fsm_composition
    basis: An empty workspace shows empty list, no detail, and no activity.
    feature: feature.project.board
    given:
      facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      enables:
      - operation.project.create
      forbids:
      - operation.project.approve
      fsm:
        ref: state_machine.project.board
        state: ready
        sync:
          observed:
          - select_project_updates_fsms
        instances:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: empty
    title: Empty dispatch board
    when:
      open_entry:
        input:
          workspace_id: $fixture.workspace.id
        ref: entry_point.web.project.board
  scenario.project.board.ready:
    archetype: fsm_composition
    basis: A populated workspace shows the ready list while detail awaits explicit selection.
    feature: feature.project.board
    given:
      facts:
      - use: fact.project.submitted
      fixtures:
      - fixture.workspace.member
    then:
      enables:
      - operation.project.create
      - operation.project.submit
      fsm:
        ref: state_machine.project.board
        state: ready
        sync:
          observed:
          - select_project_updates_fsms
        instances:
          activity:
            state: empty
          detail:
            state: none
          list:
            state: ready
    title: Ready dispatch board
    when:
      open_entry:
        input:
          workspace_id: $fixture.workspace.id
        ref: entry_point.web.project.board
  scenario.project.create.api.success:
    archetype: entry_response
    basis: The API create endpoint delegates to the create capability and emits project.created.
    feature: feature.project.create
    given:
      facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    then:
      events:
        emitted:
        - event.project.created
      invoked:
      - operation.project.create
      model:
        exists:
          model: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      outcome: created
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_entry:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: entry_point.api.project.create
