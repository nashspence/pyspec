project: project_dispatch_board
fixtures:
  fixture.workspace.member:
    rationale: Workspace member fixture for HTML/API/Textual behavior scenarios.
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    rationale: Reviewer fixture for approval behavior scenarios.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
preconditions:
  precondition.project.draft:
    rationale: Draft dispatch project used as a secondary row in ready-board audit renders.
    present:
      entity_type: entity_type.project
      values:
        assignee:
          value: Unassigned
        created_at:
          value: '2026-05-10T11:30:00Z'
        customer:
          value: Harbor Logistics
        id:
          value: project_beta
        priority:
          value: Normal
        status:
          value: draft
        summary:
          value: Customer reports intermittent alerts from dock door 3.
        title:
          value: Inspect loading dock sensor
        updated_at:
          value: '2026-05-11T07:15:00Z'
        workspace_id:
          from: $fixture.workspace.id
  precondition.project.submitted:
    rationale: Submitted dispatch project shared by approval, ready-board, and visual audit behavior scenarios.
    present:
      entity_type: entity_type.project
      values:
        assignee:
          value: Maya Chen
        created_at:
          value: '2026-05-10T09:00:00Z'
        customer:
          value: Atlas Foods
        id:
          value: project_submitted_1
        priority:
          value: High
        status:
          value: submitted
        summary:
          value: Technician needs approval before ordering the replacement fan motor.
        title:
          value: Replace rooftop condenser fan
        updated_at:
          value: '2026-05-11T08:45:00Z'
        workspace_id:
          from: $fixture.workspace.id
schemas:
  schema.project.approved:
    rationale: Approval domain events carry only the integration payload required by downstream workflows.
    schema:
      type: object
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      additionalProperties: false
  schema.project.notice_result:
    rationale: Approval notice commands return a transient delivery receipt rather than a durable product entity_type.
    schema:
      type: object
      properties:
        notice_id:
          type: string
        queued_at:
          type: string
          format: date-time
      required:
      - notice_id
      - queued_at
      additionalProperties: false
entity_types:
  entity_type.problem:
    name: Problem
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    schema:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      additionalProperties: false
  entity_type.project:
    name: Project
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
    entity_lifecycle:
      field: status
      initial_state: draft
      lifecycle_states:
      - draft
      - submitted
      - approved
      - archived
      lifecycle_transitions:
      - from: draft
        to: submitted
        triggered_by: application_action.project.submit
      - from: submitted
        to: approved
        triggered_by: application_action.project.approve
      - from: approved
        to: archived
        triggered_by: application_action.project.archive
    schema:
      type: object
      properties:
        assignee:
          type: string
        created_at:
          type: string
          format: date-time
        customer:
          type: string
        id:
          type: string
        priority:
          type: string
        status:
          type: string
          enum:
          - draft
          - submitted
          - approved
          - archived
        summary:
          type: string
        title:
          type: string
        updated_at:
          type: string
          format: date-time
        workspace_id:
          type: string
      required:
      - assignee
      - created_at
      - customer
      - id
      - priority
      - status
      - summary
      - title
      - updated_at
      - workspace_id
      additionalProperties: false
authorization_policies:
  authorization_policy.project.member:
    subjects:
    - kind: actor
    resources:
    - action: application_action.project.create
    - action: application_action.project.list
    - action: application_action.project.read
    - action: application_action.project.submit
    - entity_type: entity_type.project
    effect: permit
    conditions:
    - subject_has_role: member
    rationale: Workspace members may create, read, list, and submit dispatch projects.
  authorization_policy.project.reviewer:
    subjects:
    - kind: actor
    resources:
    - action: application_action.project.approve
    - action: application_action.project.archive
    - action: application_action.project.send_approval_notice
    - entity_type: entity_type.project
    effect: permit
    conditions:
    - subject_has_role: reviewer
    rationale: Reviewers may approve, archive, and send approval notices for dispatch projects.
application_actions:
  application_action.project.approve:
    retry_safe: true
    rationale: Reviewers can approve submitted dispatch projects.
    authorization:
      policy: authorization_policy.project.reviewer
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    input:
      type: object
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      additionalProperties: false
    action_kind: lifecycle_transition
    outcomes:
      approved:
        emits:
        - domain_event: domain_event.project.approved
          payload_bindings:
            approved_by:
              from: $input.approved_by
            project_id:
              from: $input.project_id
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
  application_action.project.archive:
    rationale: Approved dispatch projects can be archived.
    authorization:
      policy: authorization_policy.project.reviewer
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    input:
      type: object
      properties:
        project_id:
          type: string
      required:
      - project_id
      additionalProperties: false
    action_kind: lifecycle_transition
    outcomes:
      archived:
        emits:
        - domain_event: domain_event.project.archived
          payload_source: $outcome.result
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
  application_action.project.create:
    rationale: Members can create a new dispatch project.
    authorization:
      policy: authorization_policy.project.member
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    creates:
    - entity_type.project
    input:
      type: object
      properties:
        customer:
          type: string
        priority:
          type: string
        title:
          type: string
        workspace_id:
          type: string
      required:
      - customer
      - priority
      - title
      - workspace_id
      additionalProperties: false
    action_kind: command
    outcomes:
      created:
        emits:
        - domain_event: domain_event.project.created
          payload_source: $outcome.result
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      validation_failed:
        kind: failure
        result:
          $ref: entity_type.problem
  application_action.project.list:
    rationale: The board requires a project list query scoped by workspace.
    authorization:
      policy: authorization_policy.project.member
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    input:
      type: object
      properties:
        workspace_id:
          type: string
      required:
      - workspace_id
      additionalProperties: false
    action_kind: query
    outcomes:
      listed:
        kind: success
        result:
          type: array
          items:
            $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        kind: failure
        result:
          $ref: entity_type.problem
    reads:
    - entity_type.project
  application_action.project.read:
    rationale: The detail state machine loads the selected project by id.
    authorization:
      policy: authorization_policy.project.member
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    input:
      type: object
      properties:
        project_id:
          type: string
      required:
      - project_id
      additionalProperties: false
    action_kind: query
    outcomes:
      found:
        kind: success
        result:
          $ref: entity_type.project
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    reads:
    - entity_type.project
  application_action.project.send_approval_notice:
    retry_safe: true
    rationale: Approval triggers a notification command for downstream coordination.
    authorization:
      policy: authorization_policy.project.reviewer
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    input:
      type: object
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      additionalProperties: false
    action_kind: command
    outcomes:
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      sent:
        kind: success
        result:
          $ref: schema.project.notice_result
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
  application_action.project.submit:
    rationale: Draft dispatch projects can be submitted for review.
    authorization:
      policy: authorization_policy.project.member
      authentication_required_as: authentication_required
      access_denied_as: access_denied
    input:
      type: object
      properties:
        project_id:
          type: string
      required:
      - project_id
      additionalProperties: false
    action_kind: lifecycle_transition
    outcomes:
      transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      submitted:
        emits:
        - domain_event: domain_event.project.submitted
          payload_source: $outcome.result
        kind: success
        result:
          $ref: entity_type.project
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
domain_events:
  domain_event.project.approved:
    rationale: Approval domain events carry the reviewer and project identity needed by notification workflows.
    payload_schema:
      $ref: schema.project.approved
state_machines:
  state_machine.project.activity:
    rationale: The activity state machine summarizes latest status around the selected project.
    context:
      type: object
      properties:
        project_id:
          type:
          - 'null'
          - string
      required: []
      additionalProperties: false
    initial_view_state: empty
    entity_type: entity_type.project
    signals:
      accepts:
        local_signals:
          selection_changed:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
          selection_cleared: {}
    transitions:
    - from: empty
      on:
        local_signal: selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on:
        local_signal: selection_cleared
      to: empty
    view_states:
      empty:
        text_slots:
        - heading
        - body
      ready:
        text_slots:
        - heading
        data_loaders:
          read_activity:
            load:
              on_enter: true
            application_action: application_action.project.read
            input_bindings:
              project_id:
                from: $context.project_id
            outcome_effects:
              found:
                result_binding:
                  data_key: activity
                  from:
                    from: $outcome.result
                no_local_effect:
                  reason: result_bound_without_signal
              access_denied:
                no_local_effect:
                  reason: intentionally_unobservable
                  rationale: The activity panel remains in its current state when authorization blocks the refresh.
              not_found:
                no_local_effect:
                  reason: intentionally_unobservable
                  rationale: The parent detail panel owns not-found display for the selected project.
              authentication_required:
                no_local_effect:
                  reason: intentionally_unobservable
                  rationale: The entry response surface owns authentication_required display.
        field_slots:
        - updated_at
        - status
        - assignee
  state_machine.project.board:
    archetype: dashboard
    rationale: The dispatch board composes list, detail, and activity state machines through shared selected-project context.
    context:
      type: object
      properties:
        selected_project_id:
          type:
          - 'null'
          - string
        workspace_id:
          type: string
      required:
      - workspace_id
      additionalProperties: false
    data_loaders:
      list_board:
        result_scope: shared
        rationale: Board-level project list is shared shell data for composed child state machines; the child list machine
          owns visible loading and empty/non-empty transitions.
        load:
          on_start: true
        application_action: application_action.project.list
        input_bindings:
          workspace_id:
            from: $context.workspace_id
        outcome_effects:
          listed:
            result_binding:
              data_key: projects
              from:
                from: $outcome.result
            no_local_effect:
              reason: result_bound_without_signal
          access_denied:
            no_local_effect:
              reason: handled_by_response_surface
              rationale: The board shell leaves child surfaces unchanged when list access is access_denied.
          authentication_required:
            no_local_effect:
              reason: handled_by_response_surface
              rationale: The entry response surface owns authentication_required display.
          unavailable:
            no_local_effect:
              reason: handled_by_response_surface
              rationale: The board shell leaves child surfaces unchanged while the list service is unavailable.
    initial_view_state: ready
    entity_type: entity_type.project
    view_states:
      ready:
        render_audit_cases:
          empty:
            rationale: Audit render for empty board state vector.
            seed_fixtures:
            - fixture.workspace.member
            instances:
              activity:
                view_state: empty
              detail:
                view_state: none
              list:
                view_state: empty
          ready_selected:
            rationale: Audit render for selected-project board state vector using named project preconditions.
            context:
              selected_project_id:
                value: project_submitted_1
            precondition_refs:
            - ref: precondition.project.submitted
            - ref: precondition.project.draft
            seed_fixtures:
            - fixture.workspace.member
            instances:
              activity:
                view_state: ready
              detail:
                view_state: ready
              list:
                view_state: ready
        child_state_machines:
        - context_bindings:
            selected_project_id:
              from: $state_machine.selected_project_id
            workspace_id:
              from: $state_machine.workspace_id
          id: list
          initial_view_state: loading
          state_machine: state_machine.project.list
          html_region: nav
          textual_container: nav
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          id: detail
          initial_view_state: none
          selected:
            view_state: loading
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.detail
          html_region: main
          textual_container: main
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          id: activity
          initial_view_state: empty
          selected:
            view_state: ready
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.activity
          html_region: aside
          textual_container: aside
        signal_sync_rules:
        - effects:
          - set:
              context: selected_project_id
              from: $local_signal.project_id
          - send:
              instance: detail
              local_signal: selection_changed
              payload_bindings:
                project_id:
                  from: $local_signal.project_id
          - send:
              instance: activity
              local_signal: selection_changed
              payload_bindings:
                project_id:
                  from: $local_signal.project_id
          id: select_project_updates_state_machines
          when:
            instance: list
            local_signal: project_selected
        renderers:
          textual:
            layout:
              containers:
                aside:
                  id: aside
                  container_class: Container
                  order: 3
                  must_render: true
                main:
                  id: main
                  container_class: Container
                  order: 2
                  must_render: true
                nav:
                  id: nav
                  container_class: Container
                  order: 1
                  must_render: true
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: container.nav
              - declarations:
                  width: '28'
                selector: container.aside
          html:
            layout:
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  order: 3
                  must_render: true
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  order: 2
                  must_render: true
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  order: 1
                  must_render: true
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            style:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
  state_machine.project.detail:
    rationale: The detail state machine is independent from the list and reacts to selected project context.
    context:
      type: object
      properties:
        project_id:
          type:
          - 'null'
          - string
      required: []
      additionalProperties: false
    initial_view_state: none
    entity_type: entity_type.project
    signals:
      accepts:
        local_signals:
          selection_changed:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
          selection_cleared: {}
          show_transition_not_allowed:
            payload_schema:
              type: object
              properties:
                message:
                  type: string
              required:
              - message
              additionalProperties: false
        data_refresh_signals:
          project_changed: {}
          project_load_failed: {}
          project_loaded: {}
    transitions:
    - from: none
      on:
        local_signal: selection_changed
      to: loading
    - from: loading
      on:
        data_refresh_signal: project_loaded
      to: ready
    - from: loading
      on:
        data_refresh_signal: project_load_failed
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on:
        local_signal: selection_cleared
      to: none
    - from: ready
      on:
        data_refresh_signal: project_changed
      rationale: Detail mutations mark ready-state project data stale and trigger query refresh.
      to: ready
    - from: ready
      on:
        local_signal: show_transition_not_allowed
      rationale: Invalid detail application_actions move the detail panel into its displayable error state.
      to: error
    view_states:
      error:
        text_slots:
        - heading
        - body
      loading:
        text_slots:
        - message
        data_loaders:
          read_project:
            load:
              on_enter: true
            application_action: application_action.project.read
            input_bindings:
              project_id:
                from: $context.project_id
            outcome_effects:
              found:
                result_binding:
                  data_key: project
                  from:
                    from: $outcome.result
                raise:
                  data_refresh_signal: project_loaded
              access_denied:
                raise:
                  data_refresh_signal: project_load_failed
              not_found:
                raise:
                  data_refresh_signal: project_load_failed
              authentication_required:
                raise:
                  data_refresh_signal: project_load_failed
      none:
        text_slots:
        - heading
        - body
      ready:
        asset_slots:
        - priority_badge
        data_loaders:
          read_project:
            load:
              on_enter: true
              refresh_on:
              - data_refresh_signal: project_changed
            application_action: application_action.project.read
            input_bindings:
              project_id:
                from: $context.project_id
            outcome_effects:
              found:
                result_binding:
                  data_key: project
                  from:
                    from: $outcome.result
                no_local_effect:
                  reason: result_bound_without_signal
              access_denied:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              authentication_required:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        text_slots:
        - heading
        field_slots:
        - title
        - customer
        - status
        - assignee
        - summary
        action_bindings:
          approve:
            application_action: application_action.project.approve
            input_bindings:
              approved_by:
                from: $actor.id
              project_id:
                from: $context.project_id
            outcome_effects:
              approved:
                raise:
                  data_refresh_signal: project_changed
              access_denied:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface keeps the detail panel unchanged for access_denied approval.
              transition_not_allowed:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface reports a missing project without a local transition.
              unavailable:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface reports temporary unavailability without a local transition.
              authentication_required:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface reports authentication failure without a local transition.
          archive:
            application_action: application_action.project.archive
            input_bindings:
              project_id:
                from: $context.project_id
            outcome_effects:
              archived:
                raise:
                  data_refresh_signal: project_changed
              access_denied:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              transition_not_allowed:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              authentication_required:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
  state_machine.project.list:
    rationale: The list state machine owns collection loading, empty, ready, error, and selection behavior.
    context:
      type: object
      properties:
        selected_project_id:
          type:
          - 'null'
          - string
        workspace_id:
          type: string
      required:
      - workspace_id
      additionalProperties: false
    data_loaders:
      list_projects:
        result_scope: local
        load:
          on_start: true
          refresh_on:
          - data_refresh_signal: projects_changed
        application_action: application_action.project.list
        input_bindings:
          workspace_id:
            from: $context.workspace_id
        outcome_effects:
          listed:
            conditional_effects:
            - when:
                result_empty: true
              result_binding:
                data_key: projects
                from:
                  from: $outcome.result
              context_updates:
                workspace_id:
                  from: $invocation.input.workspace_id
              raise:
                data_refresh_signal: project_collection_empty
            - when:
                result_non_empty: true
              result_binding:
                data_key: projects
                from:
                  from: $outcome.result
              context_updates:
                workspace_id:
                  from: $invocation.input.workspace_id
              raise:
                data_refresh_signal: projects_loaded
          access_denied:
            raise:
              data_refresh_signal: project_list_failed
          authentication_required:
            raise:
              data_refresh_signal: project_list_failed
          unavailable:
            raise:
              data_refresh_signal: project_list_failed
    initial_view_state: loading
    entity_type: entity_type.project
    signals:
      accepts:
        local_signals:
          project_select:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
          show_transition_not_allowed:
            payload_schema:
              type: object
              properties:
                message:
                  type: string
              required:
              - message
              additionalProperties: false
        data_refresh_signals:
          project_collection_empty: {}
          project_list_failed: {}
          projects_changed: {}
          projects_loaded: {}
      emits:
        local_signals:
          project_selected:
            payload_schema:
              type: object
              properties:
                project_id:
                  type: string
              required:
              - project_id
              additionalProperties: false
    transitions:
    - from: loading
      on:
        data_refresh_signal: project_collection_empty
      to: empty
    - from: loading
      on:
        data_refresh_signal: projects_loaded
      to: ready
    - from: loading
      on:
        data_refresh_signal: project_list_failed
      to: error
    - from: empty
      on:
        data_refresh_signal: projects_loaded
      to: ready
    - from: empty
      on:
        data_refresh_signal: projects_changed
      rationale: List mutations invalidate the empty collection and let the list query refresh it.
      to: empty
    - from: empty
      on:
        local_signal: show_transition_not_allowed
      rationale: Invalid create attempts move the list into its displayable error state.
      to: error
    - effects:
      - emit:
          local_signal: project_selected
          payload_bindings:
            project_id:
              from: $local_signal.project_id
      from: ready
      on:
        local_signal: project_select
      to: ready
    - from: ready
      on:
        data_refresh_signal: projects_changed
      rationale: List mutations mark ready-state collection data stale and trigger query refresh.
      to: ready
    - from: ready
      on:
        data_refresh_signal: projects_loaded
      rationale: Successful list queries refresh ready-state collection data.
      to: ready
    - from: ready
      on:
        local_signal: show_transition_not_allowed
      rationale: Invalid list application_actions move the list into its displayable error state.
      to: error
    view_states:
      empty:
        asset_slots:
        - illustration
        text_slots:
        - heading
        - body
        action_bindings:
          create:
            application_action: application_action.project.create
            input_bindings:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $context.workspace_id
            outcome_effects:
              created:
                raise:
                  data_refresh_signal: projects_changed
              access_denied:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface keeps the empty list visible for access_denied create.
              authentication_required:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface reports authentication failure without a local transition.
              validation_failed:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
      error:
        text_slots:
        - heading
        - body
      loading:
        text_slots:
        - message
      ready:
        text_slots:
        - heading
        field_slots:
        - title
        - customer
        - priority
        - status
        action_bindings:
          create:
            application_action: application_action.project.create
            input_bindings:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $context.workspace_id
            outcome_effects:
              created:
                raise:
                  data_refresh_signal: projects_changed
              access_denied:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface keeps the ready list visible for access_denied create.
              authentication_required:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The response surface reports authentication failure without a local transition.
              validation_failed:
                no_local_effect:
                  reason: handled_by_response_surface
                  rationale: The ready list keeps focus while the response surface shows validation errors.
          submit:
            application_action: application_action.project.submit
            input_bindings:
              project_id:
                from: $context.selected_project_id
            outcome_effects:
              access_denied:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              transition_not_allowed:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              submitted:
                raise:
                  data_refresh_signal: projects_changed
              authentication_required:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
entry_points:
  entry_point.api.project.create:
    adapter:
      http_api:
        input:
          body:
            customer:
              type: string
            priority:
              type: string
            title:
              type: string
          path_params:
            workspace_id:
              type: string
        method: POST
        path: /workspaces/{workspace_id}/projects
        responses:
          created:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.project
            status: 201
          access_denied:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 403
          authentication_required:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 401
          validation_failed:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 422
    rationale: HTTP endpoint for creating a dispatch project.
    target:
      application_action:
        ref: application_action.project.create
        input_bindings:
          customer:
            from: $input.body.customer
          priority:
            from: $input.body.priority
          title:
            from: $input.body.title
          workspace_id:
            from: $input.path_params.workspace_id
  entry_point.api.project.list:
    adapter:
      http_api:
        input:
          path_params:
            workspace_id:
              type: string
        method: GET
        path: /workspaces/{workspace_id}/projects
        responses:
          listed:
            body:
              from: $outcome.result
              type:
                type: array
                items:
                  $ref: entity_type.project
            status: 200
          access_denied:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 403
          authentication_required:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 401
          unavailable:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 503
    rationale: HTTP endpoint for listing dispatch projects.
    target:
      application_action:
        ref: application_action.project.list
        input_bindings:
          workspace_id:
            from: $input.path_params.workspace_id
  entry_point.api.project.approve:
    retry_safe: true
    adapter:
      http_api:
        input:
          body:
            approved_by:
              type: string
          path_params:
            project_id:
              type: string
        method: POST
        path: /projects/{project_id}/approve
        responses:
          approved:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.project
            status: 200
          access_denied:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 403
          transition_not_allowed:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 409
          not_found:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 404
          unavailable:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 503
          authentication_required:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 401
    rationale: HTTP endpoint for approving submitted dispatch projects.
    target:
      application_action:
        ref: application_action.project.approve
        input_bindings:
          approved_by:
            from: $input.body.approved_by
          project_id:
            from: $input.path_params.project_id
  entry_point.cli.project.approve:
    adapter:
      cli:
        cli_command: project approve
        input:
          args:
            approved_by:
              type: string
            project_id:
              type: string
        response_handlers:
          approved:
            exit_code: 0
            stdout:
              text: text.project.approve.success
              bindings:
                project_id:
                  from: $response.body.id
          access_denied:
            exit_code: 5
            stderr:
              text: text.project.approve.access_denied
              bindings:
                message:
                  from: $response.body.message
          transition_not_allowed:
            exit_code: 2
            stderr:
              text: text.project.approve.transition_not_allowed
              bindings:
                message:
                  from: $response.body.message
          not_found:
            exit_code: 3
            stderr:
              text: text.project.approve.not_found
              bindings:
                message:
                  from: $response.body.message
          unavailable:
            exit_code: 75
            retry_policy:
              attempts: 3
              backoff: exponential
            stderr:
              text: text.project.approve.unavailable
          authentication_required:
            exit_code: 4
            stderr:
              text: text.project.approve.authentication_required
              bindings:
                message:
                  from: $response.body.message
    rationale: CLI entry for approval automation.
    target:
      entry_point:
        ref: entry_point.api.project.approve
        input_bindings:
          body:
            approved_by:
              from: $input.args.approved_by
          path_params:
            project_id:
              from: $input.args.project_id
  entry_point.cli.project.board:
    adapter:
      cli:
        cli_command: project board
        input:
          args:
            workspace_id:
              type: string
    rationale: CLI launcher for the Textual dispatch board.
    target:
      state_machine:
        ref: state_machine.project.board
        renderer: textual
        input_bindings:
          workspace_id:
            from: $input.args.workspace_id
  entry_point.html.project.board:
    adapter:
      html_route:
        input:
          path_params:
            workspace_id:
              type: string
        path: /workspaces/{workspace_id}/dispatch
    rationale: HTML entry for the dispatch board.
    target:
      state_machine:
        ref: state_machine.project.board
        renderer: html
        input_bindings:
          workspace_id:
            from: $input.path_params.workspace_id
  entry_point.worker.project.approval_notice:
    adapter:
      worker:
        input:
          payload:
            $ref: schema.project.approved
        ingress_responses:
          accepted:
            disposition: acknowledge
          malformed:
            disposition: dead_letter
            problem:
              $ref: entity_type.problem
    rationale: Worker entry exposing the approval notice workflow.
    target:
      workflow:
        ref: workflow.project.approval_notice
        trigger_bindings:
          approved_by:
            from: $input.payload.approved_by
          project_id:
            from: $input.payload.project_id
workflows:
  workflow.project.approval_notice:
    rationale: Approval domain event sends a downstream notice.
    outcomes:
      completed:
        kind: success
        result:
          $ref: schema.project.notice_result
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    steps:
    - id: send_notice
      input_bindings:
        approved_by:
          from: $trigger.payload.approved_by
        project_id:
          from: $trigger.payload.project_id
      application_action: application_action.project.send_approval_notice
      outcome_transitions:
        delivery_failed:
          retry_policy:
            attempts: 3
            backoff: exponential
            fail_as: delivery_failed
        access_denied:
          fail_as: notice_access_denied
        sent:
          complete_as: completed
        authentication_required:
          fail_as: notice_authentication_required
    trigger:
      domain_event: domain_event.project.approved
behavior_scenarios:
  behavior_scenario.project.approval_notice.workflow:
    archetype: workflow_trigger_success
    rationale: Approval domain event dispatches the notification workflow.
    feature_tag: project.approval_notice
    system_under_test_ref:
      workflow: workflow.project.approval_notice
    given:
      preconditions: []
      seed_fixtures:
      - fixture.workspace.reviewer
    then:
      domain_events:
        emitted:
        - domain_event.project.approved
      invoked:
      - application_action.project.send_approval_notice
      workflow:
        outcome: completed
        executed: true
        ref: workflow.project.approval_notice
    title: Approval domain event sends notice
    when:
      emit_domain_event:
        payload:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: domain_event.project.approved
  behavior_scenario.project.approve.success:
    archetype: action_outcome
    rationale: Approval transitions a submitted project to approved and emits the domain event.
    feature_tag: project.approve
    system_under_test_ref:
      application_action: application_action.project.approve
    given:
      preconditions:
      - ref: precondition.project.submitted
      seed_fixtures:
      - fixture.workspace.reviewer
    then:
      domain_events:
        emitted:
        - domain_event.project.approved
      invoked:
      - application_action.project.approve
      entity:
        exists:
          entity_type: entity_type.project
          where:
            id:
              value: project_submitted_1
            status:
              value: approved
      outcome: approved
    title: Approve submitted dispatch project
    when:
      invoke_application_action:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: application_action.project.approve
  behavior_scenario.project.approve.access_denied:
    archetype: authorization_denial
    rationale: A workspace member who is not a reviewer receives the mapped access_denied outcome before approval executes.
    feature_tag: project.approve
    system_under_test_ref:
      application_action: application_action.project.approve
    given:
      preconditions:
      - ref: precondition.project.submitted
      seed_fixtures:
      - fixture.workspace.member
    then:
      authorization:
        denied:
        - application_action: application_action.project.approve
      domain_events:
        not_emitted:
        - domain_event.project.approved
      outcome: access_denied
    title: Approval authorization maps access_denied outcome
    when:
      invoke_application_action:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: application_action.project.approve
  behavior_scenario.project.board.empty:
    archetype: state_machine_composition
    rationale: An empty workspace shows empty list, no detail, and no activity.
    feature_tag: project.board
    system_under_test_ref:
      state_machine: state_machine.project.board
    given:
      preconditions:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    then:
      enables:
      - application_action.project.create
      authorization:
        denied:
        - application_action: application_action.project.approve
      state_machine:
        instances:
          activity:
            view_state: empty
          detail:
            view_state: none
          list:
            view_state: empty
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        view_state: ready
    title: Empty dispatch board
    when:
      open_entry_point:
        input:
          workspace_id:
            from: $fixture.workspace.id
        ref: entry_point.html.project.board
  behavior_scenario.project.board.ready:
    archetype: state_machine_composition
    rationale: A populated workspace shows the ready list while detail awaits explicit selection.
    feature_tag: project.board
    system_under_test_ref:
      state_machine: state_machine.project.board
    given:
      preconditions:
      - ref: precondition.project.submitted
      seed_fixtures:
      - fixture.workspace.member
    then:
      enables:
      - application_action.project.create
      - application_action.project.submit
      state_machine:
        instances:
          activity:
            view_state: empty
          detail:
            view_state: none
          list:
            view_state: ready
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        view_state: ready
    title: Ready dispatch board
    when:
      open_entry_point:
        input:
          workspace_id:
            from: $fixture.workspace.id
        ref: entry_point.html.project.board
  behavior_scenario.project.create.api.success:
    archetype: entry_point_response
    rationale: The API create endpoint delegates to the create application action and emits project.created.
    feature_tag: project.create
    system_under_test_ref:
      entry_point: entry_point.api.project.create
    given:
      preconditions:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    then:
      domain_events:
        emitted:
        - domain_event.project.created
      invoked:
      - application_action.project.create
      entity:
        exists:
          entity_type: entity_type.project
          where:
            title:
              value: Replace rooftop condenser fan
            workspace_id:
              from: $fixture.workspace.id
      outcome: created
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_entry_point:
        input:
          customer:
            value: Atlas Foods
          priority:
            value: High
          title:
            value: Replace rooftop condenser fan
          workspace_id:
            from: $fixture.workspace.id
        ref: entry_point.api.project.create
