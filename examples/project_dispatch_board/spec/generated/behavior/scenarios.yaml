project: project_dispatch_board
scenarios:
  project.approval_notice.workflow:
    archetype: workflow_event_success
    arrange:
      facts: []
      fixtures:
      - fixture.workspace.reviewer
    assert:
      events:
        emitted:
        - project.approved
      invoked:
      - project.send_approval_notice
      workflow:
        ran: true
        ref: project.approval_notice
    basis: Approval event dispatches the notification workflow.
    execute:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: project.approved
    feature: project.approval_notice
    title: Approval event sends notice
  project.approve.success:
    archetype: capability_success
    arrange:
      facts:
      - present:
          resource: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.reviewer
    assert:
      events:
        emitted:
        - project.approved
      invoked:
      - project.approve
      policy: policy.project.approve
      resource:
        exists:
          resource: Project
          where:
            id: project_submitted_1
            status: approved
    basis: Approval transitions a submitted project to approved and emits the event.
    execute:
      invoke_capability:
        input:
          project_id: project_submitted_1
        ref: project.approve
    feature: project.approve
    title: Approve submitted dispatch project
  project.board.empty:
    archetype: fsm_composition
    arrange:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    assert:
      enables:
      - project.create
      forbids:
      - project.approve
      fsm:
        composition:
          includes: []
          layout: {}
          sync: []
        instances:
          activity:
            source: fsm.project.activity
            state: empty
            surface: fsm.project.activity.empty
          detail:
            source: fsm.project.detail
            state: none
            surface: fsm.project.detail.none
          list:
            source: fsm.project.list
            state: empty
            surface: fsm.project.list.empty
        ref: fsm.project.board
        state: ready
        surface: fsm.project.board.ready
        sync:
          observed:
          - select_project_updates_fsms
      requires:
        actions:
        - project.create
        assets:
        - asset.project.list.empty.illustration
        copy:
        - copy.project.activity.empty.heading
        - copy.project.activity.empty.body
        - copy.project.detail.none.heading
        - copy.project.detail.none.body
        - copy.project.list.empty.heading
        - copy.project.list.empty.body
        queries:
        - query.project.board.list
        - query.project.list.list
        surfaces:
        - fsm.project.board.ready
        - fsm.project.activity.empty
        - fsm.project.detail.none
        - fsm.project.list.empty
    basis: An empty workspace shows empty list, no detail, and no activity.
    execute:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
    feature: project.board
    title: Empty dispatch board
  project.board.ready:
    archetype: fsm_composition
    arrange:
      facts:
      - present:
          resource: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    assert:
      enables:
      - project.create
      - project.submit
      fsm:
        composition:
          includes: []
          layout: {}
          sync: []
        instances:
          activity:
            source: fsm.project.activity
            state: empty
            surface: fsm.project.activity.empty
          detail:
            source: fsm.project.detail
            state: none
            surface: fsm.project.detail.none
          list:
            source: fsm.project.list
            state: ready
            surface: fsm.project.list.ready
        ref: fsm.project.board
        state: ready
        surface: fsm.project.board.ready
        sync:
          observed:
          - select_project_updates_fsms
      requires:
        actions:
        - project.create
        - project.submit
        assets: []
        copy:
        - copy.project.activity.empty.heading
        - copy.project.activity.empty.body
        - copy.project.detail.none.heading
        - copy.project.detail.none.body
        - copy.project.list.ready.heading
        queries:
        - query.project.board.list
        - query.project.list.list
        surfaces:
        - fsm.project.board.ready
        - fsm.project.activity.empty
        - fsm.project.detail.none
        - fsm.project.list.ready
    basis: A populated workspace shows the ready list while detail awaits explicit selection.
    execute:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
    feature: project.board
    title: Ready dispatch board
  project.create.api.success:
    archetype: api_entry_success
    arrange:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    assert:
      events:
        emitted:
        - project.created
      invoked:
      - project.create
      policy: policy.project.create
      resource:
        exists:
          resource: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      response:
        status: 200
    basis: The API create endpoint delegates to the create capability and emits project.created.
    execute:
      call_entry:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: api.project.create
    feature: project.create
    title: Create dispatch project through API
