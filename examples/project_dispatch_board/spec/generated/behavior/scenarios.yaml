project: project_dispatch_board
scenarios:
  scenario.project.approval_notice.workflow:
    archetype: workflow_event_success
    arrange:
      facts: []
      fixtures:
      - fixture.workspace.reviewer
    assert:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.send_approval_notice
      workflow:
        outcome: completed
        ran: true
        ref: workflow.project.approval_notice
    basis: Approval event dispatches the notification workflow.
    execute:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: event.project.approved
    feature: feature.project.approval_notice
    title: Approval event sends notice
  scenario.project.approve.success:
    archetype: capability_outcome
    arrange:
      facts:
      - present:
          model: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.reviewer
    assert:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.approve
      model:
        exists:
          model: Project
          where:
            id: project_submitted_1
            status: approved
      outcome: approved
      policy: policy.project.approve
    basis: Approval transitions a submitted project to approved and emits the event.
    execute:
      invoke_capability:
        input:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: operation.project.approve
    feature: feature.project.approve
    title: Approve submitted dispatch project
  scenario.project.board.empty:
    archetype: fsm_composition
    arrange:
      facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    assert:
      enables:
      - operation.project.create
      forbids:
      - operation.project.approve
      fsm:
        composition:
          layout:
            html:
              css:
                rules:
                - declarations:
                    display: grid
                    gap: token.gap
                    grid-template-columns: token.nav_width 1fr token.aside_width
                  selector: root
                - declarations:
                    min-width: token.nav_width
                  selector: region.nav
                - declarations:
                    min-width: '0'
                  selector: region.main
                - declarations:
                    min-width: token.aside_width
                  selector: region.aside
                tokens:
                  aside_width: 16rem
                  gap: 1rem
                  nav_width: 20rem
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  order: 3
                  required: true
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  order: 2
                  required: true
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  order: 1
                  required: true
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            textual:
              containers:
                aside:
                  id: aside
                  kind: Container
                  order: 3
                  required: true
                main:
                  id: main
                  kind: Container
                  order: 2
                  required: true
                nav:
                  id: nav
                  kind: Container
                  order: 1
                  required: true
              screen_class: ProjectBoardScreen
              tcss:
                rules:
                - declarations:
                    layout: horizontal
                  selector: screen
                - declarations:
                    width: '32'
                  selector: region.nav
                - declarations:
                    width: '28'
                  selector: region.aside
          mounts:
          - context:
              selected_project_id: $state_machine.selected_project_id
              workspace_id: $state_machine.workspace_id
            fsm: state_machine.project.list
            id: list
            initial: loading
            region: nav
          - context:
              project_id: $state_machine.selected_project_id
            fsm: state_machine.project.detail
            id: detail
            initial: none
            region: main
            selected:
              state: loading
              when:
                context_present: selected_project_id
          - context:
              project_id: $state_machine.selected_project_id
            fsm: state_machine.project.activity
            id: activity
            initial: empty
            region: aside
            selected:
              state: ready
              when:
                context_present: selected_project_id
          sync:
          - do:
            - set:
                context: selected_project_id
                from: $message.project_id
            - send:
                data:
                  project_id: $message.project_id
                instance: detail
                message: message.project.selection_changed
            - send:
                data:
                  project_id: $message.project_id
                instance: activity
                message: message.project.selection_changed
            id: select_project_updates_fsms
            when:
              instance: list
              message: message.project.selected
        instances:
          activity:
            source: state_machine.project.activity
            state: empty
            surface: state_machine.project.activity.empty
          detail:
            source: state_machine.project.detail
            state: none
            surface: state_machine.project.detail.none
          list:
            source: state_machine.project.list
            state: empty
            surface: state_machine.project.list.empty
        ref: state_machine.project.board
        state: ready
        surface: state_machine.project.board.ready
        sync:
          observed:
          - select_project_updates_fsms
      requires:
        actions:
        - operation.project.create
        assets:
        - asset.project.list.empty.illustration
        copy:
        - text.project.activity.empty.heading
        - text.project.activity.empty.body
        - text.project.detail.none.heading
        - text.project.detail.none.body
        - text.project.list.empty.heading
        - text.project.list.empty.body
        queries:
        - query.project.board.list
        - query.project.list.list
        surfaces:
        - state_machine.project.board.ready
        - state_machine.project.activity.empty
        - state_machine.project.detail.none
        - state_machine.project.list.empty
    basis: An empty workspace shows empty list, no detail, and no activity.
    execute:
      open_entry:
        input:
          workspace_id: $fixture.workspace.id
        ref: entry_point.web.project.board
    feature: feature.project.board
    title: Empty dispatch board
