  behavior_scenario.project.create.api.success:
    archetype: external_interface_response
    feature_tag: project.create
    given:
      preconditions:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: The API create endpoint delegates to the create command and emits project.created.
    system_under_test_ref:
      external_interface: external_interface.api.project.create
    then:
      authorization:
        allowed:
        - access_policy: access_policy.project.member
          command: command.project.create
      domain_events:
        emitted:
        - domain_event.project.created
      entity:
        exists:
          entity_type: entity_type.project
          where:
            title:
              value: Replace rooftop condenser fan
            workspace_id:
              from: $fixture.workspace.id
      invoked:
      - command.project.create
      outcome: created
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_external_interface:
        input:
          customer:
            value: Atlas Foods
          priority:
            value: High
          title:
            value: Replace rooftop condenser fan
          workspace_id:
            from: $fixture.workspace.id
