  test_case.project.create.api.success:
    archetype: entry_response
    basis: The API create endpoint delegates to the create operation and emits project.created.
    feature: feature.project.create
    given:
      domain_facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    subject_ref:
      entry_point: entry_point.api.project.create
    then:
      events:
        emitted:
        - event.project.created
      invoked:
      - operation.project.create
      model:
        exists:
          model: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      outcome: created
      policy: policy.project.create
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_entry:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: entry_point.api.project.create
