  test_case.project.create.api.success:
    archetype: entry_point_response
    feature_tag: project.create
    given:
      domain_facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: The API create endpoint delegates to the create operation and emits project.created.
    subject_ref:
      entry_point: entry_point.api.project.create
    then:
      authorization:
        allowed:
        - authorization_policy: authorization_policy.project.create
          operation: operation.project.create
      events:
        emitted:
        - event.project.created
      invoked:
      - operation.project.create
      model:
        exists:
          model: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      outcome: created
      response:
        status: 201
    title: Create dispatch project through API
    when:
      call_entry_point:
        input:
          customer: Atlas Foods
          priority: High
          title: Replace rooftop condenser fan
          workspace_id: $fixture.workspace.id
        ref: entry_point.api.project.create
