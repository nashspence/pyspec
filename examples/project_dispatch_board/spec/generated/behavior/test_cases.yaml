project: project_dispatch_board
test_cases:
  test_case.project.approval_notice.workflow:
    archetype: workflow_trigger_success
    feature_tag: project.approval_notice
    given:
      domain_facts: []
      seed_fixtures:
      - fixture.workspace.reviewer
    rationale: Approval event dispatches the notification workflow.
    subject_ref:
      workflow: workflow.project.approval_notice
    then:
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.send_approval_notice
      workflow:
        executed: true
        outcome: completed
        ref: workflow.project.approval_notice
    title: Approval event sends notice
    when:
      emit_event:
        payload:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: event.project.approved
  test_case.project.approve.forbidden:
    archetype: authorization_denial
    feature_tag: project.approve
    given:
      domain_facts:
      - present:
          model: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: A workspace member who is not a reviewer receives the mapped forbidden outcome before approval executes.
    subject_ref:
      operation: operation.project.approve
    then:
      authorization:
        denied:
        - authorization_policy: authorization_policy.project.approve
          operation: operation.project.approve
      events:
        not_emitted:
        - event.project.approved
      outcome: forbidden
    title: Approval authorization maps forbidden outcome
    when:
      invoke_operation:
        input:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: operation.project.approve
  test_case.project.approve.success:
    archetype: operation_outcome
    feature_tag: project.approve
    given:
      domain_facts:
      - present:
          model: Project
          values:
            assignee: Maya Chen
            created_at: '2026-05-10T09:00:00Z'
            customer: Atlas Foods
            id: project_submitted_1
            priority: High
            status: submitted
            summary: Technician needs approval before ordering the replacement fan motor.
            title: Replace rooftop condenser fan
            updated_at: '2026-05-11T08:45:00Z'
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.reviewer
    rationale: Approval transitions a submitted project to approved and emits the event.
    subject_ref:
      operation: operation.project.approve
    then:
      authorization:
        allowed:
        - authorization_policy: authorization_policy.project.approve
          operation: operation.project.approve
      events:
        emitted:
        - event.project.approved
      invoked:
      - operation.project.approve
      model:
        exists:
          model: Project
          where:
            id: project_submitted_1
            status: approved
      outcome: approved
    title: Approve submitted dispatch project
    when:
      invoke_operation:
        input:
          approved_by: $fixture.actor.id
          project_id: project_submitted_1
        ref: operation.project.approve
  test_case.project.board.empty:
    archetype: state_machine_composition
    feature_tag: project.board
    given:
      domain_facts:
      - absent:
          model: Project
          where:
            workspace_id: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: An empty workspace shows empty list, no detail, and no activity.
    subject_ref:
      state_machine: state_machine.project.board
    then:
      authorization:
        denied:
        - authorization_policy: authorization_policy.project.approve
          operation: operation.project.approve
      enables:
      - operation.project.create
      requires:
        assets:
        - asset.project.list.empty.illustration
        available_operations:
        - operation.project.create
        queries:
        - query.project.board.list
        - query.project.list.list
        surfaces:
        - state_machine.project.board.ready
        - state_machine.project.activity.empty
        - state_machine.project.detail.none
        - state_machine.project.list.empty
        text:
        - text.project.activity.empty.heading
        - text.project.activity.empty.body
        - text.project.detail.none.heading
        - text.project.detail.none.body
        - text.project.list.empty.heading
        - text.project.list.empty.body
      state_machine:
        composition:
          child_state_machines:
          - context_bindings:
              selected_project_id:
                from: $state_machine.selected_project_id
              workspace_id:
                from: $state_machine.workspace_id
            html_region: nav
            id: list
            initial_view_state: loading
            state_machine: state_machine.project.list
            textual_container: nav
          - context_bindings:
              project_id:
                from: $state_machine.selected_project_id
            html_region: main
            id: detail
            initial_view_state: none
            selected:
              view_state: loading
              when:
                context_present: selected_project_id
            state_machine: state_machine.project.detail
            textual_container: main
          - context_bindings:
              project_id:
                from: $state_machine.selected_project_id
            html_region: aside
            id: activity
            initial_view_state: empty
            selected:
              view_state: ready
              when:
                context_present: selected_project_id
            state_machine: state_machine.project.activity
            textual_container: aside
          renderers:
            html:
              layout:
                regions:
                  aside:
                    classes:
                    - dispatch-board-aside
                    element: aside
                    must_render: true
                    order: 3
                    role: complementary
                  main:
                    classes:
                    - dispatch-board-main
                    element: main
                    must_render: true
                    order: 2
                    role: main
                  nav:
                    classes:
                    - dispatch-board-nav
                    element: nav
                    must_render: true
                    order: 1
                    role: navigation
                root:
                  classes:
                  - dispatch-board
                  element: section
                  role: region
              style:
                rules:
                - declarations:
                    display: grid
                    gap: token.gap
                    grid-template-columns: token.nav_width 1fr token.aside_width
                  selector: root
                - declarations:
                    min-width: token.nav_width
                  selector: region.nav
                - declarations:
                    min-width: '0'
                  selector: region.main
                - declarations:
                    min-width: token.aside_width
                  selector: region.aside
                tokens:
                  aside_width: 16rem
                  gap: 1rem
                  nav_width: 20rem
            textual:
              layout:
                containers:
                  aside:
                    container_class: Container
                    id: aside
                    must_render: true
                    order: 3
                  main:
                    container_class: Container
                    id: main
                    must_render: true
                    order: 2
                  nav:
                    container_class: Container
                    id: nav
                    must_render: true
                    order: 1
                screen_class: ProjectBoardScreen
              style:
                rules:
                - declarations:
                    layout: horizontal
                  selector: screen
                - declarations:
                    width: '32'
                  selector: container.nav
                - declarations:
                    width: '28'
                  selector: container.aside
          signal_sync_rules:
          - effects:
            - set:
                context: selected_project_id
                from: $message.project_id
            - send:
                instance: detail
                message: selection_changed
                payload_bindings:
                  project_id:
                    from: $message.project_id
            - send:
                instance: activity
                message: selection_changed
                payload_bindings:
                  project_id:
                    from: $message.project_id
            id: select_project_updates_state_machines
            when:
              instance: list
              message: project_selected
        instances:
          activity:
            source: state_machine.project.activity
            surface: state_machine.project.activity.empty
            view_state: empty
          detail:
            source: state_machine.project.detail
            surface: state_machine.project.detail.none
            view_state: none
          list:
            source: state_machine.project.list
            surface: state_machine.project.list.empty
            view_state: empty
        ref: state_machine.project.board
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        surface: state_machine.project.board.ready
        view_state: ready
    title: Empty dispatch board
    when:
      open_entry_point:
        input:
          workspace_id: $fixture.workspace.id
        ref: entry_point.html.project.board
