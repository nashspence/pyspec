<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>spec audit render</title>
<style>
/* Generated FSM surface style contract. Do not edit. */
:root {
  --contract-space: 1rem;
  --contract-fsm-surface-max-width: 48rem;
}
.contract-fsm-surface {
  display: grid;
  gap: var(--contract-space);
  max-width: var(--contract-fsm-surface-max-width);
}
[data-contract-composition="fsm.project.board.ready"] {
  --aside-width: 16rem;
  --gap: 1rem;
  --nav-width: 20rem;
  display: grid;
  gap: var(--gap);
  grid-template-columns: var(--nav-width) 1fr var(--aside-width);
}
[data-contract-composition="fsm.project.board.ready"] [data-layout-region="nav"] {
  min-width: var(--nav-width);
}
[data-contract-composition="fsm.project.board.ready"] [data-layout-region="main"] {
  min-width: 0;
}
[data-contract-composition="fsm.project.board.ready"] [data-layout-region="aside"] {
  min-width: var(--aside-width);
}


    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #f7f7f8; color: #171717; }
    main { padding: 24px; }
    .contract-fsm-surface, .contract-fsm-composition { background: white; border: 1px solid #d0d0d0; border-radius: 12px; padding: 16px; box-sizing: border-box; }
    .contract-fsm-composition { display: grid; grid-template-columns: minmax(180px, 1fr) minmax(280px, 2fr) minmax(180px, 1fr); gap: 16px; max-width: none; }
    .contract-layout-region { min-height: 120px; display: grid; gap: 12px; align-content: start; }
    .audit-records { display: grid; gap: 0.75rem; }
    .audit-record { border: 1px solid #e4e4e7; border-radius: 10px; padding: 0.75rem; display: grid; gap: 0.35rem; }
    .audit-field { display: grid; gap: 0.15rem; }
    .audit-field-label { color: #52525b; font-size: 0.75rem; }
    .audit-field-value { font-weight: 600; }
    img.audit-asset { max-width: 100%; height: auto; border-radius: 8px; }
    button { padding: 0.5rem 0.75rem; border: 1px solid #222; border-radius: 6px; background: #fff; justify-self: start; }
    @media (max-width: 700px) { .contract-fsm-composition { grid-template-columns: 1fr; } }
    
</style>
</head>
<body>
<main>
<section class="contract-fsm-surface" data-contract-fsm-surface="fsm.project.list.ready" data-contract-state="ready">
<p data-contract-slot="heading" data-copy="copy.project.list.ready.heading">Dispatch queue</p>
<button data-action="project.create" data-contract-slot="project.create" type="button">Project Create</button>
<button data-action="project.submit" data-contract-slot="project.submit" type="button">Project Submit</button>
<div class="audit-records">
<article class="audit-record">
<p class="audit-field" data-contract-slot="title" data-field="title">
<span class="audit-field-label">Title</span>
<span class="audit-field-value">Inspect loading dock sensor</span>
</p>
<p class="audit-field" data-contract-slot="customer" data-field="customer">
<span class="audit-field-label">Customer</span>
<span class="audit-field-value">Harbor Logistics</span>
</p>
<p class="audit-field" data-contract-slot="priority" data-field="priority">
<span class="audit-field-label">Priority</span>
<span class="audit-field-value">Normal</span>
</p>
<p class="audit-field" data-contract-slot="status" data-field="status">
<span class="audit-field-label">Status</span>
<span class="audit-field-value">draft</span>
</p>
</article>
<article class="audit-record">
<p class="audit-field" data-contract-slot="title" data-field="title">
<span class="audit-field-label">Title</span>
<span class="audit-field-value">Replace rooftop condenser fan</span>
</p>
<p class="audit-field" data-contract-slot="customer" data-field="customer">
<span class="audit-field-label">Customer</span>
<span class="audit-field-value">Atlas Foods</span>
</p>
<p class="audit-field" data-contract-slot="priority" data-field="priority">
<span class="audit-field-label">Priority</span>
<span class="audit-field-value">High</span>
</p>
<p class="audit-field" data-contract-slot="status" data-field="status">
<span class="audit-field-label">Status</span>
<span class="audit-field-value">submitted</span>
</p>
</article>
</div>
</section>
</main>
</body>
</html>
