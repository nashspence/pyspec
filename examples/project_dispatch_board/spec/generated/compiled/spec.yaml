        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    rationale: Reviewer fixture for approval test cases.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
models:
  Problem:
    fields:
      code:
        nullable: false
        required: true
        type:
          primitive: Text
      message:
        nullable: false
        required: true
        type:
          primitive: Text
    lifecycle: null
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
  Project:
    fields:
      assignee:
        nullable: false
        required: true
        type:
          primitive: Text
      created_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      customer:
        nullable: false
        required: true
        type:
          primitive: Text
      id:
        nullable: false
        required: true
        type:
          primitive: ID
      priority:
        nullable: false
        required: true
        type:
          primitive: Text
      status:
        nullable: false
        required: true
        type:
          enum:
          - draft
          - submitted
          - approved
          - archived
      summary:
        nullable: false
        required: true
        type:
          primitive: Text
      title:
        nullable: false
        required: true
        type:
          primitive: Text
      updated_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      workspace_id:
        nullable: false
        required: true
        type:
          primitive: ID
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - from: draft
        to: submitted
        triggered_by: operation.project.submit
      - from: submitted
        to: approved
        triggered_by: operation.project.approve
      - from: approved
        to: archived
        triggered_by: operation.project.archive
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
operations:
  operation.project.approve:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.reviewer
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      approved:
        emits:
        - event: event.project.approved
          payload_bindings:
            approved_by:
              from: $input.approved_by
            project_id:
              from: $input.project_id
        kind: success
        result:
          model: Project
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
      unavailable:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: Reviewers can approve submitted dispatch projects.
    reads: []
    retry_safe: true
    transition:
      field: status
      from: submitted
      model: Project
      to: approved
    updates: []
  operation.project.archive:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.reviewer
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      archived:
        emits:
        - event: event.project.archived
          payload_source: $outcome.result
        kind: success
        result:
          model: Project
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: Approved dispatch projects can be archived.
    reads: []
    transition:
      field: status
      from: approved
      model: Project
      to: archived
    updates: []
  operation.project.create:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates:
    - Project
    deletes: []
    input:
      customer:
        primitive: Text
      priority:
        primitive: Text
      title:
        primitive: Text
      workspace_id:
        primitive: ID
    operation_kind: command
    outcomes:
      created:
        emits:
        - event: event.project.created
          payload_source: $outcome.result
        kind: success
        result:
          model: Project
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
      validation_failed:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: Members can create a new dispatch project.
    reads: []
    updates: []
  operation.project.list:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      workspace_id:
        primitive: ID
    operation_kind: query
    outcomes:
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      listed:
        emits: []
        kind: success
        result:
          array:
            model: Project
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
      unavailable:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: The board requires a project list query scoped by workspace.
    reads:
    - Project
    updates: []
  operation.project.read:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: query
    outcomes:
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      found:
        emits: []
        kind: success
        result:
          model: Project
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: The detail state machine loads the selected project by id.
    reads:
    - Project
    updates: []
  operation.project.send_approval_notice:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.reviewer
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: command
    outcomes:
      delivery_failed:
        emits: []
        kind: failure
        result:
          model: Problem
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      sent:
        emits: []
        kind: success
        result:
          data_contract: data_contract.project.notice_result
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: Approval triggers a notification command for downstream coordination.
    reads: []
    retry_safe: true
    updates: []
  operation.project.submit:
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      forbidden:
        emits: []
        kind: failure
        result:
          model: Problem
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
      submitted:
        emits:
        - event: event.project.submitted
          payload_source: $outcome.result
        kind: success
        result:
          model: Project
      unauthenticated:
        emits: []
        kind: failure
        result:
          model: Problem
    rationale: Draft dispatch projects can be submitted for review.
    reads: []
    transition:
      field: status
      from: draft
      model: Project
      to: submitted
    updates: []
project: project_dispatch_board
refs:
  asset:
  - asset.project.detail.ready.priority_badge
  - asset.project.list.empty.illustration
  authorization_policy:
  - authorization_policy.project.member
  - authorization_policy.project.reviewer
  cli_command:
  - cli_command.project.approve
  - cli_command.project.board
  cli_response_handler:
  - cli_response_handler.cli.project.approve.approved
  - cli_response_handler.cli.project.approve.forbidden
  - cli_response_handler.cli.project.approve.invalid_state
  - cli_response_handler.cli.project.approve.not_found
  - cli_response_handler.cli.project.approve.unauthenticated
  - cli_response_handler.cli.project.approve.unavailable
  endpoint:
  - endpoint.project.approve
  - endpoint.project.create
  - endpoint.project.list
  entry_point_delegate:
  - entry_point_delegate.cli.project.approve.to.api.project.approve
  entry_point_target:
