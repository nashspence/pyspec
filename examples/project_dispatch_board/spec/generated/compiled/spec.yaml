                  type: string
              required:
              - project_id
              type: object
          show_transition_not_allowed:
            payload_schema:
              additionalProperties: false
              properties:
                message:
                  type: string
              required:
              - message
              type: object
      emits:
        local_signals:
          project_selected:
            payload_schema:
              additionalProperties: false
              properties:
                project_id:
                  type: string
              required:
              - project_id
              type: object
    transitions:
    - from: loading
      on:
        data_refresh_signal: project_collection_empty
      to: empty
    - from: loading
      on:
        data_refresh_signal: projects_loaded
      to: ready
    - from: loading
      on:
        data_refresh_signal: project_list_failed
      to: error
    - from: empty
      on:
        data_refresh_signal: projects_loaded
      to: ready
    - from: empty
      on:
        data_refresh_signal: projects_changed
      rationale: List mutations invalidate the empty collection and let the list query refresh it.
      to: empty
    - from: empty
      on:
        local_signal: show_transition_not_allowed
      rationale: Invalid create attempts move the list into its displayable error state.
      to: error
    - effects:
      - emit:
          local_signal: project_selected
          payload_bindings:
            project_id:
              from: $local_signal.project_id
      from: ready
      on:
        local_signal: project_select
      to: ready
    - from: ready
      on:
        data_refresh_signal: projects_changed
      rationale: List mutations mark ready-state collection data stale and trigger query refresh.
      to: ready
    - from: ready
      on:
        data_refresh_signal: projects_loaded
      rationale: Successful list queries refresh ready-state collection data.
      to: ready
    - from: ready
      on:
        local_signal: show_transition_not_allowed
      rationale: Invalid list application_actions move the list into its displayable error state.
      to: error
    view_states:
      empty:
        action_bindings:
          create:
            application_action: application_action.project.create
            input_bindings:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $context.workspace_id
            outcome_effects:
              created:
                raise:
                  data_refresh_signal: projects_changed
              forbidden:
                no_local_effect:
                  rationale: The response surface keeps the empty list visible for forbidden create.
                  reason: handled_by_response_surface
              unauthenticated:
                no_local_effect:
                  rationale: The response surface reports authentication failure without a local transition.
                  reason: handled_by_response_surface
              validation_failed:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        assets:
        - asset.project.list.empty.illustration
        data_loaders: {}
        fields: []
        surface: state_machine.project.list.empty
        text:
        - text.project.list.empty.heading
        - text.project.list.empty.body
      error:
        action_bindings: {}
        assets: []
        data_loaders: {}
        fields: []
        surface: state_machine.project.list.error
        text:
        - text.project.list.error.heading
        - text.project.list.error.body
      loading:
        action_bindings: {}
        assets: []
        data_loaders: {}
        fields: []
        surface: state_machine.project.list.loading
        text:
        - text.project.list.loading.message
      ready:
        action_bindings:
          create:
            application_action: application_action.project.create
            input_bindings:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $context.workspace_id
            outcome_effects:
              created:
                raise:
                  data_refresh_signal: projects_changed
              forbidden:
                no_local_effect:
                  rationale: The response surface keeps the ready list visible for forbidden create.
                  reason: handled_by_response_surface
              unauthenticated:
                no_local_effect:
                  rationale: The response surface reports authentication failure without a local transition.
                  reason: handled_by_response_surface
              validation_failed:
                no_local_effect:
                  rationale: The ready list keeps focus while the response surface shows validation errors.
                  reason: handled_by_response_surface
          submit:
            application_action: application_action.project.submit
            input_bindings:
              project_id:
                from: $context.selected_project_id
            outcome_effects:
              forbidden:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              submitted:
                raise:
                  data_refresh_signal: projects_changed
              transition_not_allowed:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              unauthenticated:
                raise:
                  local_signal: show_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        assets: []
        data_loaders: {}
        fields:
        - title
        - customer
        - priority
        - status
        surface: state_machine.project.list.ready
        text:
        - text.project.list.ready.heading
test_cases:
  test_case.project.approval_notice.workflow:
    archetype: workflow_trigger_success
    feature_tag: project.approval_notice
    given:
      domain_facts: []
      seed_fixtures:
      - fixture.workspace.reviewer
    rationale: Approval domain event dispatches the notification workflow.
    subject_ref:
      workflow: workflow.project.approval_notice
    then:
      domain_events:
        emitted:
        - domain_event.project.approved
      invoked:
      - application_action.project.send_approval_notice
      workflow:
        executed: true
        outcome: completed
        ref: workflow.project.approval_notice
    title: Approval domain event sends notice
    when:
      emit_domain_event:
        payload:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: domain_event.project.approved
  test_case.project.approve.forbidden:
    archetype: authorization_denial
    feature_tag: project.approve
    given:
      domain_facts:
      - present:
          entity_type: entity_type.project
          values:
            assignee:
              value: Maya Chen
            created_at:
              value: '2026-05-10T09:00:00Z'
            customer:
              value: Atlas Foods
            id:
              value: project_submitted_1
            priority:
              value: High
            status:
              value: submitted
            summary:
              value: Technician needs approval before ordering the replacement fan motor.
            title:
              value: Replace rooftop condenser fan
            updated_at:
              value: '2026-05-11T08:45:00Z'
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: A workspace member who is not a reviewer receives the mapped forbidden outcome before approval executes.
    subject_ref:
      application_action: application_action.project.approve
    then:
      authorization:
        denied:
        - application_action: application_action.project.approve
          authorization_policy: authorization_policy.project.reviewer
      domain_events:
        not_emitted:
        - domain_event.project.approved
      outcome: forbidden
    title: Approval authorization maps forbidden outcome
    when:
      invoke_application_action:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: application_action.project.approve
  test_case.project.approve.success:
    archetype: action_outcome
    feature_tag: project.approve
    given:
