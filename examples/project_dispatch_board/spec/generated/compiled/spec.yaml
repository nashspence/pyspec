text_resources:
  text.project.activity.empty.body:
    intent: instructional
    max_chars: 120
    placeholder: Activity appears after a project is selected.
    rationale: Empty activity body.
  text.project.activity.empty.heading:
    intent: neutral
    max_chars: 80
    placeholder: No project selected
    rationale: Empty activity heading.
  text.project.activity.ready.heading:
    intent: neutral
    max_chars: 80
    placeholder: Latest activity
    rationale: Ready activity heading.
  text.project.approve.forbidden:
    args:
      message:
        type: string
    intent: error
    max_chars: 120
    placeholder: 'Approval is forbidden: {message}'
    rationale: CLI approval forbidden message.
  text.project.approve.not_found:
    args:
      message:
        type: string
    intent: error
    max_chars: 120
    placeholder: 'Cannot approve project: {message}'
    rationale: CLI approval not-found message.
  text.project.approve.success:
    args:
      project_id:
        type: string
    intent: success
    max_chars: 120
    placeholder: Approved project {project_id}
    rationale: CLI approval success message.
  text.project.approve.transition_not_allowed:
    args:
      message:
        type: string
    intent: error
    max_chars: 120
    placeholder: 'Cannot approve project: {message}'
    rationale: CLI approval invalid-state message.
  text.project.approve.unauthenticated:
    args:
      message:
        type: string
    intent: error
    max_chars: 120
    placeholder: 'Sign in before approving: {message}'
    rationale: CLI approval unauthenticated message.
  text.project.approve.unavailable:
    intent: error
    max_chars: 120
    placeholder: Approval service is unavailable. Retry later.
    rationale: CLI approval unavailable message.
  text.project.detail.error.body:
    intent: error
    max_chars: 120
    placeholder: Refresh the selection or return to the queue.
    rationale: Error body for the detail state machine.
  text.project.detail.error.heading:
    intent: error
    max_chars: 80
    placeholder: Project detail is unavailable
    rationale: Error heading for the detail state machine.
  text.project.detail.loading.message:
    intent: neutral
    max_chars: 80
    placeholder: Loading project detail…
    rationale: Loading message for the detail state machine.
  text.project.detail.none.body:
    intent: instructional
    max_chars: 160
    placeholder: Choose a project from the queue to review customer, assignment, and approval details.
    rationale: No-selection body for the detail state machine.
  text.project.detail.none.heading:
    intent: instructional
    max_chars: 80
    placeholder: Select a project
    rationale: No-selection heading for the detail state machine.
  text.project.detail.ready.heading:
    args:
      customer:
        type: string
      title:
        type: string
    intent: neutral
    max_chars: 80
    placeholder: Project detail
    rationale: Ready heading for the detail state machine.
    source_ref: text.project.detail.ready.heading
  text.project.list.empty.body:
    intent: instructional
    max_chars: 160
    placeholder: Create the first project to start coordinating work for this workspace.
    rationale: Empty body for the project list state machine.
  text.project.list.empty.heading:
    intent: neutral
    max_chars: 80
    placeholder: No dispatch projects yet
    rationale: Empty heading for the project list state machine.
  text.project.list.error.body:
    intent: error
    max_chars: 120
    placeholder: Check the workspace connection and try again.
    rationale: Error body for the project list state machine.
  text.project.list.error.heading:
    intent: error
    max_chars: 80
    placeholder: Projects could not be loaded
    rationale: Error heading for the project list state machine.
  text.project.list.loading.message:
    intent: neutral
    max_chars: 80
    placeholder: Loading dispatch projects…
    rationale: Loading message for the project list state machine.
  text.project.list.ready.heading:
    intent: neutral
    max_chars: 80
    placeholder: Dispatch queue
    rationale: Ready heading for the project list state machine.
workflows:
  workflow.project.approval_notice:
    outcomes:
      completed:
        kind: success
        result:
          $ref: schema.project.notice_result
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_forbidden:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_unauthenticated:
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Approval domain event sends a downstream notice.
    ref: workflow.project.approval_notice
    steps:
    - application_action: application_action.project.send_approval_notice
      id: send_notice
      input_bindings:
        approved_by:
          from: $trigger.payload.approved_by
        project_id:
          from: $trigger.payload.project_id
      outcome_transitions:
        delivery_failed:
          retry_policy:
            attempts: 3
            backoff: exponential
            fail_as: delivery_failed
        forbidden:
          fail_as: notice_forbidden
        sent:
          complete_as: completed
        unauthenticated:
          fail_as: notice_unauthenticated
    trigger:
      domain_event: domain_event.project.approved
