  - action_outcome_effect.project.detail.ready.archive.unauthenticated
  - action_outcome_effect.project.list.empty.create.created
  - action_outcome_effect.project.list.empty.create.forbidden
  - action_outcome_effect.project.list.empty.create.unauthenticated
  - action_outcome_effect.project.list.empty.create.validation_failed
  - action_outcome_effect.project.list.ready.create.created
  - action_outcome_effect.project.list.ready.create.forbidden
  - action_outcome_effect.project.list.ready.create.unauthenticated
  - action_outcome_effect.project.list.ready.create.validation_failed
  - action_outcome_effect.project.list.ready.submit.forbidden
  - action_outcome_effect.project.list.ready.submit.not_found
  - action_outcome_effect.project.list.ready.submit.submitted
  - action_outcome_effect.project.list.ready.submit.transition_not_allowed
  - action_outcome_effect.project.list.ready.submit.unauthenticated
