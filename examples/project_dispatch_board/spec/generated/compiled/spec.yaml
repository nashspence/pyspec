access_policies:
  access_policy.project.member:
    action:
    - command.project.create
    - query.project.list
    - query.project.read
    - command.project.submit
    combining_algorithm: all_permit_rules_must_match
    environment: []
    rationale: Workspace members may create, read, list, and submit dispatch projects.
    resource:
    - entity_type: entity_type.project
    rules:
    - condition:
        subject_has_role: member
      effect: permit
    subject:
    - kind: actor
  access_policy.project.reviewer:
    action:
    - command.project.approve
    - command.project.archive
    - command.project.send_approval_notice
    combining_algorithm: all_permit_rules_must_match
    environment: []
    rationale: Reviewers may approve, archive, and send approval notices for dispatch projects.
    resource:
    - entity_type: entity_type.project
    rules:
    - condition:
        subject_has_role: reviewer
      effect: permit
    subject:
    - kind: actor
assertions: {}
behavior_scenarios:
  behavior_scenario.project.approval_notice.workflow:
    archetype: workflow_execution_success
    feature_tag: project.approval_notice
    given:
      preconditions: []
      seed_fixtures:
      - fixture.workspace.reviewer
    rationale: Approval domain event dispatches the notification workflow.
    system_under_test_ref:
      workflow: workflow.project.approval_notice
    then:
      domain_events:
        emitted:
        - domain_event.project.approved
      invoked:
      - command.project.send_approval_notice
      workflow:
        executed: true
        outcome: completed
        ref: workflow.project.approval_notice
    title: Approval domain event sends notice
    when:
      emit_domain_event:
        payload:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: domain_event.project.approved
  behavior_scenario.project.approve.access_denied:
    archetype: authorization_denied_assertion
    feature_tag: project.approve
    given:
      preconditions:
      - present:
          entity_type: entity_type.project
          values:
            assignee:
              value: Maya Chen
            created_at:
              value: '2026-05-10T09:00:00Z'
            customer:
              value: Atlas Foods
            id:
              value: project_submitted_1
            priority:
              value: High
            status:
              value: submitted
            summary:
              value: Technician needs approval before ordering the replacement fan motor.
            title:
              value: Replace rooftop condenser fan
            updated_at:
              value: '2026-05-11T08:45:00Z'
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: A workspace member who is not a reviewer receives the mapped access_denied outcome before approval executes.
    system_under_test_ref:
      command: command.project.approve
    then:
      authorization:
        denied:
        - access_policy: access_policy.project.reviewer
          command: command.project.approve
      domain_events:
        not_emitted:
        - domain_event.project.approved
      outcome: access_denied
    title: Approval authorization maps access_denied outcome
    when:
      invoke_command:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: command.project.approve
  behavior_scenario.project.approve.success:
    archetype: command_outcome
    feature_tag: project.approve
    given:
      preconditions:
      - present:
          entity_type: entity_type.project
          values:
            assignee:
              value: Maya Chen
            created_at:
              value: '2026-05-10T09:00:00Z'
            customer:
              value: Atlas Foods
            id:
              value: project_submitted_1
            priority:
              value: High
            status:
              value: submitted
            summary:
              value: Technician needs approval before ordering the replacement fan motor.
            title:
              value: Replace rooftop condenser fan
            updated_at:
              value: '2026-05-11T08:45:00Z'
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.reviewer
    rationale: Approval transitions a submitted project to approved and emits the domain event.
    system_under_test_ref:
      command: command.project.approve
    then:
      authorization:
        allowed:
        - access_policy: access_policy.project.reviewer
          command: command.project.approve
      domain_events:
        emitted:
        - domain_event.project.approved
      entity:
        exists:
          entity_type: entity_type.project
          where:
            id:
              value: project_submitted_1
            status:
              value: approved
      invoked:
      - command.project.approve
      outcome: approved
    title: Approve submitted dispatch project
    when:
      invoke_command:
        input:
          approved_by:
            from: $fixture.actor.id
          project_id:
            value: project_submitted_1
        ref: command.project.approve
  behavior_scenario.project.board.empty:
    archetype: state_machine_composition
    feature_tag: project.board
    given:
      preconditions:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
      - fixture.workspace.member
    rationale: An empty workspace shows empty list, no detail, and no activity.
    system_under_test_ref:
      state_machine: state_machine.project.board
    then:
      authorization:
        denied:
        - access_policy: access_policy.project.reviewer
          command: command.project.approve
      enables:
      - command.project.create
      requires:
        command_bindings:
        - create
        media_assets:
        - media_asset.project.list.empty.illustration
        query_bindings:
        - list_board
        - list_projects
        renderer_surfaces:
        - state_machine.project.board.ready
        - state_machine.project.activity.empty
        - state_machine.project.detail.none
        - state_machine.project.list.empty
        text_resources:
        - text_resource.project.activity.empty.heading
        - text_resource.project.activity.empty.body
        - text_resource.project.detail.none.heading
        - text_resource.project.detail.none.body
        - text_resource.project.list.empty.heading
        - text_resource.project.list.empty.body
      state_machine:
        instances:
          activity:
            renderer_surface: state_machine.project.activity.empty
            source: state_machine.project.activity
            state: empty
          detail:
            renderer_surface: state_machine.project.detail.none
            source: state_machine.project.detail
            state: none
          list:
            renderer_surface: state_machine.project.list.empty
            source: state_machine.project.list
            state: empty
        local_signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        ref: state_machine.project.board
        renderer_surface: state_machine.project.board.ready
        state: ready
        state_machine_composition:
          child_state_machines:
          - context_bindings:
              selected_project_id:
                from: $state_machine.selected_project_id
              workspace_id:
                from: $state_machine.workspace_id
            html_region: nav
            id: list
            initial_state: loading
            state_machine: state_machine.project.list
            textual_container: nav
          - context_bindings:
              project_id:
                from: $state_machine.selected_project_id
            html_region: main
            id: detail
            initial_state: none
            selected:
              condition:
                context_non_null: selected_project_id
              state: loading
            state_machine: state_machine.project.detail
            textual_container: main
          - context_bindings:
              project_id:
                from: $state_machine.selected_project_id
            html_region: aside
            id: activity
            initial_state: empty
            selected:
              condition:
                context_non_null: selected_project_id
              state: ready
            state_machine: state_machine.project.activity
            textual_container: aside
          local_signal_sync_rules:
          - id: select_project_updates_state_machines
            local_effects:
            - set:
                context: selected_project_id
                from: $trigger.payload.project_id
            - send:
                instance: detail
                local_signal: selection_changed
                payload_bindings:
                  project_id:
                    from: $trigger.payload.project_id
            - send:
                instance: activity
                local_signal: selection_changed
                payload_bindings:
                  project_id:
                    from: $trigger.payload.project_id
            trigger:
              instance: list
              local_signal: project_selected
          renderers:
            html:
              layout:
                regions:
                  aside:
                    classes:
                    - dispatch-board-aside
                    element: aside
                    must_render: true
                    order: 3
                    role: complementary
                  main:
                    classes:
                    - dispatch-board-main
                    element: main
                    must_render: true
                    order: 2
                    role: main
                  nav:
                    classes:
                    - dispatch-board-nav
                    element: nav
                    must_render: true
                    order: 1
                    role: navigation
                root:
                  classes:
                  - dispatch-board
                  element: section
                  role: region
              style:
                rules:
                - declarations:
                    display: grid
                    gap: token.gap
                    grid-template-columns: token.nav_width 1fr token.aside_width
                  selector: root
                - declarations:
                    min-width: token.nav_width
                  selector: region.nav
                - declarations:
                    min-width: '0'
                  selector: region.main
                - declarations:
                    min-width: token.aside_width
                  selector: region.aside
                tokens:
                  aside_width: 16rem
                  gap: 1rem
                  nav_width: 20rem
            textual:
              layout:
                containers:
                  aside:
                    container_class: Container
                    id: aside
                    must_render: true
                    order: 3
                  main:
                    container_class: Container
                    id: main
                    must_render: true
                    order: 2
                  nav:
                    container_class: Container
                    id: nav
                    must_render: true
                    order: 1
                screen_class: ProjectBoardScreen
              style:
                rules:
                - declarations:
                    layout: horizontal
                  selector: screen
                - declarations:
                    width: '32'
                  selector: container.nav
                - declarations:
                    width: '28'
                  selector: container.aside
    title: Empty dispatch board
    when:
      open_external_interface:
        input:
          workspace_id:
            from: $fixture.workspace.id
        ref: external_interface.html.project.board
