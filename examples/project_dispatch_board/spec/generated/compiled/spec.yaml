workflows:
  workflow.project.approval_notice:
    outcomes:
      completed:
        kind: success
        result:
          data_contract: data_contract.project.notice_result
      delivery_failed:
        kind: failure
        result:
          model: Problem
      notice_forbidden:
        kind: failure
        result:
          model: Problem
      notice_unauthenticated:
        kind: failure
        result:
          model: Problem
    rationale: Approval event sends a downstream notice.
    ref: workflow.project.approval_notice
    steps:
    - id: send_notice
      input_bindings:
        approved_by:
          from: $trigger.payload.approved_by
        project_id:
          from: $trigger.payload.project_id
      operation: operation.project.send_approval_notice
      outcome_routes:
        delivery_failed:
          retry_policy:
            attempts: 3
            backoff: exponential
            fail_as: delivery_failed
        forbidden:
          fail_as: notice_forbidden
        sent:
          complete_as: completed
        unauthenticated:
          fail_as: notice_unauthenticated
    trigger:
      event: event.project.approved
