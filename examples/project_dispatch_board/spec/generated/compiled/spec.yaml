viewport_profiles:
  viewport_profile.default:
    html_viewports:
      compact:
        height: 820
        width: 420
      wide:
        height: 820
        width: 1280
    rationale: Two viewport breakpoints are enough to demonstrate visual audit coverage in the canonical example.
    textual_viewports:
      compact:
        columns: 80
        rows: 26
      wide:
        columns: 120
        rows: 36
workflows:
  workflow.project.approval_notice:
    activities:
    - command: command.project.send_approval_notice
      id: send_notice
      input_mapping:
        approved_by:
          from: $workflow_input.payload.approved_by
        project_id:
          from: $workflow_input.payload.project_id
    failure_handlers: {}
    gateways:
      notice_success:
        gateway_type: exclusive
        rationale: Successful notice delivery enters the terminal success branch.
    inputs:
      domain_event: domain_event.project.approved
    outputs:
      completed:
        kind: success
        result:
          $ref: schema.project.notice_result
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      notice_authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Approval domain event sends a downstream notice.
    ref: workflow.project.approval_notice
    retry_policies: {}
    sequence_flows:
      notice_success_completed:
        source_ref:
          gateway: notice_success
        target_ref:
          terminal: completed
      send_notice_access_denied:
        source_outcome: access_denied
        source_ref:
          activity: send_notice
        target_ref:
          terminal: notice_access_denied
      send_notice_authentication_required:
        source_outcome: authentication_required
        source_ref:
          activity: send_notice
        target_ref:
          terminal: notice_authentication_required
      send_notice_delivery_failed:
        retry_policy:
          attempts: 3
          backoff: exponential
        source_outcome: delivery_failed
        source_ref:
          activity: send_notice
        target_ref:
          terminal: delivery_failed
      send_notice_sent:
        source_outcome: sent
        source_ref:
          activity: send_notice
        target_ref:
          gateway: notice_success
