render_profiles:
  render_profile.default:
    html_viewports:
      compact:
        height: 820
        width: 420
      wide:
        height: 820
        width: 1280
    rationale: Two viewport breakpoints are enough to demonstrate visual audit coverage in the canonical example.
    textual_viewports:
      compact:
        columns: 80
        rows: 26
      wide:
        columns: 120
        rows: 36
state_machines:
  state_machine.project.activity:
    context:
      project_id:
        nullable: true
        required: false
        type:
          primitive: ID
    initial_view_state: empty
    model: Project
    query_invocations: {}
    rationale: The activity state machine summarizes latest status around the selected project.
    signals:
      accepts:
        data_signals: {}
        messages:
          selection_changed:
            payload_schema:
              project_id:
                primitive: ID
          selection_cleared:
            payload_schema: {}
      emits:
        messages: {}
    transitions:
    - from: empty
      on:
        message: selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on:
        message: selection_cleared
      to: empty
    view_states:
      empty:
        assets: []
        fields: []
        operation_invocations: {}
        query_invocations: {}
        surface: state_machine.project.activity.empty
        text:
        - text.project.activity.empty.heading
        - text.project.activity.empty.body
      ready:
        assets: []
        fields:
        - updated_at
        - status
        - assignee
        operation_invocations: {}
        query_invocations:
          read_activity:
            input_bindings:
              project_id:
                from: $context.project_id
            load:
              on_enter: true
            operation: operation.project.read
            outcome_routes:
              forbidden:
                no_signal:
                  rationale: The activity panel remains in its current state when authorization blocks the refresh.
                  reason: intentionally_unobservable
              found:
                no_signal:
                  reason: result_bound_without_signal
                result_binding:
                  data_key: activity
                  from:
                    from: $outcome.result
              not_found:
                no_signal:
                  rationale: The parent detail panel owns not-found display for the selected project.
                  reason: intentionally_unobservable
              unauthenticated:
                no_signal:
                  rationale: The entry response surface owns unauthenticated display.
                  reason: intentionally_unobservable
        surface: state_machine.project.activity.ready
        text:
        - text.project.activity.ready.heading
  state_machine.project.board:
    archetype: dashboard
    context:
      selected_project_id:
        nullable: true
        required: false
        type:
          primitive: ID
      workspace_id:
        nullable: false
        required: true
        type:
          primitive: ID
    initial_view_state: ready
    model: Project
    query_invocations:
      list_board:
        input_bindings:
          workspace_id:
            from: $context.workspace_id
        load:
          on_start: true
        operation: operation.project.list
        outcome_routes:
          forbidden:
            no_signal:
              rationale: The board shell leaves child surfaces unchanged when list access is forbidden.
              reason: handled_by_response_surface
          listed:
            no_signal:
              reason: result_bound_without_signal
            result_binding:
              data_key: projects
              from:
                from: $outcome.result
          unauthenticated:
            no_signal:
              rationale: The entry response surface owns unauthenticated display.
              reason: handled_by_response_surface
          unavailable:
            no_signal:
              rationale: The board shell leaves child surfaces unchanged while the list service is unavailable.
              reason: handled_by_response_surface
    rationale: The dispatch board composes list, detail, and activity state machines through shared selected-project context.
    signals:
      accepts:
        data_signals: {}
        messages: {}
      emits:
        messages: {}
    transitions: []
    view_states:
      ready:
        assets: []
        child_state_machines:
        - context_bindings:
            selected_project_id:
              from: $state_machine.selected_project_id
            workspace_id:
              from: $state_machine.workspace_id
          html_region: nav
          id: list
          initial_view_state: loading
          state_machine: state_machine.project.list
          textual_container: nav
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          html_region: main
          id: detail
          initial_view_state: none
          selected:
            view_state: loading
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.detail
          textual_container: main
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          html_region: aside
          id: activity
          initial_view_state: empty
          selected:
            view_state: ready
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.activity
          textual_container: aside
        fields: []
        operation_invocations: {}
        query_invocations: {}
        render_audit_cases:
          empty:
            instances:
              activity:
                view_state: empty
              detail:
                view_state: none
              list:
                view_state: empty
            rationale: Audit render for empty board state vector.
            seed_fixtures:
            - fixture.workspace.member
          ready_selected:
            context:
              selected_project_id:
                value: project_submitted_1
            fact_refs:
            - ref: fact.project.submitted
            - ref: fact.project.draft
            instances:
              activity:
                view_state: ready
              detail:
                view_state: ready
              list:
                view_state: ready
            rationale: Audit render for selected-project board state vector using named project facts.
            seed_fixtures:
            - fixture.workspace.member
        renderers:
          html:
            layout:
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  must_render: true
                  order: 3
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  must_render: true
                  order: 2
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  must_render: true
                  order: 1
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            style:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
          textual:
            layout:
              containers:
                aside:
                  container_class: Container
                  id: aside
                  must_render: true
                  order: 3
                main:
                  container_class: Container
                  id: main
                  must_render: true
                  order: 2
                nav:
                  container_class: Container
                  id: nav
                  must_render: true
                  order: 1
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: container.nav
              - declarations:
                  width: '28'
                selector: container.aside
        signal_sync_rules:
        - effects:
          - set:
              context: selected_project_id
              from: $message.project_id
          - send:
              instance: detail
              message: selection_changed
              payload_bindings:
                project_id:
                  from: $message.project_id
          - send:
              instance: activity
              message: selection_changed
              payload_bindings:
                project_id:
                  from: $message.project_id
          id: select_project_updates_state_machines
          when:
            instance: list
            message: project_selected
        surface: state_machine.project.board.ready
        text: []
  state_machine.project.detail:
    context:
      project_id:
        nullable: true
        required: false
        type:
          primitive: ID
    initial_view_state: none
    model: Project
    query_invocations: {}
    rationale: The detail state machine is independent from the list and reacts to selected project context.
    signals:
      accepts:
        data_signals:
          project_changed:
            payload_schema: {}
          project_load_failed:
            payload_schema: {}
          project_loaded:
            payload_schema: {}
        messages:
          selection_changed:
            payload_schema:
              project_id:
                primitive: ID
          selection_cleared:
            payload_schema: {}
          show_invalid_state:
            payload_schema:
              message:
                primitive: Text
      emits:
        messages: {}
    transitions:
    - from: none
      on:
        message: selection_changed
      to: loading
    - from: loading
      on:
        data_signal: project_loaded
      to: ready
    - from: loading
      on:
        data_signal: project_load_failed
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on:
        message: selection_cleared
      to: none
    - from: ready
      on:
        data_signal: project_changed
      rationale: Detail mutations mark ready-state project data stale and trigger query refresh.
      to: ready
    - from: ready
      on:
        message: show_invalid_state
      rationale: Invalid detail operations move the detail panel into its displayable error state.
      to: error
    view_states:
      error:
        assets: []
        fields: []
        operation_invocations: {}
        query_invocations: {}
        surface: state_machine.project.detail.error
        text:
        - text.project.detail.error.heading
        - text.project.detail.error.body
      loading:
        assets: []
        fields: []
        operation_invocations: {}
        query_invocations:
          read_project:
            input_bindings:
              project_id:
                from: $context.project_id
            load:
              on_enter: true
            operation: operation.project.read
            outcome_routes:
              forbidden:
                raise:
                  data_signal: project_load_failed
              found:
                raise:
                  data_signal: project_loaded
                result_binding:
                  data_key: project
                  from:
                    from: $outcome.result
              not_found:
                raise:
                  data_signal: project_load_failed
              unauthenticated:
                raise:
                  data_signal: project_load_failed
        surface: state_machine.project.detail.loading
        text:
        - text.project.detail.loading.message
      none:
        assets: []
        fields: []
        operation_invocations: {}
        query_invocations: {}
        surface: state_machine.project.detail.none
        text:
        - text.project.detail.none.heading
        - text.project.detail.none.body
      ready:
        assets:
        - asset.project.detail.ready.priority_badge
        fields:
        - title
        - customer
        - status
        - assignee
        - summary
        operation_invocations:
          approve:
            input_bindings:
              approved_by:
                from: $actor.id
              project_id:
                from: $context.project_id
            operation: operation.project.approve
            outcome_routes:
              approved:
                raise:
                  data_signal: project_changed
              forbidden:
                no_signal:
                  rationale: The response surface keeps the detail panel unchanged for forbidden approval.
                  reason: handled_by_response_surface
              invalid_state:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                no_signal:
                  rationale: The response surface reports a missing project without a local transition.
                  reason: handled_by_response_surface
              unauthenticated:
                no_signal:
                  rationale: The response surface reports authentication failure without a local transition.
                  reason: handled_by_response_surface
              unavailable:
                no_signal:
                  rationale: The response surface reports temporary unavailability without a local transition.
                  reason: handled_by_response_surface
          archive:
            input_bindings:
              project_id:
                from: $context.project_id
            operation: operation.project.archive
            outcome_routes:
              archived:
                raise:
                  data_signal: project_changed
              forbidden:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              invalid_state:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              unauthenticated:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        query_invocations:
          read_project:
            input_bindings:
              project_id:
                from: $context.project_id
            load:
              on_enter: true
              refresh_on:
              - data_signal: project_changed
            operation: operation.project.read
            outcome_routes:
              forbidden:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              found:
                no_signal:
                  reason: result_bound_without_signal
                result_binding:
                  data_key: project
                  from:
                    from: $outcome.result
              not_found:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              unauthenticated:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        surface: state_machine.project.detail.ready
        text:
        - text.project.detail.ready.heading
  state_machine.project.list:
    context:
      selected_project_id:
        nullable: true
        required: false
        type:
          primitive: ID
      workspace_id:
        nullable: false
        required: true
        type:
          primitive: ID
    initial_view_state: loading
    model: Project
    query_invocations:
      list_projects:
        input_bindings:
          workspace_id:
            from: $context.workspace_id
        load:
          on_start: true
          refresh_on:
          - data_signal: projects_changed
        operation: operation.project.list
        outcome_routes:
          forbidden:
            raise:
              data_signal: project_list_failed
          listed:
            context_updates:
              workspace_id:
                from: $invocation.input.workspace_id
            raise:
              data_signal: projects_loaded
            result_binding:
              data_key: projects
              from:
                from: $outcome.result
          unauthenticated:
            raise:
              data_signal: project_list_failed
          unavailable:
            raise:
              data_signal: project_list_failed
    rationale: The list state machine owns collection loading, empty, ready, error, and selection behavior.
    signals:
      accepts:
        data_signals:
          project_collection_empty:
            payload_schema: {}
          project_list_failed:
            payload_schema: {}
          projects_changed:
            payload_schema: {}
          projects_loaded:
            payload_schema: {}
        messages:
          project_select:
            payload_schema:
              project_id:
                primitive: ID
          show_invalid_state:
            payload_schema:
              message:
                primitive: Text
      emits:
        messages:
          project_selected:
            payload_schema:
              project_id:
                primitive: ID
    transitions:
    - from: loading
      on:
        data_signal: project_collection_empty
      to: empty
    - from: loading
      on:
        data_signal: projects_loaded
      to: ready
    - from: loading
      on:
        data_signal: project_list_failed
      to: error
    - from: empty
      on:
        data_signal: projects_loaded
      to: ready
    - from: empty
      on:
        data_signal: projects_changed
      rationale: List mutations invalidate the empty collection and let the list query refresh it.
      to: empty
    - from: empty
      on:
        message: show_invalid_state
      rationale: Invalid create attempts move the list into its displayable error state.
      to: error
    - effects:
      - emit:
          message: project_selected
          payload_bindings:
            project_id:
              from: $message.project_id
      from: ready
      on:
        message: project_select
      to: ready
    - from: ready
      on:
        data_signal: projects_changed
      rationale: List mutations mark ready-state collection data stale and trigger query refresh.
      to: ready
    - from: ready
      on:
        data_signal: projects_loaded
      rationale: Successful list queries refresh ready-state collection data.
      to: ready
    - from: ready
      on:
        message: show_invalid_state
      rationale: Invalid list operations move the list into its displayable error state.
      to: error
    view_states:
      empty:
        assets:
        - asset.project.list.empty.illustration
        fields: []
        operation_invocations:
          create:
            input_bindings:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $context.workspace_id
            operation: operation.project.create
            outcome_routes:
              created:
                raise:
                  data_signal: projects_changed
              forbidden:
                no_signal:
                  rationale: The response surface keeps the empty list visible for forbidden create.
                  reason: handled_by_response_surface
              unauthenticated:
                no_signal:
                  rationale: The response surface reports authentication failure without a local transition.
                  reason: handled_by_response_surface
              validation_failed:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        query_invocations: {}
        surface: state_machine.project.list.empty
        text:
        - text.project.list.empty.heading
        - text.project.list.empty.body
      error:
        assets: []
        fields: []
        operation_invocations: {}
        query_invocations: {}
        surface: state_machine.project.list.error
        text:
        - text.project.list.error.heading
        - text.project.list.error.body
      loading:
        assets: []
        fields: []
        operation_invocations: {}
        query_invocations: {}
        surface: state_machine.project.list.loading
        text:
        - text.project.list.loading.message
      ready:
        assets: []
        fields:
        - title
        - customer
        - priority
        - status
        operation_invocations:
          create:
            input_bindings:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $context.workspace_id
            operation: operation.project.create
            outcome_routes:
              created:
                raise:
                  data_signal: projects_changed
              forbidden:
                no_signal:
                  rationale: The response surface keeps the ready list visible for forbidden create.
                  reason: handled_by_response_surface
              unauthenticated:
                no_signal:
                  rationale: The response surface reports authentication failure without a local transition.
                  reason: handled_by_response_surface
              validation_failed:
                no_signal:
                  rationale: The ready list keeps focus while the response surface shows validation errors.
                  reason: handled_by_response_surface
          submit:
            input_bindings:
              project_id:
                from: $context.selected_project_id
            operation: operation.project.submit
            outcome_routes:
              forbidden:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              invalid_state:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              not_found:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
              submitted:
                raise:
                  data_signal: projects_changed
              unauthenticated:
                raise:
                  message: show_invalid_state
                  payload_bindings:
                    message:
                      from: $outcome.result.message
        query_invocations: {}
        surface: state_machine.project.list.ready
        text:
        - text.project.list.ready.heading
