        - text_resource.project.list.empty.heading
        - text_resource.project.list.empty.body
      error:
        command_bindings: {}
        fields: []
        media_assets: []
        query_bindings: {}
        renderer_surface: state_machine.project.list.error
        text_resources:
        - text_resource.project.list.error.heading
        - text_resource.project.list.error.body
      loading:
        command_bindings: {}
        fields: []
        media_assets: []
        query_bindings: {}
        renderer_surface: state_machine.project.list.loading
        text_resources:
        - text_resource.project.list.loading.message
      ready:
        command_bindings:
          create:
            command: command.project.create
            input_mapping:
              customer:
                value: Atlas Foods
              priority:
                value: High
              title:
                value: Replace rooftop condenser fan
              workspace_id:
                from: $state_context.workspace_id
            local_effects:
              access_denied:
                no_local_effect:
                  rationale: The response mapping keeps the ready list visible for access_denied create.
                  reason: handled_by_response_mapping
              authentication_required:
                no_local_effect:
                  rationale: The response mapping reports authentication failure without a local transition.
                  reason: handled_by_response_mapping
              created:
                raise:
                  data_refresh_signal: projects_changed
              validation_failed:
                no_local_effect:
                  rationale: The ready list keeps focus while the response mapping shows validation errors.
                  reason: handled_by_response_mapping
          submit:
            command: command.project.submit
            input_mapping:
              project_id:
                from: $state_context.selected_project_id
            local_effects:
              access_denied:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              authentication_required:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              lifecycle_transition_not_allowed:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              not_found:
                raise:
                  local_signal: show_lifecycle_transition_not_allowed
                  payload_bindings:
                    message:
                      from: $command_outcome.result.message
              submitted:
                raise:
                  data_refresh_signal: projects_changed
        fields:
        - title
        - customer
        - priority
        - status
        media_assets: []
        query_bindings: {}
        renderer_surface: state_machine.project.list.ready
        text_resources:
        - text_resource.project.list.ready.heading
    transitions:
    - from: loading
      to: empty
      trigger:
        data_refresh_signal: project_collection_empty
    - from: loading
      to: ready
      trigger:
        data_refresh_signal: projects_loaded
    - from: loading
      to: error
      trigger:
        data_refresh_signal: project_list_failed
    - from: empty
      to: ready
      trigger:
        data_refresh_signal: projects_loaded
    - from: empty
      rationale: List mutations invalidate the empty collection and let the list query refresh it.
      to: empty
      trigger:
        data_refresh_signal: projects_changed
    - from: empty
      rationale: Invalid create attempts move the list into its displayable error state.
      to: error
      trigger:
        local_signal: show_lifecycle_transition_not_allowed
    - from: ready
      local_effects:
      - emit:
          local_signal: project_selected
          payload_bindings:
            project_id:
              from: $trigger.payload.project_id
      to: ready
      trigger:
        local_signal: project_select
    - from: ready
      rationale: List mutations mark ready-state collection data stale and trigger query refresh.
      to: ready
      trigger:
        data_refresh_signal: projects_changed
    - from: ready
      rationale: Successful list queries refresh ready-state collection data.
      to: ready
      trigger:
        data_refresh_signal: projects_loaded
    - from: ready
      rationale: Invalid list queries move the list into its displayable error state.
      to: error
      trigger:
        local_signal: show_lifecycle_transition_not_allowed
