fsms:
  state_machine.project.activity:
    basis: The activity FSM summarizes latest status around the selected project.
    context:
      project_id:
        primitive: ID
    data: []
    initial: empty
    messages:
      accepts:
        message.project.selection_changed:
          payload:
            project_id:
              primitive: ID
        message.selection.cleared:
          payload: {}
      emits: {}
    model: Project
    states:
      empty:
        actions: []
        assets: []
        copy:
        - text.project.activity.empty.heading
        - text.project.activity.empty.body
        data: []
        fields: []
        surface: state_machine.project.activity.empty
      ready:
        actions: []
        assets: []
        copy:
        - text.project.activity.ready.heading
        data:
        - operation: operation.project.read
          query: query.project.activity.read
        fields:
        - updated_at
        - status
        - assignee
        surface: state_machine.project.activity.ready
    transitions:
    - from: empty
      on: message.project.selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: message.selection.cleared
      to: empty
  state_machine.project.board:
    archetype: dashboard
    basis: The dispatch board composes list, detail, and activity FSMs through shared selected-project context.
    context:
      selected_project_id:
        primitive: ID
      workspace_id:
        primitive: ID
    data:
    - operation: operation.project.list
      query: query.project.board.list
    initial: ready
    messages:
      accepts: {}
      emits: {}
    model: Project
    states:
      ready:
        actions: []
        assets: []
        audit:
          empty:
            basis: Audit render for empty board state vector.
            fixtures:
            - fixture.workspace.member
            instances:
              activity:
                state: empty
              detail:
                state: none
              list:
                state: empty
            profile: default
            surfaces:
            - html
            - textual
          ready_selected:
            basis: Audit render for selected-project board state vector using named project facts.
            context:
              selected_project_id: project_submitted_1
            facts:
            - use: fact.project.submitted
            - use: fact.project.draft
            fixtures:
            - fixture.workspace.member
            instances:
              activity:
                state: ready
              detail:
                state: ready
              list:
                state: ready
            profile: default
            surfaces:
            - html
            - textual
        copy: []
        data: []
        fields: []
        layout:
          html:
            css:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
            regions:
              aside:
                classes:
                - dispatch-board-aside
                element: aside
                order: 3
                required: true
                role: complementary
              main:
                classes:
                - dispatch-board-main
                element: main
                order: 2
                required: true
                role: main
              nav:
                classes:
                - dispatch-board-nav
                element: nav
                order: 1
                required: true
                role: navigation
            root:
              classes:
              - dispatch-board
              element: section
              role: region
          textual:
            containers:
              aside:
                id: aside
                kind: Container
                order: 3
                required: true
              main:
                id: main
                kind: Container
                order: 2
                required: true
              nav:
                id: nav
                kind: Container
                order: 1
                required: true
            screen_class: ProjectBoardScreen
            tcss:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: region.nav
              - declarations:
                  width: '28'
                selector: region.aside
        mounts:
        - context:
            selected_project_id: $state_machine.selected_project_id
            workspace_id: $state_machine.workspace_id
          fsm: state_machine.project.list
          id: list
          initial: loading
          region: nav
        - context:
            project_id: $state_machine.selected_project_id
          fsm: state_machine.project.detail
          id: detail
          initial: none
          region: main
          selected:
            state: loading
            when:
              context_present: selected_project_id
        - context:
            project_id: $state_machine.selected_project_id
          fsm: state_machine.project.activity
          id: activity
          initial: empty
          region: aside
          selected:
            state: ready
            when:
              context_present: selected_project_id
        surface: state_machine.project.board.ready
        sync:
        - do:
          - set:
              context: selected_project_id
              from: $message.project_id
          - send:
              data:
                project_id: $message.project_id
              instance: detail
              message: message.project.selection_changed
          - send:
              data:
                project_id: $message.project_id
              instance: activity
              message: message.project.selection_changed
          id: select_project_updates_fsms
          when:
            instance: list
            message: message.project.selected
    transitions: []
  state_machine.project.detail:
    basis: The detail FSM is independent from the list and reacts to selected project context.
    context:
      project_id:
        primitive: ID
    data: []
    initial: none
    messages:
      accepts:
        data.error:
          payload: {}
        data.ready:
          payload: {}
        message.project.selection_changed:
          payload:
            project_id:
              primitive: ID
        message.selection.cleared:
          payload: {}
      emits: {}
    model: Project
    states:
      error:
        actions: []
        assets: []
        copy:
        - text.project.detail.error.heading
        - text.project.detail.error.body
        data: []
        fields: []
        surface: state_machine.project.detail.error
      loading:
        actions: []
        assets: []
        copy:
        - text.project.detail.loading.message
        data:
        - operation: operation.project.read
          query: query.project.detail.read
        fields: []
        surface: state_machine.project.detail.loading
      none:
        actions: []
        assets: []
        copy:
        - text.project.detail.none.heading
        - text.project.detail.none.body
        data: []
        fields: []
        surface: state_machine.project.detail.none
      ready:
        actions:
        - operation.project.approve
        - operation.project.archive
        assets:
        - asset.project.detail.ready.priority_badge
        copy:
        - text.project.detail.ready.heading
        data: []
        fields:
        - title
        - customer
        - status
        - assignee
        - summary
        surface: state_machine.project.detail.ready
    transitions:
    - from: none
      on: message.project.selection_changed
      to: loading
    - from: loading
      on: data.ready
      to: ready
    - from: loading
      on: data.error
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: message.selection.cleared
      to: none
  state_machine.project.list:
    basis: The list FSM owns collection loading, empty, ready, error, and selection behavior.
    context:
      selected_project_id:
        primitive: ID
      workspace_id:
        primitive: ID
    data:
    - operation: operation.project.list
      query: query.project.list.list
    initial: loading
    messages:
      accepts:
        data.empty:
          payload: {}
        data.error:
          payload: {}
        data.ready:
          payload: {}
        message.project.select:
          payload:
            project_id:
              primitive: ID
      emits:
        message.project.selected:
          payload:
            project_id:
              primitive: ID
    model: Project
    states:
      empty:
        actions:
        - operation.project.create
        assets:
        - asset.project.list.empty.illustration
        copy:
        - text.project.list.empty.heading
        - text.project.list.empty.body
        data: []
        fields: []
        surface: state_machine.project.list.empty
      error:
        actions: []
        assets: []
        copy:
        - text.project.list.error.heading
        - text.project.list.error.body
        data: []
        fields: []
        surface: state_machine.project.list.error
      loading:
        actions: []
        assets: []
        copy:
        - text.project.list.loading.message
        data: []
        fields: []
        surface: state_machine.project.list.loading
      ready:
        actions:
        - operation.project.create
        - operation.project.submit
        assets: []
        copy:
        - text.project.list.ready.heading
        data: []
        fields:
        - title
        - customer
        - priority
        - status
        surface: state_machine.project.list.ready
    transitions:
    - from: loading
      on: data.empty
      to: empty
    - from: loading
      on: data.ready
      to: ready
    - from: loading
      on: data.error
      to: error
    - from: empty
      on: data.ready
      to: ready
    - effects:
      - emit:
          data:
            project_id: $message.project_id
          message: message.project.selected
      from: ready
      on: message.project.select
      to: ready
models:
  Problem:
    basis: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    fields:
      code:
        nullable: false
        required: true
        type:
          primitive: Text
      message:
        nullable: false
        required: true
        type:
          primitive: Text
    lifecycle: null
  Project:
    basis: A dispatch project is the durable work item displayed and acted on by the board.
    fields:
      assignee:
        nullable: false
        required: true
        type:
          primitive: Text
      created_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      customer:
        nullable: false
        required: true
        type:
          primitive: Text
      id:
        nullable: false
        required: true
        type:
          primitive: ID
      priority:
        nullable: false
        required: true
        type:
          primitive: Text
      status:
        nullable: false
        required: true
        type:
          enum:
          - draft
          - submitted
          - approved
          - archived
      summary:
        nullable: false
        required: true
        type:
          primitive: Text
      title:
        nullable: false
        required: true
        type:
          primitive: Text
      updated_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      workspace_id:
        nullable: false
        required: true
        type:
          primitive: ID
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - from: draft
        to: submitted
        triggered_by: operation.project.submit
      - from: submitted
        to: approved
        triggered_by: operation.project.approve
      - from: approved
        to: archived
        triggered_by: operation.project.archive
  ProjectApproved:
    basis: Approval events carry only the integration payload required by downstream workflows.
    fields:
      approved_by:
        nullable: false
        required: true
        type:
          primitive: ID
      project_id:
        nullable: false
        required: true
        type:
          primitive: ID
    lifecycle: null
operations:
  operation.project.approve:
    basis: Reviewers can approve submitted dispatch projects.
    creates: []
    deletes: []
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      approved:
        emits:
        - event: event.project.approved
          with:
            approved_by: $input.approved_by
            project_id: $input.project_id
        kind: success
        result:
          model: Project
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
    policy: policy.project.approve
    reads: []
    transition:
      field: status
      from: submitted
      model: Project
      to: approved
    updates: []
  operation.project.archive:
    basis: Approved dispatch projects can be archived.
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      archived:
        emits:
        - event: event.project.archived
          payload: $outcome.result
        kind: success
        result:
          model: Project
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
    policy: policy.project.archive
    reads: []
    transition:
      field: status
      from: approved
      model: Project
      to: archived
    updates: []
  operation.project.create:
    basis: Members can create a new dispatch project.
    creates:
    - Project
    deletes: []
    input:
      customer:
        primitive: Text
      priority:
        primitive: Text
      title:
        primitive: Text
      workspace_id:
        primitive: ID
    operation_kind: command
    outcomes:
      created:
        emits:
        - event: event.project.created
          payload: $outcome.result
        kind: success
        result:
          model: Project
      validation_failed:
        emits: []
        kind: failure
        result:
          model: Problem
    policy: policy.project.create
    reads: []
    updates: []
  operation.project.list:
    basis: The board requires a project list query scoped by workspace.
    creates: []
    deletes: []
    input:
      workspace_id:
        primitive: ID
    operation_kind: query
    outcomes:
      listed:
        emits: []
        kind: success
        result:
          array:
            model: Project
      unavailable:
        emits: []
        kind: failure
        result:
          model: Problem
    policy: policy.project.list
    reads:
    - Project
    updates: []
  operation.project.read:
    basis: The detail FSM loads the selected project by id.
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: query
    outcomes:
      found:
        emits: []
        kind: success
        result:
          model: Project
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
    policy: policy.project.read
    reads:
    - Project
    updates: []
  operation.project.send_approval_notice:
    basis: Approval triggers a notification command for downstream coordination.
    creates: []
    deletes: []
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: command
    outcomes:
      delivery_failed:
        emits: []
        kind: failure
        result:
          model: Problem
      sent:
        emits: []
        kind: success
        result:
          model: NoticeResult
