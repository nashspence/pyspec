                message: message.project.selection_changed
                payload_bindings:
                  project_id: $message.project_id
            - send:
                instance: activity
                message: message.project.selection_changed
                payload_bindings:
                  project_id: $message.project_id
            id: select_project_updates_state_machines
            when:
              instance: list
              message: message.project.selected
          renderers:
            textual:
              layout:
                containers:
                  aside:
                    id: aside
                    kind: Container
                    must_render: true
                    order: 3
                  main:
                    id: main
                    kind: Container
                    must_render: true
                    order: 2
                  nav:
                    id: nav
                    kind: Container
                    must_render: true
                    order: 1
                screen_class: ProjectBoardScreen
              style:
                rules:
                - declarations:
                    layout: horizontal
                  selector: screen
                - declarations:
                    width: '32'
                  selector: region.nav
                - declarations:
                    width: '28'
                  selector: region.aside
            web:
              layout:
                regions:
                  aside:
                    classes:
                    - dispatch-board-aside
                    element: aside
                    must_render: true
                    order: 3
                    role: complementary
                  main:
                    classes:
                    - dispatch-board-main
                    element: main
                    must_render: true
                    order: 2
                    role: main
                  nav:
                    classes:
                    - dispatch-board-nav
                    element: nav
                    must_render: true
                    order: 1
                    role: navigation
                root:
                  classes:
                  - dispatch-board
                  element: section
                  role: region
              style:
                rules:
                - declarations:
                    display: grid
                    gap: token.gap
                    grid-template-columns: token.nav_width 1fr token.aside_width
                  selector: root
                - declarations:
                    min-width: token.nav_width
                  selector: region.nav
                - declarations:
                    min-width: '0'
                  selector: region.main
                - declarations:
                    min-width: token.aside_width
                  selector: region.aside
                tokens:
