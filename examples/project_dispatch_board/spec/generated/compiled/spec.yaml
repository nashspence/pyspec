          show_transition_not_allowed:
            payload_schema:
              additionalProperties: false
              properties:
                message:
                  type: string
              required:
              - message
              type: object
      emits:
        local_signals: {}
    transitions:
    - from: none
      on:
        local_signal: selection_changed
      to: loading
    - from: loading
      on:
        data_refresh_signal: project_loaded
      to: ready
    - from: loading
      on:
        data_refresh_signal: project_load_failed
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on:
        local_signal: selection_cleared
      to: none
    - from: ready
      on:
        data_refresh_signal: project_changed
