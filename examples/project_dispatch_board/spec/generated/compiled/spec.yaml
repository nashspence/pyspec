assets:
  asset.project.detail.ready.priority_badge:
    args:
      priority: Text
    basis: Selected project detail shows a dynamic priority badge resolved from project fixture data.
    kind: icon
    placeholder:
      aspect_ratio: '1:1'
      label: Project priority badge
      shape: square
    resolver: asset.project.detail.ready.priority_badge
  asset.project.list.empty.illustration:
    alt_copy: copy.project.list.empty.heading
    basis: Generic placeholder illustration used by the empty queue panel.
    kind: illustration
    placeholder:
      aspect_ratio: '4:3'
      label: Empty dispatch queue illustration
      shape: square
audit_profiles:
  default:
    basis: Two viewport breakpoints are enough to demonstrate visual audit coverage in the canonical example.
    html:
      breakpoints:
        compact:
          height: 820
          width: 420
        wide:
          height: 820
          width: 1280
    textual:
      breakpoints:
        compact:
          columns: 80
          rows: 26
        wide:
          columns: 120
          rows: 36
capabilities:
  project.approve:
    archetype: transition
    basis: Reviewers can approve submitted dispatch projects.
    emits:
    - project.approved
    errors: []
    input:
      project_id: ID
    output: Project
    policy: policy.project.approve
    resource: Project
    transition:
      field: status
      from: submitted
      to: approved
  project.archive:
    archetype: transition
    basis: Approved dispatch projects can be archived.
    emits:
    - project.archived
    errors: []
    input:
      project_id: ID
    output: Project
    policy: policy.project.archive
    resource: Project
    transition:
      field: status
      from: approved
      to: archived
  project.create:
    archetype: create
    basis: Members can create a new dispatch project.
    emits:
    - project.created
    errors: []
    input:
      customer: Text
      priority: Text
      title: Text
      workspace_id: ID
    output: Project
    policy: policy.project.create
    resource: Project
  project.list:
    archetype: list
    basis: The board requires a project list query scoped by workspace.
    emits: []
    errors: []
    input:
      workspace_id: ID
    output: list[Project]
    policy: policy.project.list
    resource: Project
  project.read:
    archetype: read
    basis: The detail panel loads the selected project by id.
    emits: []
    errors: []
    input:
      project_id: ID
    output: Project
    policy: policy.project.read
    resource: Project
  project.send_approval_notice:
    archetype: command
    basis: Approval triggers a notification command for downstream coordination.
    emits: []
    errors: []
    input:
      approved_by: ID
      project_id: ID
    output: NoticeResult
    policy: policy.project.send_approval_notice
    resource: Project
  project.submit:
    archetype: transition
    basis: Draft dispatch projects can be submitted for review.
    emits:
    - project.submitted
    errors: []
    input:
      project_id: ID
    output: Project
    policy: policy.project.submit
    resource: Project
    transition:
      field: status
      from: draft
      to: submitted
content_cases:
  content.project.detail.heading.high_priority:
    args:
      customer: Atlas Foods
      title: Replace rooftop condenser fan
    basis: Exercise final detail heading copy with representative fixture-backed content.
    ref: copy.project.detail.ready.heading
  content.project.detail.priority_badge.high_priority:
    args:
      priority: High
    basis: Exercise final dynamic priority badge asset.
    ref: asset.project.detail.ready.priority_badge
