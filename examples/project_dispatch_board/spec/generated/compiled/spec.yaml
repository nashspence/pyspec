  state_machine.project.list:
    context_schema:
      additionalProperties: false
      properties:
        selected_project_id:
          type:
          - 'null'
          - string
        workspace_id:
          type: string
      required:
      - workspace_id
      type: object
    entity_type: entity_type.project
    initial_state: loading
    local_signals:
      accepts:
        data_refresh_signals:
          project_collection_empty:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
          project_list_failed:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
          projects_changed:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
          projects_loaded:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
        local_signals:
          project_select:
            payload_schema:
              additionalProperties: false
              properties:
                project_id:
                  type: string
              required:
              - project_id
              type: object
          show_lifecycle_transition_not_allowed:
            payload_schema:
              additionalProperties: false
              properties:
                message:
                  type: string
              required:
              - message
              type: object
      emits:
        local_signals:
          project_selected:
            payload_schema:
              additionalProperties: false
              properties:
                project_id:
                  type: string
              required:
              - project_id
              type: object
    query_bindings:
      list_projects:
        input_mapping:
          workspace_id:
            from: $state_context.workspace_id
        load:
          on_start: true
          refresh_on:
          - data_refresh_signal: projects_changed
        local_effects:
          access_denied:
            raise:
              data_refresh_signal: project_list_failed
          authentication_required:
            raise:
              data_refresh_signal: project_list_failed
          listed:
            conditional_local_effects:
            - context_updates:
                workspace_id:
                  from: $query_binding.input.workspace_id
              raise:
                data_refresh_signal: project_collection_empty
              result_binding:
                data_key: projects
                from:
                  from: $query_outcome.result
              result_condition: empty
            - context_updates:
                workspace_id:
                  from: $query_binding.input.workspace_id
              raise:
                data_refresh_signal: projects_loaded
              result_binding:
                data_key: projects
                from:
                  from: $query_outcome.result
              result_condition: non_empty
          unavailable:
            raise:
              data_refresh_signal: project_list_failed
        query: query.project.list
        result_scope: local
    rationale: The list state machine owns collection loading, empty, ready, error, and selection behavior.
