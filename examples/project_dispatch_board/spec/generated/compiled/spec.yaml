render_profiles:
  default:
    html_viewports:
      compact:
        height: 820
        width: 420
      wide:
        height: 820
        width: 1280
    rationale: Two viewport breakpoints are enough to demonstrate visual audit coverage in the canonical example.
    terminal_viewports:
      compact:
        columns: 80
        rows: 26
      wide:
        columns: 120
        rows: 36
state_machines:
  state_machine.project.activity:
    context:
      project_id:
        primitive: ID
    data_dependencies: []
    initial_view_state: empty
    model: Project
    rationale: The activity state machine summarizes latest status around the selected project.
    state_machine_messages:
      accepts:
        message.project.selection_changed:
          payload_schema:
            project_id:
              primitive: ID
        message.selection.cleared:
          payload_schema: {}
      emits: {}
    transitions:
    - from: empty
      on: message.project.selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: message.selection.cleared
      to: empty
    view_states:
      empty:
        assets: []
        data_dependencies: []
        fields: []
        operation_refs: []
        surface: state_machine.project.activity.empty
        text:
        - text.project.activity.empty.heading
        - text.project.activity.empty.body
      ready:
        assets: []
        data_dependencies:
        - operation: operation.project.read
          query: query.project.activity.read
        fields:
        - updated_at
        - status
        - assignee
        operation_refs: []
        surface: state_machine.project.activity.ready
        text:
        - text.project.activity.ready.heading
  state_machine.project.board:
    archetype: dashboard
    context:
      selected_project_id:
        primitive: ID
      workspace_id:
        primitive: ID
    data_dependencies:
    - operation: operation.project.list
      query: query.project.board.list
    initial_view_state: ready
    model: Project
    rationale: The dispatch board composes list, detail, and activity state machines through shared selected-project context.
    state_machine_messages:
      accepts: {}
      emits: {}
    transitions: []
    view_states:
      ready:
        assets: []
        audit:
          empty:
            fixtures:
            - fixture.workspace.member
            instances:
              activity:
                view_state: empty
              detail:
                view_state: none
              list:
                view_state: empty
            rationale: Audit render for empty board state vector.
          ready_selected:
            context:
              selected_project_id: project_submitted_1
            facts:
            - ref: fact.project.submitted
            - ref: fact.project.draft
            fixtures:
            - fixture.workspace.member
            instances:
              activity:
                view_state: ready
              detail:
                view_state: ready
              list:
                view_state: ready
            rationale: Audit render for selected-project board state vector using named project facts.
        child_state_machines:
        - context:
            selected_project_id: $state_machine.selected_project_id
            workspace_id: $state_machine.workspace_id
          id: list
          initial_view_state: loading
          region: nav
          state_machine: state_machine.project.list
        - context:
            project_id: $state_machine.selected_project_id
          id: detail
          initial_view_state: none
          region: main
          selected:
            view_state: loading
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.detail
        - context:
            project_id: $state_machine.selected_project_id
          id: activity
          initial_view_state: empty
          region: aside
          selected:
            view_state: ready
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.activity
        data_dependencies: []
        fields: []
        message_sync_rules:
        - effects:
          - set:
              context: selected_project_id
              from: $message.project_id
          - send:
              instance: detail
              message: message.project.selection_changed
              payload_bindings:
                project_id: $message.project_id
          - send:
              instance: activity
              message: message.project.selection_changed
              payload_bindings:
                project_id: $message.project_id
          id: select_project_updates_state_machines
          when:
            instance: list
            message: message.project.selected
        operation_refs: []
        renderers:
          textual:
            layout:
              containers:
                aside:
                  id: aside
                  kind: Container
                  must_render: true
                  order: 3
                main:
                  id: main
                  kind: Container
                  must_render: true
                  order: 2
                nav:
                  id: nav
                  kind: Container
                  must_render: true
                  order: 1
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: region.nav
              - declarations:
                  width: '28'
                selector: region.aside
          web:
            layout:
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  must_render: true
                  order: 3
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  must_render: true
                  order: 2
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  must_render: true
                  order: 1
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            style:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
        surface: state_machine.project.board.ready
        text: []
  state_machine.project.detail:
    context:
      project_id:
        primitive: ID
    data_dependencies: []
    initial_view_state: none
    model: Project
    rationale: The detail state machine is independent from the list and reacts to selected project context.
    state_machine_messages:
      accepts:
        data.error:
          payload_schema: {}
        data.ready:
          payload_schema: {}
        message.project.selection_changed:
          payload_schema:
            project_id:
              primitive: ID
        message.selection.cleared:
          payload_schema: {}
      emits: {}
    transitions:
    - from: none
      on: message.project.selection_changed
      to: loading
    - from: loading
      on: data.ready
      to: ready
    - from: loading
      on: data.error
