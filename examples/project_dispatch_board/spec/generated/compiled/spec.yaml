  - local_signal_raise.project.detail.loading.query_invocation.read_project.not_found.data_signal.project_load_failed
  - local_signal_raise.project.detail.loading.query_invocation.read_project.unauthenticated.data_signal.project_load_failed
  - local_signal_raise.project.detail.ready.operation_invocation.approve.approved.data_signal.project_changed
  - local_signal_raise.project.detail.ready.operation_invocation.approve.invalid_state.message.show_invalid_state
  - local_signal_raise.project.detail.ready.operation_invocation.archive.archived.data_signal.project_changed
  - local_signal_raise.project.detail.ready.operation_invocation.archive.forbidden.message.show_invalid_state
  - local_signal_raise.project.detail.ready.operation_invocation.archive.invalid_state.message.show_invalid_state
  - local_signal_raise.project.detail.ready.operation_invocation.archive.not_found.message.show_invalid_state
  - local_signal_raise.project.detail.ready.operation_invocation.archive.unauthenticated.message.show_invalid_state
  - local_signal_raise.project.detail.ready.query_invocation.read_project.forbidden.message.show_invalid_state
  - local_signal_raise.project.detail.ready.query_invocation.read_project.not_found.message.show_invalid_state
  - local_signal_raise.project.detail.ready.query_invocation.read_project.unauthenticated.message.show_invalid_state
  - local_signal_raise.project.list.empty.operation_invocation.create.created.data_signal.projects_changed
  - local_signal_raise.project.list.empty.operation_invocation.create.validation_failed.message.show_invalid_state
  - local_signal_raise.project.list.query_invocation.list_projects.forbidden.data_signal.project_list_failed
  - local_signal_raise.project.list.query_invocation.list_projects.listed.data_signal.projects_loaded
  - local_signal_raise.project.list.query_invocation.list_projects.unauthenticated.data_signal.project_list_failed
  - local_signal_raise.project.list.query_invocation.list_projects.unavailable.data_signal.project_list_failed
  - local_signal_raise.project.list.ready.operation_invocation.create.created.data_signal.projects_changed
  - local_signal_raise.project.list.ready.operation_invocation.submit.forbidden.message.show_invalid_state
  - local_signal_raise.project.list.ready.operation_invocation.submit.invalid_state.message.show_invalid_state
  - local_signal_raise.project.list.ready.operation_invocation.submit.not_found.message.show_invalid_state
  - local_signal_raise.project.list.ready.operation_invocation.submit.submitted.data_signal.projects_changed
  - local_signal_raise.project.list.ready.operation_invocation.submit.unauthenticated.message.show_invalid_state
  operation_invocation:
  - operation_invocation.project.detail.ready.approve
  - operation_invocation.project.detail.ready.archive
