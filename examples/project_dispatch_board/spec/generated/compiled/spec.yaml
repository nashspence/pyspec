          workspace_id:
            from: $fixture.workspace.id
        ref: external_interface.api.project.create
commands:
  command.project.approve:
    authorization:
      access_denied_as: access_denied
      authentication_required_as: authentication_required
      policy: access_policy.project.reviewer
    emits_domain_events:
    - domain_event: domain_event.project.approved
      outcome: approved
      payload_bindings:
        approved_by:
          from: $command_input.approved_by
        project_id:
          from: $command_input.project_id
    entity_changes:
      entity_lifecycle_transition:
        entity_type: entity_type.project
        field: status
        from: submitted
        to: approved
    idempotent: true
    input_schema:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
    outcomes:
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      approved:
        kind: success
        result:
          $ref: entity_type.project
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      lifecycle_transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Reviewers can approve submitted dispatch projects.
    retryable: true
  command.project.archive:
    authorization:
      access_denied_as: access_denied
      authentication_required_as: authentication_required
      policy: access_policy.project.reviewer
    emits_domain_events:
    - domain_event: domain_event.project.archived
      outcome: archived
      payload_source: $command_outcome.result
    entity_changes:
      entity_lifecycle_transition:
        entity_type: entity_type.project
        field: status
        from: approved
        to: archived
    input_schema:
      additionalProperties: false
      properties:
        project_id:
          type: string
      required:
      - project_id
      type: object
    outcomes:
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      archived:
        kind: success
        result:
          $ref: entity_type.project
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      lifecycle_transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Approved dispatch projects can be archived.
  command.project.create:
    authorization:
      access_denied_as: access_denied
      authentication_required_as: authentication_required
      policy: access_policy.project.member
    emits_domain_events:
    - domain_event: domain_event.project.created
      outcome: created
      payload_source: $command_outcome.result
    entity_changes:
      creates:
      - entity_type.project
    input_schema:
      additionalProperties: false
      properties:
        customer:
          type: string
        priority:
          type: string
        title:
          type: string
        workspace_id:
          type: string
      required:
      - customer
      - priority
      - title
      - workspace_id
      type: object
    outcomes:
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      created:
        kind: success
        result:
          $ref: entity_type.project
      validation_failed:
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Members can create a new dispatch project.
  command.project.send_approval_notice:
    authorization:
      access_denied_as: access_denied
      authentication_required_as: authentication_required
      policy: access_policy.project.reviewer
    emits_domain_events: []
    entity_changes:
      updates:
      - entity_type.project
    idempotent: true
    input_schema:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
    outcomes:
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      delivery_failed:
        kind: failure
        result:
          $ref: entity_type.problem
      sent:
        kind: success
        result:
          $ref: schema.project.notice_result
    rationale: Approval triggers a notification command for downstream coordination.
    retryable: true
  command.project.submit:
    authorization:
      access_denied_as: access_denied
      authentication_required_as: authentication_required
      policy: access_policy.project.member
    emits_domain_events:
    - domain_event: domain_event.project.submitted
      outcome: submitted
      payload_source: $command_outcome.result
    entity_changes:
      entity_lifecycle_transition:
        entity_type: entity_type.project
        field: status
        from: draft
        to: submitted
    input_schema:
      additionalProperties: false
      properties:
        project_id:
          type: string
      required:
      - project_id
      type: object
    outcomes:
      access_denied:
        kind: failure
        result:
          $ref: entity_type.problem
      authentication_required:
        kind: failure
        result:
          $ref: entity_type.problem
      lifecycle_transition_not_allowed:
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        kind: failure
        result:
          $ref: entity_type.problem
      submitted:
        kind: success
        result:
          $ref: entity_type.project
    rationale: Draft dispatch projects can be submitted for review.
content_examples:
  content_example.project.detail.heading.high_priority:
    args:
      customer:
        value: Atlas Foods
      title:
        value: Replace rooftop condenser fan
    rationale: Exercise final detail heading text with representative fixture-backed content.
    ref: text_resource.project.detail.ready.heading
  content_example.project.detail.priority_badge.high_priority:
    args:
      priority:
        value: High
    rationale: Exercise final dynamic priority badge media_asset.
    ref: media_asset.project.detail.ready.priority_badge
domain_events:
  domain_event.project.approved:
    emitted_by:
    - command.project.approve
    payload_schema:
      $ref: schema.project.approved
    rationale: Approval domain events carry the reviewer and project identity needed by notification workflows.
  domain_event.project.archived:
    emitted_by:
    - command.project.archive
    payload_schema:
      $ref: entity_type.project
    rationale: Approved dispatch projects can be archived.
  domain_event.project.created:
    emitted_by:
    - command.project.create
    payload_schema:
      $ref: entity_type.project
    rationale: Members can create a new dispatch project.
  domain_event.project.submitted:
    emitted_by:
    - command.project.submit
    payload_schema:
      $ref: entity_type.project
    rationale: Draft dispatch projects can be submitted for review.
entity_types:
  entity_type.problem:
    entity_lifecycle: null
    name: Problem
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    schema:
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
  entity_type.project:
    entity_lifecycle:
      field: status
      initial_state: draft
      lifecycle_states:
      - draft
      - submitted
      - approved
      - archived
      lifecycle_transitions:
      - command: command.project.submit
        from: draft
        to: submitted
      - command: command.project.approve
        from: submitted
        to: approved
      - command: command.project.archive
        from: approved
        to: archived
    name: Project
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
    schema:
      additionalProperties: false
      properties:
        assignee:
          type: string
        created_at:
          format: date-time
          type: string
        customer:
          type: string
        id:
          type: string
        priority:
          type: string
        status:
          enum:
          - draft
          - submitted
          - approved
          - archived
          type: string
        summary:
          type: string
        title:
          type: string
        updated_at:
          format: date-time
          type: string
        workspace_id:
          type: string
      required:
      - assignee
      - created_at
      - customer
      - id
      - priority
      - status
      - summary
      - title
      - updated_at
      - workspace_id
      type: object
external_interfaces:
  external_interface.api.project.approve:
    access_policy: access_policy.project.reviewer
    adapter:
      http_api:
        method: POST
        path: /projects/{project_id}/approve
    http_operation: http_operation.project.approve
    idempotent: true
    input_mapping:
      bindings:
        approved_by:
          from: $adapter_input.body.approved_by
        project_id:
          from: $adapter_input.path_params.project_id
      body:
        approved_by:
          type: string
      path_params:
        project_id:
          type: string
    invokes:
      command:
        ref: command.project.approve
    output_mapping:
      responses:
        access_denied:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 403
        approved:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.project
          status: 200
        authentication_required:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 401
        lifecycle_transition_not_allowed:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 409
        not_found:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 404
        unavailable:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 503
    rationale: HTTP operation for approving submitted dispatch projects.
    retryable: true
  external_interface.api.project.create:
    access_policy: access_policy.project.member
    adapter:
      http_api:
        method: POST
        path: /workspaces/{workspace_id}/projects
    http_operation: http_operation.project.create
    input_mapping:
      bindings:
        customer:
          from: $adapter_input.body.customer
        priority:
          from: $adapter_input.body.priority
        title:
          from: $adapter_input.body.title
        workspace_id:
          from: $adapter_input.path_params.workspace_id
      body:
        customer:
          type: string
        priority:
          type: string
        title:
          type: string
      path_params:
        workspace_id:
          type: string
    invokes:
      command:
        ref: command.project.create
    output_mapping:
      responses:
        access_denied:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 403
        authentication_required:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 401
        created:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.project
          status: 201
        validation_failed:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 422
    rationale: HTTP operation for creating a dispatch project.
  external_interface.api.project.list:
    adapter:
      http_api:
        method: GET
        path: /workspaces/{workspace_id}/projects
    http_operation: http_operation.project.list
    input_mapping:
      bindings:
        workspace_id:
          from: $adapter_input.path_params.workspace_id
      path_params:
        workspace_id:
          type: string
    invokes:
      query:
        ref: query.project.list
    output_mapping:
      responses:
        access_denied:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 403
        authentication_required:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 401
        listed:
          body:
            from: $invocation_outcome.result
            type:
              items:
                $ref: entity_type.project
              type: array
          status: 200
        unavailable:
          body:
            from: $invocation_outcome.result
            type:
              $ref: entity_type.problem
          status: 503
    rationale: HTTP operation for listing dispatch projects.
  external_interface.cli.project.approve:
    adapter:
      cli:
        cli_command: project approve
    cli_command_ref: cli_command.project.approve
    input_mapping:
      args:
        approved_by:
          type: string
        project_id:
          type: string
      delegated_input:
        body:
          approved_by:
            from: $adapter_input.args.approved_by
        path_params:
          project_id:
            from: $adapter_input.args.project_id
    invokes:
      external_interface:
        ref: external_interface.api.project.approve
    output_mapping:
      response_handlers:
        access_denied:
          exit_code: 5
          stderr:
            bindings:
              message:
                from: $adapter_response.body.message
            text: text_resource.project.approve.access_denied
        approved:
          exit_code: 0
          stdout:
            bindings:
              project_id:
                from: $adapter_response.body.id
            text: text_resource.project.approve.success
        authentication_required:
          exit_code: 4
          stderr:
            bindings:
              message:
                from: $adapter_response.body.message
            text: text_resource.project.approve.authentication_required
        lifecycle_transition_not_allowed:
          exit_code: 2
          stderr:
            bindings:
              message:
                from: $adapter_response.body.message
            text: text_resource.project.approve.lifecycle_transition_not_allowed
        not_found:
          exit_code: 3
          stderr:
            bindings:
              message:
                from: $adapter_response.body.message
            text: text_resource.project.approve.not_found
        unavailable:
          exit_code: 75
          retry_policy:
            attempts: 3
            backoff: exponential
          stderr:
            text: text_resource.project.approve.unavailable
    rationale: CLI external_interface for approval automation.
  external_interface.cli.project.board:
    adapter:
      cli:
