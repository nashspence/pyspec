    tone: neutral
  copy.project.activity.ready.heading:
    basis: Ready activity heading.
    max_chars: 80
    placeholder: Latest activity
    tone: neutral
  copy.project.detail.error.body:
    basis: Error body for the detail panel.
    max_chars: 120
    placeholder: Refresh the selection or return to the queue.
    tone: error
  copy.project.detail.error.heading:
    basis: Error heading for the detail panel.
    max_chars: 80
    placeholder: Project detail is unavailable
    tone: error
  copy.project.detail.loading.message:
    basis: Loading message for the detail panel.
    max_chars: 80
    placeholder: Loading project detail…
    tone: neutral
  copy.project.detail.none.body:
    basis: No-selection body for the detail panel.
    max_chars: 160
    placeholder: Choose a project from the queue to review customer, assignment, and approval details.
    tone: instructional
  copy.project.detail.none.heading:
    basis: No-selection heading for the detail panel.
    max_chars: 80
    placeholder: Select a project
    tone: instructional
  copy.project.detail.ready.heading:
    args:
      customer: Text
      title: Text
    basis: Ready heading for the detail panel.
    max_chars: 80
    placeholder: Project detail
    resolver: copy.project.detail.ready.heading
    tone: neutral
  copy.project.list.empty.body:
    basis: Empty body for the project list panel.
    max_chars: 160
    placeholder: Create the first project to start coordinating work for this workspace.
    tone: instructional
  copy.project.list.empty.heading:
    basis: Empty heading for the project list panel.
    max_chars: 80
    placeholder: No dispatch projects yet
    tone: neutral
  copy.project.list.error.body:
    basis: Error body for the project list panel.
    max_chars: 120
    placeholder: Check the workspace connection and try again.
    tone: error
  copy.project.list.error.heading:
    basis: Error heading for the project list panel.
    max_chars: 80
    placeholder: Projects could not be loaded
    tone: error
  copy.project.list.loading.message:
    basis: Loading message for the project list panel.
    max_chars: 80
    placeholder: Loading dispatch projects…
    tone: neutral
  copy.project.list.ready.heading:
    basis: Ready heading for the project list panel.
    max_chars: 80
    placeholder: Dispatch queue
    tone: neutral
entries:
  api.project.create:
    basis: HTTP endpoint for creating a dispatch project.
    endpoint: endpoint.project.create
    method: POST
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/projects
    surface: api
    target:
      capability: project.create
  api.project.list:
    basis: HTTP endpoint for listing dispatch projects.
    endpoint: endpoint.project.list
    method: GET
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/projects
    surface: api
    target:
      capability: project.list
  cli.project.approve:
    args:
      project_id: ID
    basis: CLI entry for approval automation.
    command: project approve
    command_ref: command.project.approve
    surface: cli
    target:
      capability: project.approve
  cli.project.board:
    args:
      workspace_id: ID
    basis: CLI launcher for the Textual dispatch board.
    command: project board
    command_ref: command.project.board
    surface: cli
    target:
      view:
        name: project.board
        surface: textual
  web.project.board:
    basis: Web entry for the dispatch board.
    params:
      workspace_id: ID
    path: /workspaces/{workspace_id}/dispatch
    route: route.project.board
    surface: web
    target:
      view:
        name: project.board
        surface: html
  worker.project.approval_notice:
    basis: Worker entry exposing the approval notice workflow.
    surface: worker
    target:
      workflow: project.approval_notice
    workflow_ref: workflow.project.approval_notice
events:
  project.approved:
    basis: Reviewers can approve submitted dispatch projects.
    emitted_by:
    - project.approve
    payload: Project
  project.archived:
    basis: Approved dispatch projects can be archived.
    emitted_by:
    - project.archive
    payload: Project
  project.created:
    basis: Members can create a new dispatch project.
    emitted_by:
    - project.create
    payload: Project
  project.submitted:
    basis: Draft dispatch projects can be submitted for review.
    emitted_by:
    - project.submit
    payload: Project
facts:
  fact.project.draft:
    basis: Draft dispatch project used as a secondary row in ready-board audit renders.
    present:
      resource: Project
      values:
        assignee: Unassigned
        created_at: '2026-05-10T11:30:00Z'
        customer: Harbor Logistics
        id: project_beta
        priority: Normal
        status: draft
        summary: Customer reports intermittent alerts from dock door 3.
        title: Inspect loading dock sensor
        updated_at: '2026-05-11T07:15:00Z'
        workspace_id: $fixture.workspace.id
  fact.project.submitted:
    basis: Submitted dispatch project shared by approval, ready-board, and visual audit scenarios.
    present:
      resource: Project
      values:
        assignee: Maya Chen
        created_at: '2026-05-10T09:00:00Z'
        customer: Atlas Foods
        id: project_submitted_1
        priority: High
        status: submitted
        summary: Technician needs approval before ordering the replacement fan motor.
        title: Replace rooftop condenser fan
        updated_at: '2026-05-11T08:45:00Z'
        workspace_id: $fixture.workspace.id
fixtures:
  fixture.workspace.member:
    basis: Workspace member fixture for web/API/TUI scenarios.
    values:
      actor:
        id: user_member_1
        roles:
        - member
      workspace:
        id: workspace_1
        name: North Region Dispatch
  fixture.workspace.reviewer:
    basis: Reviewer fixture for approval scenarios.
    values:
      actor:
        id: user_reviewer_1
        roles:
        - reviewer
      workspace:
        id: workspace_1
        name: North Region Dispatch
panels:
  panel.project.activity:
    basis: The activity panel summarizes latest status around the selected project.
    context:
      project_id: ID
    data: []
    initial: empty
    messages:
      accepts:
        project.selection_changed:
          payload:
            project_id: ID
        selection.cleared:
          payload: {}
      emits: {}
    resource: Project
    states:
      empty:
        actions: []
        assets: []
        copy:
        - copy.project.activity.empty.heading
        - copy.project.activity.empty.body
        data: []
        fields: []
        panel: panel.project.activity.empty
      ready:
        actions: []
        assets: []
        copy:
        - copy.project.activity.ready.heading
        data:
        - capability: project.read
          query: query.project.activity.read
        fields:
        - updated_at
        - status
        - assignee
        panel: panel.project.activity.ready
    transitions:
    - from: empty
      on: project.selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: selection.cleared
      to: empty
  panel.project.detail:
    basis: The detail panel is independent from the list and reacts to selected project context.
    context:
      project_id: ID
    data: []
    initial: none
    messages:
      accepts:
        data.error:
          payload: {}
        data.ready:
          payload: {}
        project.selection_changed:
          payload:
            project_id: ID
        selection.cleared:
          payload: {}
      emits: {}
    resource: Project
    states:
      error:
        actions: []
        assets: []
        copy:
        - copy.project.detail.error.heading
        - copy.project.detail.error.body
        data: []
        fields: []
        panel: panel.project.detail.error
      loading:
        actions: []
        assets: []
        copy:
        - copy.project.detail.loading.message
        data:
        - capability: project.read
          query: query.project.detail.read
        fields: []
        panel: panel.project.detail.loading
      none:
        actions: []
        assets: []
        copy:
        - copy.project.detail.none.heading
        - copy.project.detail.none.body
        data: []
        fields: []
        panel: panel.project.detail.none
      ready:
        actions:
        - project.approve
        - project.archive
        assets:
        - asset.project.detail.ready.priority_badge
        copy:
        - copy.project.detail.ready.heading
        data: []
        fields:
        - title
        - customer
        - status
        - assignee
        - summary
        panel: panel.project.detail.ready
    transitions:
    - from: none
      on: project.selection_changed
      to: loading
    - from: loading
      on: data.ready
      to: ready
    - from: loading
      on: data.error
      to: error
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on: selection.cleared
      to: none
  panel.project.list:
    basis: The list panel owns collection loading, empty, ready, error, and selection behavior.
    context:
      selected_project_id: ID
      workspace_id: ID
    data:
    - capability: project.list
      query: query.project.list.list
    initial: loading
    messages:
      accepts:
        data.empty:
          payload: {}
        data.error:
          payload: {}
        data.ready:
          payload: {}
        project.select:
          payload:
            project_id: ID
      emits:
        project.selected:
          payload:
            project_id: ID
    resource: Project
    states:
      empty:
        actions:
        - project.create
        assets:
        - asset.project.list.empty.illustration
        copy:
        - copy.project.list.empty.heading
        - copy.project.list.empty.body
        data: []
        fields: []
        panel: panel.project.list.empty
      error:
        actions: []
        assets: []
        copy:
        - copy.project.list.error.heading
        - copy.project.list.error.body
        data: []
        fields: []
        panel: panel.project.list.error
      loading:
        actions: []
        assets: []
        copy:
        - copy.project.list.loading.message
        data: []
        fields: []
        panel: panel.project.list.loading
      ready:
        actions:
        - project.create
        - project.submit
        assets: []
        copy:
        - copy.project.list.ready.heading
        data: []
        fields:
        - title
        - customer
        - priority
        - status
        panel: panel.project.list.ready
    transitions:
    - from: loading
      on: data.empty
      to: empty
    - from: loading
      on: data.ready
      to: ready
    - from: loading
      on: data.error
      to: error
    - from: empty
      on: data.ready
      to: ready
    - effects:
      - emit:
          data:
            project_id: $message.project_id
          message: project.selected
      from: ready
      on: project.select
      to: ready
project: project_dispatch_board
