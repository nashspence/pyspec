  test_case.project.board.empty:
    archetype: state_machine_composition
    feature_tag: project.board
    given:
      domain_facts:
      - absent:
          entity_type: entity_type.project
          where:
            workspace_id:
              from: $fixture.workspace.id
      seed_fixtures:
