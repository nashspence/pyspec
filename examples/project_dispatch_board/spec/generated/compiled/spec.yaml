            textual_container: nav
          - context_bindings:
              project_id:
                from: $state_machine.selected_project_id
            html_region: main
            id: detail
            initial_view_state: none
            selected:
              view_state: loading
              when:
                context_present: selected_project_id
            state_machine: state_machine.project.detail
            textual_container: main
          - context_bindings:
              project_id:
                from: $state_machine.selected_project_id
            html_region: aside
            id: activity
            initial_view_state: empty
            selected:
              view_state: ready
              when:
                context_present: selected_project_id
            state_machine: state_machine.project.activity
            textual_container: aside
          renderers:
            html:
              layout:
                regions:
                  aside:
                    classes:
                    - dispatch-board-aside
                    element: aside
                    must_render: true
                    order: 3
                    role: complementary
                  main:
                    classes:
                    - dispatch-board-main
                    element: main
                    must_render: true
                    order: 2
                    role: main
                  nav:
                    classes:
                    - dispatch-board-nav
                    element: nav
                    must_render: true
                    order: 1
                    role: navigation
                root:
                  classes:
                  - dispatch-board
                  element: section
                  role: region
              style:
                rules:
                - declarations:
                    display: grid
                    gap: token.gap
                    grid-template-columns: token.nav_width 1fr token.aside_width
                  selector: root
                - declarations:
                    min-width: token.nav_width
                  selector: region.nav
                - declarations:
                    min-width: '0'
                  selector: region.main
                - declarations:
                    min-width: token.aside_width
                  selector: region.aside
                tokens:
                  aside_width: 16rem
                  gap: 1rem
                  nav_width: 20rem
            textual:
              layout:
                containers:
                  aside:
                    container_class: Container
                    id: aside
                    must_render: true
                    order: 3
                  main:
                    container_class: Container
                    id: main
                    must_render: true
                    order: 2
                  nav:
                    container_class: Container
                    id: nav
                    must_render: true
                    order: 1
                screen_class: ProjectBoardScreen
              style:
                rules:
                - declarations:
                    layout: horizontal
                  selector: screen
                - declarations:
                    width: '32'
                  selector: container.nav
                - declarations:
                    width: '28'
                  selector: container.aside
          signal_sync_rules:
          - effects:
            - set:
                context: selected_project_id
                from: $local_signal.project_id
            - send:
                instance: detail
                local_signal: selection_changed
                payload_bindings:
                  project_id:
                    from: $local_signal.project_id
            - send:
                instance: activity
                local_signal: selection_changed
                payload_bindings:
                  project_id:
                    from: $local_signal.project_id
            id: select_project_updates_state_machines
            when:
              instance: list
              local_signal: project_selected
        instances:
          activity:
            source: state_machine.project.activity
            surface: state_machine.project.activity.empty
            view_state: empty
          detail:
            source: state_machine.project.detail
            surface: state_machine.project.detail.none
            view_state: none
          list:
            source: state_machine.project.list
            surface: state_machine.project.list.empty
            view_state: empty
        ref: state_machine.project.board
        signal_sync_rules:
          observed_rules:
          - select_project_updates_state_machines
        surface: state_machine.project.board.ready
        view_state: ready
    title: Empty dispatch board
    when:
      open_entry_point:
        input:
          workspace_id:
            from: $fixture.workspace.id
        ref: entry_point.html.project.board
