          stdout:
            text: text_resource.project.board.opened
    rationale: CLI launcher for the Textual dispatch board.
  external_interface.html.project.board:
    adapter:
      html_route:
        path: /workspaces/{workspace_id}/dispatch
    html_route: html_route.project.board
    input_mapping:
      bindings:
        workspace_id:
          from: $adapter_input.path_params.workspace_id
      path_params:
        workspace_id:
          type: string
    invokes:
      state_machine:
        ref: state_machine.project.board
        renderer: html
    output_mapping:
      responses:
        opened:
          status: 200
    rationale: HTML external_interface for the dispatch board.
  external_interface.worker.project.approval_notice:
    adapter:
      worker: {}
    input_mapping:
      bindings:
        approved_by:
          from: $adapter_input.payload.approved_by
        project_id:
          from: $adapter_input.payload.project_id
      payload:
        $ref: schema.project.approved
    invokes:
      workflow:
        ref: workflow.project.approval_notice
    output_mapping:
