assets:
  asset.project.detail.ready.priority_badge:
    args:
      priority:
        primitive: Text
    asset_role: badge
    media_kind: icon
    placeholder:
      aspect_ratio: '1:1'
      label: Project priority badge
      placeholder_symbol: square
    rationale: Selected project detail shows a dynamic priority badge resolved from project fixture data.
    source_ref: asset.project.detail.ready.priority_badge
  asset.project.list.empty.illustration:
    alt_text: text.project.list.empty.heading
    asset_role: empty_state
    media_kind: illustration
    placeholder:
      aspect_ratio: '4:3'
      label: Empty dispatch queue illustration
      placeholder_symbol: square
    rationale: Generic placeholder illustration used by the empty queue state machine state.
authorization_policies:
  authorization_policy.project.member:
    conditions:
    - subject_has_role: member
    effect: allow
    rationale: Workspace members may create, read, list, and submit dispatch projects.
    subjects:
    - kind: actor
    targets:
    - operation: operation.project.create
    - operation: operation.project.list
    - operation: operation.project.read
    - operation: operation.project.submit
    - model: Project
  authorization_policy.project.reviewer:
    conditions:
    - subject_has_role: reviewer
    effect: allow
    rationale: Reviewers may approve, archive, and send approval notices for dispatch projects.
    subjects:
    - kind: actor
    targets:
    - operation: operation.project.approve
    - operation: operation.project.archive
    - operation: operation.project.send_approval_notice
    - model: Project
content_cases:
  content_case.project.detail.heading.high_priority:
    args:
      customer:
        value: Atlas Foods
      title:
        value: Replace rooftop condenser fan
    rationale: Exercise final detail heading text with representative fixture-backed content.
    ref: text.project.detail.ready.heading
  content_case.project.detail.priority_badge.high_priority:
    args:
      priority:
        value: High
    rationale: Exercise final dynamic priority badge asset.
    ref: asset.project.detail.ready.priority_badge
data_contracts:
  data_contract.project.approved:
    fields:
      approved_by:
        nullable: false
        required: true
        type:
          primitive: ID
      project_id:
        nullable: false
        required: true
        type:
          primitive: ID
    rationale: Approval events carry only the integration payload required by downstream workflows.
  data_contract.project.notice_result:
    fields:
      notice_id:
        nullable: false
        required: true
        type:
          primitive: ID
      queued_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
    rationale: Approval notice commands return a transient delivery receipt rather than a durable product model.
entry_points:
  entry_point.api.project.approve:
    adapter:
      http_api:
        input:
          body:
            approved_by:
              primitive: ID
          path_params:
            project_id:
              primitive: ID
        method: POST
        path: /projects/{project_id}/approve
        responses:
          approved:
            body:
              from: $outcome.result
              type:
                model: Project
            status: 200
          forbidden:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 403
          invalid_state:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 409
          not_found:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 404
          unauthenticated:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 401
          unavailable:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 503
    authorization_policy: authorization_policy.project.reviewer
    endpoint: endpoint.project.approve
    rationale: HTTP endpoint for approving submitted dispatch projects.
    retry_safe: true
    target:
      operation:
        input_bindings:
          approved_by:
            from: $input.body.approved_by
          project_id:
            from: $input.path_params.project_id
        ref: operation.project.approve
  entry_point.api.project.create:
    adapter:
      http_api:
        input:
          body:
            customer:
              primitive: Text
            priority:
              primitive: Text
            title:
              primitive: Text
          path_params:
            workspace_id:
              primitive: ID
        method: POST
        path: /workspaces/{workspace_id}/projects
        responses:
          created:
            body:
              from: $outcome.result
              type:
                model: Project
            status: 201
          forbidden:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 403
          unauthenticated:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 401
          validation_failed:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 422
    authorization_policy: authorization_policy.project.member
    endpoint: endpoint.project.create
    rationale: HTTP endpoint for creating a dispatch project.
    target:
      operation:
        input_bindings:
          customer:
            from: $input.body.customer
          priority:
            from: $input.body.priority
          title:
            from: $input.body.title
          workspace_id:
            from: $input.path_params.workspace_id
        ref: operation.project.create
  entry_point.api.project.list:
    adapter:
      http_api:
        input:
          path_params:
            workspace_id:
              primitive: ID
        method: GET
        path: /workspaces/{workspace_id}/projects
        responses:
          forbidden:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 403
          listed:
            body:
              from: $outcome.result
              type:
                array:
                  model: Project
            status: 200
          unauthenticated:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 401
          unavailable:
            body:
              from: $outcome.result
              type:
                model: Problem
            status: 503
    authorization_policy: authorization_policy.project.member
    endpoint: endpoint.project.list
    rationale: HTTP endpoint for listing dispatch projects.
    target:
      operation:
        input_bindings:
          workspace_id:
            from: $input.path_params.workspace_id
        ref: operation.project.list
  entry_point.cli.project.approve:
    adapter:
      cli:
        cli_command: project approve
        input:
          args:
            approved_by:
              primitive: ID
            project_id:
              primitive: ID
        response_handlers:
          approved:
            exit_code: 0
            stdout:
              bindings:
                project_id:
                  from: $response.body.id
              text: text.project.approve.success
          forbidden:
            exit_code: 5
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.forbidden
          invalid_state:
            exit_code: 2
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.invalid_state
          not_found:
            exit_code: 3
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.not_found
          unauthenticated:
            exit_code: 4
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.unauthenticated
          unavailable:
            exit_code: 75
            retry_policy:
              attempts: 3
              backoff: exponential
            stderr:
              text: text.project.approve.unavailable
    cli_command_ref: cli_command.project.approve
    rationale: CLI entry for approval automation.
    target:
      entry_point:
        input_bindings:
          body:
            approved_by:
              from: $input.args.approved_by
          path_params:
            project_id:
              from: $input.args.project_id
        ref: entry_point.api.project.approve
  entry_point.cli.project.board:
    adapter:
      cli:
        cli_command: project board
        input:
          args:
            workspace_id:
              primitive: ID
    cli_command_ref: cli_command.project.board
    rationale: CLI launcher for the Textual dispatch board.
    target:
      state_machine:
        input_bindings:
          workspace_id:
            from: $input.args.workspace_id
        ref: state_machine.project.board
        renderer: textual
  entry_point.html.project.board:
    adapter:
      html_route:
        input:
          path_params:
            workspace_id:
              primitive: ID
        path: /workspaces/{workspace_id}/dispatch
    rationale: HTML entry for the dispatch board.
    route: route.project.board
    target:
      state_machine:
        input_bindings:
          workspace_id:
            from: $input.path_params.workspace_id
        ref: state_machine.project.board
        renderer: html
  entry_point.worker.project.approval_notice:
    adapter:
      worker:
        ingress_responses:
          accepted:
            disposition: acknowledge
          malformed:
            disposition: dead_letter
            problem:
              model: Problem
        input:
          payload:
            data_contract: data_contract.project.approved
    rationale: Worker entry exposing the approval notice workflow.
    target:
      workflow:
        ref: workflow.project.approval_notice
        trigger_bindings:
          approved_by:
            from: $input.payload.approved_by
          project_id:
            from: $input.payload.project_id
    workflow_ref: workflow.project.approval_notice
events:
  event.project.approved:
    emitted_by:
    - operation.project.approve
    payload_schema:
      data_contract: data_contract.project.approved
    rationale: Approval events carry the reviewer and project identity needed by notification workflows.
  event.project.archived:
    emitted_by:
    - operation.project.archive
    payload_schema:
      model: Project
    rationale: Approved dispatch projects can be archived.
  event.project.created:
    emitted_by:
    - operation.project.create
    payload_schema:
      model: Project
    rationale: Members can create a new dispatch project.
  event.project.submitted:
    emitted_by:
    - operation.project.submit
    payload_schema:
      model: Project
    rationale: Draft dispatch projects can be submitted for review.
