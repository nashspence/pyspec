render_profiles:
  render_profile.default:
    html_viewports:
      compact:
        height: 820
        width: 420
      wide:
        height: 820
        width: 1280
    rationale: Two viewport breakpoints are enough to demonstrate visual audit coverage in the canonical example.
    textual_viewports:
      compact:
        columns: 80
        rows: 26
      wide:
        columns: 120
        rows: 36
schemas:
  schema.project.approved:
    rationale: Approval domain events carry only the integration payload required by downstream workflows.
    schema:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
  schema.project.notice_result:
    rationale: Approval notice commands return a transient delivery receipt rather than a durable product entity_type.
    schema:
      additionalProperties: false
      properties:
        notice_id:
          type: string
        queued_at:
          format: date-time
          type: string
      required:
      - notice_id
      - queued_at
      type: object
state_machines:
  state_machine.project.activity:
    context:
      additionalProperties: false
      properties:
        project_id:
          type:
          - 'null'
          - string
      required: []
      type: object
    data_loaders: {}
    entity_type: entity_type.project
    initial_view_state: empty
    rationale: The activity state machine summarizes latest status around the selected project.
    signals:
      accepts:
        data_refresh_signals: {}
        local_signals:
          selection_changed:
            payload_schema:
              additionalProperties: false
              properties:
                project_id:
                  type: string
              required:
              - project_id
              type: object
          selection_cleared:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
      emits:
        local_signals: {}
    transitions:
    - from: empty
      on:
        local_signal: selection_changed
      to: ready
    - effects:
      - set:
          context: project_id
          value: null
      from: ready
      on:
        local_signal: selection_cleared
      to: empty
    view_states:
      empty:
        action_bindings: {}
        assets: []
        data_loaders: {}
        fields: []
        surface: state_machine.project.activity.empty
        text:
        - text.project.activity.empty.heading
        - text.project.activity.empty.body
      ready:
        action_bindings: {}
        assets: []
        data_loaders:
          read_activity:
            application_action: application_action.project.read
            input_bindings:
              project_id:
                from: $context.project_id
            load:
              on_enter: true
            outcome_effects:
              forbidden:
                no_local_effect:
                  rationale: The activity panel remains in its current state when authorization blocks the refresh.
                  reason: intentionally_unobservable
              found:
                no_local_effect:
                  reason: result_bound_without_signal
                result_binding:
                  data_key: activity
                  from:
                    from: $outcome.result
              not_found:
                no_local_effect:
                  rationale: The parent detail panel owns not-found display for the selected project.
                  reason: intentionally_unobservable
              unauthenticated:
                no_local_effect:
                  rationale: The entry response surface owns unauthenticated display.
                  reason: intentionally_unobservable
        fields:
        - updated_at
        - status
        - assignee
        surface: state_machine.project.activity.ready
        text:
        - text.project.activity.ready.heading
  state_machine.project.board:
    archetype: dashboard
    context:
      additionalProperties: false
      properties:
        selected_project_id:
          type:
          - 'null'
          - string
        workspace_id:
          type: string
      required:
      - workspace_id
      type: object
    data_loaders:
      list_board:
        application_action: application_action.project.list
        input_bindings:
          workspace_id:
            from: $context.workspace_id
        load:
          on_start: true
        outcome_effects:
          forbidden:
            no_local_effect:
              rationale: The board shell leaves child surfaces unchanged when list access is forbidden.
              reason: handled_by_response_surface
          listed:
            no_local_effect:
              reason: result_bound_without_signal
            result_binding:
              data_key: projects
              from:
                from: $outcome.result
          unauthenticated:
            no_local_effect:
              rationale: The entry response surface owns unauthenticated display.
              reason: handled_by_response_surface
          unavailable:
            no_local_effect:
              rationale: The board shell leaves child surfaces unchanged while the list service is unavailable.
              reason: handled_by_response_surface
        rationale: Board-level project list is shared shell data for composed child state machines; the child list machine
          owns visible loading and empty/non-empty transitions.
        result_scope: shared
    entity_type: entity_type.project
    initial_view_state: ready
    rationale: The dispatch board composes list, detail, and activity state machines through shared selected-project context.
    signals:
      accepts:
        data_refresh_signals: {}
        local_signals: {}
      emits:
        local_signals: {}
    transitions: []
    view_states:
      ready:
        action_bindings: {}
        assets: []
        child_state_machines:
        - context_bindings:
            selected_project_id:
              from: $state_machine.selected_project_id
            workspace_id:
              from: $state_machine.workspace_id
          html_region: nav
          id: list
          initial_view_state: loading
          state_machine: state_machine.project.list
          textual_container: nav
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          html_region: main
          id: detail
          initial_view_state: none
          selected:
            view_state: loading
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.detail
          textual_container: main
        - context_bindings:
            project_id:
              from: $state_machine.selected_project_id
          html_region: aside
          id: activity
          initial_view_state: empty
          selected:
            view_state: ready
            when:
              context_present: selected_project_id
          state_machine: state_machine.project.activity
          textual_container: aside
        data_loaders: {}
        fields: []
        render_audit_cases:
          empty:
            instances:
              activity:
                view_state: empty
              detail:
                view_state: none
              list:
                view_state: empty
            rationale: Audit render for empty board state vector.
            seed_fixtures:
            - fixture.workspace.member
          ready_selected:
            context:
              selected_project_id:
                value: project_submitted_1
            fact_refs:
            - ref: fact.project.submitted
            - ref: fact.project.draft
            instances:
              activity:
                view_state: ready
              detail:
                view_state: ready
              list:
                view_state: ready
            rationale: Audit render for selected-project board state vector using named project facts.
            seed_fixtures:
            - fixture.workspace.member
        renderers:
          html:
            layout:
              regions:
                aside:
                  classes:
                  - dispatch-board-aside
                  element: aside
                  must_render: true
                  order: 3
                  role: complementary
                main:
                  classes:
                  - dispatch-board-main
                  element: main
                  must_render: true
                  order: 2
                  role: main
                nav:
                  classes:
                  - dispatch-board-nav
                  element: nav
                  must_render: true
                  order: 1
                  role: navigation
              root:
                classes:
                - dispatch-board
                element: section
                role: region
            style:
              rules:
              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
          textual:
            layout:
              containers:
                aside:
                  container_class: Container
                  id: aside
                  must_render: true
                  order: 3
                main:
                  container_class: Container
                  id: main
                  must_render: true
                  order: 2
                nav:
                  container_class: Container
                  id: nav
                  must_render: true
                  order: 1
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
                selector: container.nav
              - declarations:
                  width: '28'
                selector: container.aside
        signal_sync_rules:
        - effects:
          - set:
              context: selected_project_id
              from: $local_signal.project_id
          - send:
              instance: detail
              local_signal: selection_changed
              payload_bindings:
                project_id:
                  from: $local_signal.project_id
          - send:
              instance: activity
              local_signal: selection_changed
              payload_bindings:
                project_id:
                  from: $local_signal.project_id
          id: select_project_updates_state_machines
          when:
            instance: list
            local_signal: project_selected
        surface: state_machine.project.board.ready
        text: []
  state_machine.project.detail:
    context:
      additionalProperties: false
      properties:
        project_id:
          type:
          - 'null'
          - string
      required: []
      type: object
    data_loaders: {}
    entity_type: entity_type.project
    initial_view_state: none
    rationale: The detail state machine is independent from the list and reacts to selected project context.
    signals:
      accepts:
        data_refresh_signals:
          project_changed:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
          project_load_failed:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
          project_loaded:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
              type: object
        local_signals:
          selection_changed:
            payload_schema:
              additionalProperties: false
              properties:
                project_id:
                  type: string
              required:
              - project_id
              type: object
          selection_cleared:
            payload_schema:
              additionalProperties: false
              properties: {}
              required: []
