models:
  Problem:
    fields:
      code:
        nullable: false
        required: true
        type:
          primitive: Text
      message:
        nullable: false
        required: true
        type:
          primitive: Text
    lifecycle: null
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
  Project:
    fields:
      assignee:
        nullable: false
        required: true
        type:
          primitive: Text
      created_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      customer:
        nullable: false
        required: true
        type:
          primitive: Text
      id:
        nullable: false
        required: true
        type:
          primitive: ID
      priority:
        nullable: false
        required: true
        type:
          primitive: Text
      status:
        nullable: false
        required: true
        type:
          enum:
          - draft
          - submitted
          - approved
          - archived
      summary:
        nullable: false
        required: true
        type:
          primitive: Text
      title:
        nullable: false
        required: true
        type:
          primitive: Text
      updated_at:
        nullable: false
        required: true
        type:
          primitive: Timestamp
      workspace_id:
        nullable: false
        required: true
        type:
          primitive: ID
    lifecycle:
      field: status
      initial: draft
      states:
      - draft
      - submitted
      - approved
      - archived
      transitions:
      - from: draft
        to: submitted
        triggered_by: operation.project.submit
      - from: submitted
        to: approved
        triggered_by: operation.project.approve
      - from: approved
        to: archived
        triggered_by: operation.project.archive
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
  ProjectApproved:
    fields:
      approved_by:
        nullable: false
        required: true
        type:
          primitive: ID
      project_id:
        nullable: false
        required: true
        type:
          primitive: ID
    lifecycle: null
    rationale: Approval events carry only the integration payload required by downstream workflows.
operations:
  operation.project.approve:
    creates: []
    deletes: []
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      approved:
        emits:
        - bindings:
            approved_by: $input.approved_by
            project_id: $input.project_id
          event: event.project.approved
        kind: success
        result:
          model: Project
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
    policy_guard:
      policy: policy.project.approve
    rationale: Reviewers can approve submitted dispatch projects.
    reads: []
    transition:
      field: status
      from: submitted
      model: Project
      to: approved
    updates: []
  operation.project.archive:
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      archived:
        emits:
        - event: event.project.archived
          payload: $outcome.result
        kind: success
        result:
          model: Project
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
    policy_guard:
      policy: policy.project.archive
    rationale: Approved dispatch projects can be archived.
    reads: []
    transition:
      field: status
      from: approved
      model: Project
      to: archived
    updates: []
  operation.project.create:
    creates:
    - Project
    deletes: []
    input:
      customer:
        primitive: Text
      priority:
        primitive: Text
      title:
        primitive: Text
      workspace_id:
        primitive: ID
    operation_kind: command
    outcomes:
      created:
        emits:
        - event: event.project.created
          payload: $outcome.result
        kind: success
        result:
          model: Project
      validation_failed:
        emits: []
        kind: failure
        result:
          model: Problem
    policy_guard:
      policy: policy.project.create
    rationale: Members can create a new dispatch project.
    reads: []
    updates: []
  operation.project.list:
    creates: []
    deletes: []
    input:
      workspace_id:
        primitive: ID
    operation_kind: query
    outcomes:
      listed:
        emits: []
        kind: success
        result:
          array:
            model: Project
      unavailable:
        emits: []
        kind: failure
        result:
          model: Problem
    policy_guard:
      policy: policy.project.list
    rationale: The board requires a project list query scoped by workspace.
    reads:
    - Project
    updates: []
  operation.project.read:
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: query
    outcomes:
      found:
        emits: []
        kind: success
        result:
          model: Project
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
    policy_guard:
      policy: policy.project.read
    rationale: The detail state machine loads the selected project by id.
    reads:
    - Project
    updates: []
  operation.project.send_approval_notice:
    creates: []
    deletes: []
    input:
      approved_by:
        primitive: ID
      project_id:
        primitive: ID
    operation_kind: command
    outcomes:
      delivery_failed:
        emits: []
        kind: failure
        result:
          model: Problem
      sent:
        emits: []
        kind: success
        result:
          model: NoticeResult
    policy_guard:
      policy: policy.project.send_approval_notice
    rationale: Approval triggers a notification command for downstream coordination.
    reads: []
    updates: []
  operation.project.submit:
    creates: []
    deletes: []
    input:
      project_id:
        primitive: ID
    operation_kind: transition
    outcomes:
      invalid_state:
        emits: []
        kind: failure
        result:
          model: Problem
      not_found:
        emits: []
        kind: failure
        result:
          model: Problem
      submitted:
        emits:
        - event: event.project.submitted
          payload: $outcome.result
        kind: success
        result:
          model: Project
    policy_guard:
      policy: policy.project.submit
    rationale: Draft dispatch projects can be submitted for review.
    reads: []
    transition:
      field: status
      from: draft
      model: Project
      to: submitted
    updates: []
policies:
  policy.project.approve:
    actions:
    - operation: operation.project.approve
    conditions:
    - resource_state:
        equals: submitted
        field: status
        model: Project
    effect: allow
    rationale: Reviewers can approve submitted dispatch projects.
    resources:
    - model: Project
    subjects:
    - kind: actor
      source: $input.approved_by
  policy.project.archive:
    actions:
    - operation: operation.project.archive
    conditions:
    - resource_state:
        equals: approved
        field: status
        model: Project
    effect: allow
    rationale: Approved dispatch projects can be archived.
    resources:
    - model: Project
    subjects:
    - kind: actor
  policy.project.create:
    actions:
    - operation: operation.project.create
    conditions:
    - always: true
    effect: allow
    rationale: Members can create a new dispatch project.
    resources:
    - model: Project
    subjects:
    - kind: actor
  policy.project.list:
    actions:
    - operation: operation.project.list
    conditions:
    - always: true
    effect: allow
    rationale: The board requires a project list query scoped by workspace.
    resources:
    - model: Project
    subjects:
    - kind: actor
  policy.project.read:
    actions:
    - operation: operation.project.read
    conditions:
    - always: true
    effect: allow
    rationale: The detail state machine loads the selected project by id.
    resources:
    - model: Project
    subjects:
    - kind: actor
  policy.project.send_approval_notice:
    actions:
    - operation: operation.project.send_approval_notice
    conditions:
    - always: true
    effect: allow
    rationale: Approval triggers a notification command for downstream coordination.
    resources:
    - operation: operation.project.send_approval_notice
    subjects:
    - kind: actor
      source: $input.approved_by
  policy.project.submit:
    actions:
    - operation: operation.project.submit
    conditions:
    - resource_state:
        equals: draft
        field: status
        model: Project
    effect: allow
    rationale: Draft dispatch projects can be submitted for review.
    resources:
    - model: Project
    subjects:
    - kind: actor
