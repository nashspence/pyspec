application_actions:
  application_action.project.approve:
    action_kind: lifecycle_transition
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.reviewer
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
    lifecycle_transition:
      entity_type: entity_type.project
      field: status
      from: submitted
      to: approved
    outcomes:
      approved:
        emits:
        - domain_event: domain_event.project.approved
          payload_bindings:
            approved_by:
              from: $input.approved_by
            project_id:
              from: $input.project_id
        kind: success
        result:
          $ref: entity_type.project
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      transition_not_allowed:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Reviewers can approve submitted dispatch projects.
    reads: []
    retry_safe: true
    updates: []
  application_action.project.archive:
    action_kind: lifecycle_transition
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.reviewer
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      additionalProperties: false
      properties:
        project_id:
          type: string
      required:
      - project_id
      type: object
    lifecycle_transition:
      entity_type: entity_type.project
      field: status
      from: approved
      to: archived
    outcomes:
      archived:
        emits:
        - domain_event: domain_event.project.archived
          payload_source: $outcome.result
        kind: success
        result:
          $ref: entity_type.project
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      transition_not_allowed:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Approved dispatch projects can be archived.
    reads: []
    updates: []
  application_action.project.create:
    action_kind: command
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates:
    - entity_type.project
    deletes: []
    input:
      additionalProperties: false
      properties:
        customer:
          type: string
        priority:
          type: string
        title:
          type: string
        workspace_id:
          type: string
      required:
      - customer
      - priority
      - title
      - workspace_id
      type: object
    outcomes:
      created:
        emits:
        - domain_event: domain_event.project.created
          payload_source: $outcome.result
        kind: success
        result:
          $ref: entity_type.project
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      validation_failed:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Members can create a new dispatch project.
    reads: []
    updates: []
  application_action.project.list:
    action_kind: query
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      additionalProperties: false
      properties:
        workspace_id:
          type: string
      required:
      - workspace_id
      type: object
    outcomes:
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      listed:
        emits: []
        kind: success
        result:
          items:
            $ref: entity_type.project
          type: array
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unavailable:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: The board requires a project list query scoped by workspace.
    reads:
    - entity_type.project
    updates: []
  application_action.project.read:
    action_kind: query
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      additionalProperties: false
      properties:
        project_id:
          type: string
      required:
      - project_id
      type: object
    outcomes:
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      found:
        emits: []
        kind: success
        result:
          $ref: entity_type.project
      not_found:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: The detail state machine loads the selected project by id.
    reads:
    - entity_type.project
    updates: []
  application_action.project.send_approval_notice:
    action_kind: command
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.reviewer
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
    outcomes:
      delivery_failed:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      sent:
        emits: []
        kind: success
        result:
          $ref: schema.project.notice_result
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Approval triggers a notification command for downstream coordination.
    reads: []
    retry_safe: true
    updates: []
  application_action.project.submit:
    action_kind: lifecycle_transition
    authorization:
      forbidden_as: forbidden
      policy: authorization_policy.project.member
      unauthenticated_as: unauthenticated
    creates: []
    deletes: []
    input:
      additionalProperties: false
      properties:
        project_id:
          type: string
      required:
      - project_id
      type: object
    lifecycle_transition:
      entity_type: entity_type.project
      field: status
      from: draft
      to: submitted
    outcomes:
      forbidden:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      not_found:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      submitted:
        emits:
        - domain_event: domain_event.project.submitted
          payload_source: $outcome.result
        kind: success
        result:
          $ref: entity_type.project
      transition_not_allowed:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
      unauthenticated:
        emits: []
        kind: failure
        result:
          $ref: entity_type.problem
    rationale: Draft dispatch projects can be submitted for review.
    reads: []
    updates: []
assets:
  asset.project.detail.ready.priority_badge:
    args:
      priority:
        type: string
    asset_role: badge
    media_kind: icon
    placeholder:
      aspect_ratio: '1:1'
      label: Project priority badge
      placeholder_symbol: square
    rationale: Selected project detail shows a dynamic priority badge resolved from project fixture data.
    source_ref: asset.project.detail.ready.priority_badge
  asset.project.list.empty.illustration:
    alt_text: text.project.list.empty.heading
    asset_role: empty_state
    media_kind: illustration
    placeholder:
      aspect_ratio: '4:3'
      label: Empty dispatch queue illustration
      placeholder_symbol: square
    rationale: Generic placeholder illustration used by the empty queue state machine state.
authorization_policies:
  authorization_policy.project.member:
    conditions:
    - subject_has_role: member
    effect: allow
    rationale: Workspace members may create, read, list, and submit dispatch projects.
    subjects:
    - kind: actor
    targets:
    - application_action: application_action.project.create
    - application_action: application_action.project.list
    - application_action: application_action.project.read
    - application_action: application_action.project.submit
    - entity_type: entity_type.project
  authorization_policy.project.reviewer:
    conditions:
    - subject_has_role: reviewer
    effect: allow
    rationale: Reviewers may approve, archive, and send approval notices for dispatch projects.
    subjects:
    - kind: actor
    targets:
    - application_action: application_action.project.approve
    - application_action: application_action.project.archive
    - application_action: application_action.project.send_approval_notice
    - entity_type: entity_type.project
content_cases:
  content_case.project.detail.heading.high_priority:
    args:
      customer:
        value: Atlas Foods
      title:
        value: Replace rooftop condenser fan
    rationale: Exercise final detail heading text with representative fixture-backed content.
    ref: text.project.detail.ready.heading
  content_case.project.detail.priority_badge.high_priority:
    args:
      priority:
        value: High
    rationale: Exercise final dynamic priority badge asset.
    ref: asset.project.detail.ready.priority_badge
domain_events:
  domain_event.project.approved:
    emitted_by:
    - application_action.project.approve
    payload_schema:
      $ref: schema.project.approved
    rationale: Approval domain events carry the reviewer and project identity needed by notification workflows.
  domain_event.project.archived:
    emitted_by:
    - application_action.project.archive
    payload_schema:
      $ref: entity_type.project
    rationale: Approved dispatch projects can be archived.
  domain_event.project.created:
    emitted_by:
    - application_action.project.create
    payload_schema:
      $ref: entity_type.project
    rationale: Members can create a new dispatch project.
  domain_event.project.submitted:
    emitted_by:
    - application_action.project.submit
    payload_schema:
      $ref: entity_type.project
    rationale: Draft dispatch projects can be submitted for review.
entity_types:
  entity_type.problem:
    entity_lifecycle: null
    name: Problem
    rationale: A structured problem result explains intentional failure outcomes across API and CLI surfaces.
    schema:
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
  entity_type.project:
    entity_lifecycle:
      field: status
      initial_state: draft
      lifecycle_states:
      - draft
      - submitted
      - approved
      - archived
      lifecycle_transitions:
      - from: draft
        to: submitted
        triggered_by: application_action.project.submit
      - from: submitted
        to: approved
        triggered_by: application_action.project.approve
      - from: approved
        to: archived
        triggered_by: application_action.project.archive
    name: Project
    rationale: A dispatch project is the durable work item displayed and acted on by the board.
    schema:
      additionalProperties: false
      properties:
        assignee:
          type: string
        created_at:
          format: date-time
          type: string
        customer:
          type: string
        id:
          type: string
        priority:
          type: string
        status:
          enum:
          - draft
          - submitted
          - approved
          - archived
          type: string
        summary:
          type: string
        title:
          type: string
        updated_at:
          format: date-time
          type: string
        workspace_id:
          type: string
      required:
      - assignee
      - created_at
      - customer
      - id
      - priority
      - status
      - summary
      - title
      - updated_at
      - workspace_id
      type: object
entry_points:
  entry_point.api.project.approve:
    adapter:
      http_api:
        input:
          body:
            approved_by:
              type: string
          path_params:
            project_id:
              type: string
        method: POST
        path: /projects/{project_id}/approve
        responses:
          approved:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.project
            status: 200
          forbidden:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 403
          not_found:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 404
          transition_not_allowed:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 409
          unauthenticated:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 401
          unavailable:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 503
    authorization_policy: authorization_policy.project.reviewer
    endpoint: endpoint.project.approve
    rationale: HTTP endpoint for approving submitted dispatch projects.
    retry_safe: true
    target:
      application_action:
        input_bindings:
          approved_by:
            from: $input.body.approved_by
          project_id:
            from: $input.path_params.project_id
        ref: application_action.project.approve
  entry_point.api.project.create:
    adapter:
      http_api:
        input:
          body:
            customer:
              type: string
            priority:
              type: string
            title:
              type: string
          path_params:
            workspace_id:
              type: string
        method: POST
        path: /workspaces/{workspace_id}/projects
        responses:
          created:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.project
            status: 201
          forbidden:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 403
          unauthenticated:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 401
          validation_failed:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 422
    authorization_policy: authorization_policy.project.member
    endpoint: endpoint.project.create
    rationale: HTTP endpoint for creating a dispatch project.
    target:
      application_action:
        input_bindings:
          customer:
            from: $input.body.customer
          priority:
            from: $input.body.priority
          title:
            from: $input.body.title
          workspace_id:
            from: $input.path_params.workspace_id
        ref: application_action.project.create
  entry_point.api.project.list:
    adapter:
      http_api:
        input:
          path_params:
            workspace_id:
              type: string
        method: GET
        path: /workspaces/{workspace_id}/projects
        responses:
          forbidden:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 403
          listed:
            body:
              from: $outcome.result
              type:
                items:
                  $ref: entity_type.project
                type: array
            status: 200
          unauthenticated:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 401
          unavailable:
            body:
              from: $outcome.result
              type:
                $ref: entity_type.problem
            status: 503
    authorization_policy: authorization_policy.project.member
    endpoint: endpoint.project.list
    rationale: HTTP endpoint for listing dispatch projects.
    target:
      application_action:
        input_bindings:
          workspace_id:
            from: $input.path_params.workspace_id
        ref: application_action.project.list
  entry_point.cli.project.approve:
    adapter:
      cli:
        cli_command: project approve
        input:
          args:
            approved_by:
              type: string
            project_id:
              type: string
        response_handlers:
          approved:
            exit_code: 0
            stdout:
              bindings:
                project_id:
                  from: $response.body.id
              text: text.project.approve.success
          forbidden:
            exit_code: 5
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.forbidden
          not_found:
            exit_code: 3
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.not_found
          transition_not_allowed:
            exit_code: 2
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.transition_not_allowed
          unauthenticated:
            exit_code: 4
            stderr:
              bindings:
                message:
                  from: $response.body.message
              text: text.project.approve.unauthenticated
          unavailable:
            exit_code: 75
            retry_policy:
              attempts: 3
              backoff: exponential
            stderr:
              text: text.project.approve.unavailable
    cli_command_ref: cli_command.project.approve
    rationale: CLI entry for approval automation.
    target:
      entry_point:
        input_bindings:
          body:
            approved_by:
              from: $input.args.approved_by
          path_params:
            project_id:
              from: $input.args.project_id
        ref: entry_point.api.project.approve
  entry_point.cli.project.board:
    adapter:
      cli:
        cli_command: project board
        input:
          args:
            workspace_id:
              type: string
    cli_command_ref: cli_command.project.board
    rationale: CLI launcher for the Textual dispatch board.
    target:
      state_machine:
        input_bindings:
          workspace_id:
            from: $input.args.workspace_id
        ref: state_machine.project.board
        renderer: textual
  entry_point.html.project.board:
    adapter:
      html_route:
        input:
          path_params:
            workspace_id:
              type: string
        path: /workspaces/{workspace_id}/dispatch
    rationale: HTML entry for the dispatch board.
    route: route.project.board
    target:
      state_machine:
        input_bindings:
          workspace_id:
            from: $input.path_params.workspace_id
        ref: state_machine.project.board
        renderer: html
  entry_point.worker.project.approval_notice:
    adapter:
      worker:
        ingress_responses:
          accepted:
            disposition: acknowledge
          malformed:
            disposition: dead_letter
            problem:
              $ref: entity_type.problem
        input:
          payload:
            $ref: schema.project.approved
    rationale: Worker entry exposing the approval notice workflow.
    target:
      workflow:
        ref: workflow.project.approval_notice
        trigger_bindings:
          approved_by:
            from: $input.payload.approved_by
          project_id:
            from: $input.payload.project_id
    workflow_ref: workflow.project.approval_notice
