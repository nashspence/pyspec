                from: $message.project_id
            - send:
                data:
                  project_id: $message.project_id
                message: project.selection_changed
                panel: detail
            - send:
                data:
                  project_id: $message.project_id
                message: project.selection_changed
                panel: activity
            id: select_project_updates_panels
            when:
              instance: list
              message: project.selected
        panel: panel.project.board.ready
        panels:
          activity:
            panel: panel.project.activity.empty
            source: panel.project.activity
            state: empty
          detail:
            panel: panel.project.detail.none
            source: panel.project.detail
            state: none
          list:
            panel: panel.project.list.ready
            source: panel.project.list
            state: ready
        ref: project.board
        state: ready
        sync:
          observed:
          - select_project_updates_panels
    basis: A populated workspace shows the ready list while detail awaits explicit selection.
    execute:
      open_entry:
        params:
          workspace_id: $fixture.workspace.id
        ref: web.project.board
    feature: project.board
    title: Ready dispatch board
  project.create.api.success:
    archetype: api_entry_success
    arrange:
      facts:
      - absent:
          resource: Project
          where:
            workspace_id: $fixture.workspace.id
      fixtures:
      - fixture.workspace.member
    assert:
      events:
        emitted:
        - project.created
      invoked:
      - project.create
      policy: policy.project.create
      resource:
        exists:
          resource: Project
          where:
            title: Replace rooftop condenser fan
            workspace_id: $fixture.workspace.id
      response:
        status: 200
