              - declarations:
                  display: grid
                  gap: token.gap
                  grid-template-columns: token.nav_width 1fr token.aside_width
                selector: root
              - declarations:
                  min-width: token.nav_width
                selector: region.nav
              - declarations:
                  min-width: '0'
                selector: region.main
              - declarations:
                  min-width: token.aside_width
                selector: region.aside
              tokens:
                aside_width: 16rem
                gap: 1rem
                nav_width: 20rem
          textual:
            layout:
              containers:
                aside:
                  container_class: Container
                  id: aside
                  must_render: true
                  order: 3
                main:
                  container_class: Container
                  id: main
                  must_render: true
                  order: 2
                nav:
                  container_class: Container
                  id: nav
                  must_render: true
                  order: 1
              screen_class: ProjectBoardScreen
            style:
              rules:
              - declarations:
                  layout: horizontal
                selector: screen
              - declarations:
                  width: '32'
