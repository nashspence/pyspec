asyncapi: 3.1.0
channels:
  domain_event_domain_event_project_approved:
    address: domain_event.project.approved
    messages:
      integration_message_domain_event_project_approved:
        $ref: '#/components/messages/integration_message_domain_event_project_approved'
    x-domain-event: domain_event.project.approved
  domain_event_domain_event_project_archived:
    address: domain_event.project.archived
    messages:
      integration_message_domain_event_project_archived:
        $ref: '#/components/messages/integration_message_domain_event_project_archived'
    x-domain-event: domain_event.project.archived
  domain_event_domain_event_project_created:
    address: domain_event.project.created
    messages:
      integration_message_domain_event_project_created:
        $ref: '#/components/messages/integration_message_domain_event_project_created'
    x-domain-event: domain_event.project.created
  domain_event_domain_event_project_submitted:
    address: domain_event.project.submitted
    messages:
      integration_message_domain_event_project_submitted:
        $ref: '#/components/messages/integration_message_domain_event_project_submitted'
    x-domain-event: domain_event.project.submitted
components:
  messages:
    integration_message_domain_event_project_approved:
      name: domain_event.project.approved
      payload:
        $ref: '#/components/schemas/data_contract.project.approved'
      title: Domain Event Project Approved
      x-emitted-by:
      - application_action.project.approve
    integration_message_domain_event_project_archived:
      name: domain_event.project.archived
      payload:
        $ref: '#/components/schemas/Project'
      title: Domain Event Project Archived
      x-emitted-by:
      - application_action.project.archive
    integration_message_domain_event_project_created:
      name: domain_event.project.created
      payload:
        $ref: '#/components/schemas/Project'
      title: Domain Event Project Created
      x-emitted-by:
      - application_action.project.create
    integration_message_domain_event_project_submitted:
      name: domain_event.project.submitted
      payload:
        $ref: '#/components/schemas/Project'
      title: Domain Event Project Submitted
      x-emitted-by:
      - application_action.project.submit
  schemas:
    Problem:
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
    Project:
      additionalProperties: false
      properties:
        assignee:
          type: string
        created_at:
          format: date-time
          type: string
        customer:
          type: string
        id:
          type: string
        priority:
          type: string
        status:
          enum:
          - draft
          - submitted
          - approved
          - archived
          type: string
        summary:
          type: string
        title:
          type: string
        updated_at:
          format: date-time
          type: string
        workspace_id:
          type: string
      required:
      - assignee
      - created_at
      - customer
      - id
      - priority
      - status
      - summary
      - title
      - updated_at
      - workspace_id
      type: object
    data_contract.project.approved:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
    data_contract.project.notice_result:
      additionalProperties: false
      properties:
        notice_id:
          type: string
        queued_at:
          format: date-time
          type: string
      required:
      - notice_id
      - queued_at
      type: object
info:
  title: project_dispatch_board
  version: 0.0.0-contract
operations:
  receive_workflow_project_approval_notice:
    action: receive
    channel:
      $ref: '#/channels/domain_event_domain_event_project_approved'
    messages:
    - $ref: '#/components/messages/integration_message_domain_event_project_approved'
    x-contract-ref: workflow.project.approval_notice
    x-dispositions:
      entry_point.worker.project.approval_notice:
        accepted:
          disposition: acknowledge
        malformed:
          disposition: dead_letter
          problem:
            model: Problem
    x-workflow: workflow.project.approval_notice
  send_domain_event_project_approved:
    action: send
    channel:
      $ref: '#/channels/domain_event_domain_event_project_approved'
    messages:
    - $ref: '#/components/messages/integration_message_domain_event_project_approved'
    x-emitted-by:
    - application_action.project.approve
  send_domain_event_project_archived:
    action: send
    channel:
      $ref: '#/channels/domain_event_domain_event_project_archived'
    messages:
    - $ref: '#/components/messages/integration_message_domain_event_project_archived'
    x-emitted-by:
    - application_action.project.archive
  send_domain_event_project_created:
    action: send
    channel:
      $ref: '#/channels/domain_event_domain_event_project_created'
    messages:
    - $ref: '#/components/messages/integration_message_domain_event_project_created'
    x-emitted-by:
    - application_action.project.create
  send_domain_event_project_submitted:
    action: send
    channel:
      $ref: '#/channels/domain_event_domain_event_project_submitted'
    messages:
    - $ref: '#/components/messages/integration_message_domain_event_project_submitted'
    x-emitted-by:
    - application_action.project.submit
