components:
  schemas:
    Problem:
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
      required:
      - code
      - message
      type: object
    Project:
      additionalProperties: false
      properties:
        assignee:
          type: string
        created_at:
          format: date-time
          type: string
        customer:
          type: string
        id:
          type: string
        priority:
          type: string
        status:
          enum:
          - draft
          - submitted
          - approved
          - archived
          type: string
        summary:
          type: string
        title:
          type: string
        updated_at:
          format: date-time
          type: string
        workspace_id:
          type: string
      required:
      - assignee
      - created_at
      - customer
      - id
      - priority
      - status
      - summary
      - title
      - updated_at
      - workspace_id
      type: object
    data_contract.project.approved:
      additionalProperties: false
      properties:
        approved_by:
          type: string
        project_id:
          type: string
      required:
      - approved_by
      - project_id
      type: object
    data_contract.project.notice_result:
      additionalProperties: false
      properties:
        notice_id:
          type: string
        queued_at:
          format: date-time
          type: string
      required:
      - notice_id
      - queued_at
      type: object
info:
  title: project_dispatch_board
  version: 0.0.0-contract
openapi: 3.1.0
paths:
  /projects/{project_id}/approve:
    post:
      operationId: operation.project.approve
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                approved_by:
                  type: string
              required:
              - approved_by
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: Approved
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Unauthenticated
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Invalid State
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Unavailable
      x-authorization-policy: authorization_policy.project.reviewer
      x-entry: entry_point.api.project.approve
      x-operation: operation.project.approve
  /workspaces/{workspace_id}/projects:
    get:
      operationId: operation.project.list
      parameters:
      - in: path
        name: workspace_id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Project'
                type: array
          description: Listed
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Unauthenticated
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Forbidden
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Unavailable
      x-authorization-policy: authorization_policy.project.member
      x-entry: entry_point.api.project.list
      x-operation: operation.project.list
    post:
      operationId: operation.project.create
      parameters:
      - in: path
        name: workspace_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                customer:
                  type: string
                priority:
                  type: string
                title:
                  type: string
              required:
              - customer
              - priority
              - title
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: Created
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Unauthenticated
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Forbidden
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Validation Failed
      x-authorization-policy: authorization_policy.project.member
      x-entry: entry_point.api.project.create
      x-operation: operation.project.create
