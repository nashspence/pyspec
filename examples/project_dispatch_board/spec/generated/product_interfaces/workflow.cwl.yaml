$graph:
- class: Workflow
  doc: 'contract workflow workflow.project.approval_notice; trigger={''domain_event'': ''domain_event.project.approved''};
    outcomes=[''completed'', ''delivery_failed'', ''notice_forbidden'', ''notice_unauthenticated'']; ref=workflow.project.approval_notice'
  id: '#workflow_project_approval_notice'
  inputs:
    trigger_payload:
      type: Any
  label: workflow.project.approval_notice
  outputs:
    completed:
      type: Any
    delivery_failed:
      type: Any
    notice_forbidden:
      type: Any
    notice_unauthenticated:
      type: Any
  steps:
    send_notice:
      doc: 'input_bindings={''approved_by'': {''from'': ''$trigger.payload.approved_by''}, ''project_id'': {''from'': ''$trigger.payload.project_id''}};
        outcome_transitions={''delivery_failed'': {''retry_policy'': {''attempts'': 3, ''backoff'': ''exponential'', ''fail_as'':
        ''delivery_failed''}}, ''forbidden'': {''fail_as'': ''notice_forbidden''}, ''sent'': {''complete_as'': ''completed''},
        ''unauthenticated'': {''fail_as'': ''notice_unauthenticated''}}'
      in:
        approved_by: trigger_payload
        project_id: trigger_payload
      out:
      - delivery_failed
      - forbidden
      - sent
      - unauthenticated
      run: '#application_action_project_send_approval_notice'
- baseCommand:
  - contract-operation
  - application_action.project.approve
  class: CommandLineTool
  id: '#application_action_project_approve'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: application_action.project.approve
  outputs:
    approved:
      type: Any
    forbidden:
      type: Any
    not_found:
      type: Any
    transition_not_allowed:
      type: Any
    unauthenticated:
      type: Any
    unavailable:
      type: Any
- baseCommand:
  - contract-operation
  - application_action.project.send_approval_notice
  class: CommandLineTool
  id: '#application_action_project_send_approval_notice'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: application_action.project.send_approval_notice
  outputs:
    delivery_failed:
      type: Any
    forbidden:
      type: Any
    sent:
      type: Any
    unauthenticated:
      type: Any
cwlVersion: v1.2
