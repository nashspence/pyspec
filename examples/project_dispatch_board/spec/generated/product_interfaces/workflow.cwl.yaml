$graph:
- class: Workflow
  doc: 'contract workflow workflow.project.approval_notice; inputs={''domain_event'': ''domain_event.project.approved''};
    outputs=[''completed'', ''delivery_failed'', ''notice_access_denied'', ''notice_authentication_required'']; ref=workflow.project.approval_notice'
  id: '#workflow_project_approval_notice'
  inputs:
    workflow_input_payload:
      type: Any
  label: workflow.project.approval_notice
  outputs:
    completed:
      type: Any
    delivery_failed:
      type: Any
    notice_access_denied:
      type: Any
    notice_authentication_required:
      type: Any
  steps:
    send_notice:
      doc: 'input_mapping={''approved_by'': {''from'': ''$workflow_input.payload.approved_by''}, ''project_id'': {''from'':
        ''$workflow_input.payload.project_id''}}; sequence_flows={''delivery_failed'': {''retry_policy'': {''attempts'': 3,
        ''backoff'': ''exponential'', ''fail_as'': ''delivery_failed''}}, ''access_denied'': {''fail_as'': ''notice_access_denied''},
        ''sent'': {''complete_as'': ''completed''}, ''authentication_required'': {''fail_as'': ''notice_authentication_required''}}'
      in:
        approved_by: workflow_input_payload
        project_id: workflow_input_payload
      out:
      - access_denied
      - authentication_required
      - delivery_failed
      - sent
      run: '#command_project_send_approval_notice'
- baseCommand:
  - contract-command-query
  - command.project.approve
  class: CommandLineTool
  id: '#command_project_approve'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: command.project.approve
  outputs:
    access_denied:
      type: Any
    approved:
      type: Any
    authentication_required:
      type: Any
    not_found:
      type: Any
    transition_not_allowed:
      type: Any
    unavailable:
      type: Any
- baseCommand:
  - contract-command-query
  - command.project.send_approval_notice
  class: CommandLineTool
  id: '#command_project_send_approval_notice'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: command.project.send_approval_notice
  outputs:
    access_denied:
      type: Any
    authentication_required:
      type: Any
    delivery_failed:
      type: Any
    sent:
      type: Any
cwlVersion: v1.2
