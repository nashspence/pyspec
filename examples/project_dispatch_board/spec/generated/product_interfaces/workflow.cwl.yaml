$graph:
- class: Workflow
  doc: 'contract workflow workflow.project.approval_notice; trigger={''event'': ''event.project.approved''}; outcomes=[''completed'',
    ''delivery_failed'']; ref=workflow.project.approval_notice'
  id: '#workflow_project_approval_notice'
  inputs:
    trigger_payload:
      type: Any
  label: workflow.project.approval_notice
  outputs:
    completed:
      type: Any
    delivery_failed:
      type: Any
  steps:
    send_notice:
      doc: 'input_bindings={''approved_by'': ''$trigger.payload.approved_by'', ''project_id'': ''$trigger.payload.project_id''};
        outcome_routes={''delivery_failed'': {''retry_policy'': {''attempts'': 3, ''backoff'': ''exponential'', ''fail_as'':
        ''delivery_failed''}}, ''sent'': {''complete_as'': ''completed''}}'
      in:
        approved_by: trigger_payload
        project_id: trigger_payload
      out:
      - delivery_failed
      - sent
      run: '#operation_project_send_approval_notice'
- baseCommand:
  - contract-operation
  - operation.project.approve
  class: CommandLineTool
  id: '#operation_project_approve'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: operation.project.approve
  outputs:
    approved:
      type: Any
    invalid_state:
      type: Any
    not_found:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.send_approval_notice
  class: CommandLineTool
  id: '#operation_project_send_approval_notice'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: operation.project.send_approval_notice
  outputs:
    delivery_failed:
      type: Any
    sent:
      type: Any
cwlVersion: v1.2
