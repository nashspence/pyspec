$graph:
- class: Workflow
  doc: 'contract workflow workflow.project.approval_notice; trigger={''event'': ''event.project.approved''}; outcomes=[''completed'',
    ''delivery_failed'']; ref=workflow.project.approval_notice'
  id: '#workflow_project_approval_notice'
  inputs:
    trigger_payload:
      type: Any
  label: workflow.project.approval_notice
  outputs:
    completed:
      type: Any
    delivery_failed:
      type: Any
  steps:
    send_notice:
      doc: 'with={''approved_by'': ''$trigger.payload.approved_by'', ''project_id'': ''$trigger.payload.project_id''}; on={''delivery_failed'':
        {''fail'': ''delivery_failed'', ''retry'': {''attempts'': 3, ''backoff'': ''exponential''}}, ''sent'': {''complete'':
        ''completed''}}'
      in:
        approved_by: trigger_payload
        project_id: trigger_payload
      out:
      - delivery_failed
      - sent
      run: '#operation_project_send_approval_notice'
- baseCommand:
  - contract-operation
  - operation.project.approve
  class: CommandLineTool
  id: '#operation_project_approve'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: operation.project.approve
  outputs:
    approved:
      type: Any
    invalid_state:
      type: Any
    not_found:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.archive
  class: CommandLineTool
  id: '#operation_project_archive'
  inputs:
    project_id:
      type: string
  label: operation.project.archive
  outputs:
    archived:
      type: Any
    invalid_state:
      type: Any
    not_found:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.create
  class: CommandLineTool
  id: '#operation_project_create'
  inputs:
    customer:
      type: string
    priority:
      type: string
    title:
      type: string
    workspace_id:
      type: string
  label: operation.project.create
  outputs:
    created:
      type: Any
    validation_failed:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.list
  class: CommandLineTool
  id: '#operation_project_list'
  inputs:
    workspace_id:
      type: string
  label: operation.project.list
  outputs:
    listed:
      type:
        items: Any
        type: array
    unavailable:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.read
  class: CommandLineTool
  id: '#operation_project_read'
  inputs:
    project_id:
      type: string
  label: operation.project.read
  outputs:
    found:
      type: Any
    not_found:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.send_approval_notice
  class: CommandLineTool
  id: '#operation_project_send_approval_notice'
  inputs:
    approved_by:
      type: string
    project_id:
      type: string
  label: operation.project.send_approval_notice
  outputs:
    delivery_failed:
      type: Any
    sent:
      type: Any
- baseCommand:
  - contract-operation
  - operation.project.submit
  class: CommandLineTool
  id: '#operation_project_submit'
  inputs:
    project_id:
      type: string
  label: operation.project.submit
  outputs:
    invalid_state:
      type: Any
    not_found:
      type: Any
    submitted:
      type: Any
cwlVersion: v1.2
